function wireMeetingCreateForm(departments, allUsersForMeeting) {
  document.getElementById('toggleCreateBtn').addEventListener('click', () => {
    document.getElementById('createPanel').classList.toggle('hidden');
  });
  document.getElementById('mCancelBtn').addEventListener('click', () => {
    document.getElementById('createPanel').classList.add('hidden');
  });

  function avatarInitials(name) { return (name||'').trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join(''); }

  // ---------- نوع الانعقاد (Segmented Control) ----------
  document.querySelectorAll('#mLocationTypeControl button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#mLocationTypeControl button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const val = btn.dataset.val;
      document.getElementById('mLocation').value = val === 'hybrid' ? 'in_person' : val;
      document.getElementById('mPlaceWrap').classList.toggle('hidden', val === 'online');
      document.getElementById('mLinkWrap').classList.toggle('hidden', val === 'in_person');
      updateSummary();
    });
  });

  // ---------- الملخص الحي ----------
  function updateSummary() {
    const title = document.getElementById('mTitle').value.trim();
    document.getElementById('sumTitle').textContent = title || '-';
    const deptSel = document.getElementById('mDept');
    document.getElementById('sumDept').textContent = deptSel.options[deptSel.selectedIndex]?.text || '-';
    const typeSel = document.getElementById('mType');
    document.getElementById('sumType').textContent = typeSel.options[typeSel.selectedIndex]?.text || '-';
    document.getElementById('sumDate').textContent = document.getElementById('mDate').value || '-';
    document.getElementById('sumTime').textContent = document.getElementById('mTime').value || '-';
    const activeLocBtn = document.querySelector('#mLocationTypeControl button.active');
    document.getElementById('sumLocType').textContent = activeLocBtn ? activeLocBtn.textContent.trim() : 'حضوري';
    const place = document.getElementById('mLocDetail').value.trim();
    const link = document.getElementById('mLocLink').value.trim();
    document.getElementById('sumPlace').textContent = place || link || '-';

    const checked = [...document.querySelectorAll('.attendeeCheck:checked')];
    const inPerson = checked.filter(cb => document.querySelector(`.attendance-toggle[data-user="${cb.value}"] button.active`)?.dataset.val === 'in_person').length;
    const remote = checked.length - inPerson;
    const external = checked.filter(cb => cb.dataset.external === '1').length;
    document.getElementById('statTotal').textContent = checked.length;
    document.getElementById('statInPerson').textContent = inPerson;
    document.getElementById('statRemote').textContent = remote;
    document.getElementById('statExternal').textContent = external;
  }
  ['mTitle','mDept','mType','mDate','mTime','mLocDetail','mLocLink'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateSummary);
    document.getElementById(id).addEventListener('change', updateSummary);
  });

  function updateAttendeesCount() {
    const count = document.querySelectorAll('.attendeeCheck:checked').length;
    document.getElementById('attendeesCountLabel').innerHTML = count > 0 ? `<span data-lucide="check-circle-2" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;color:var(--success);"></span> تم اختيار ${count} شخص` : 'لم يتم اختيار أحد بعد';
    if (window.lucide) lucide.createIcons();
    updateSummary();
  }

  function attendanceToggleHtml(uid) {
    return `
      <div class="attendance-toggle" data-user="${uid}">
        <button type="button" class="active" data-val="in_person">حضوري</button>
        <button type="button" data-val="remote">عن بعد</button>
      </div>`;
  }
  function wireAttendanceToggle(wrap) {
    wrap.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        wrap.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateSummary();
      });
    });
  }

  function wireAttendeeRow(cb) {
    cb.addEventListener('change', () => updateAttendeesCount());
  }

  // ---------- عرض حضور القسم المحدد فقط ----------
  const HEAD_ROLES = ['department_manager','operations_manager','maintenance_officer','projects_manager','development_manager','finance'];
  function renderPrimaryAttendees() {
    const raw = document.getElementById('mDept').value;
    const isHeads = raw === 'heads';
    let list;
    if (isHeads) {
      list = (allUsersForMeeting||[]).filter(u => HEAD_ROLES.includes(u.role));
    } else {
      const deptId = Number(raw);
      list = (allUsersForMeeting||[]).filter(u => u.department_id === deptId);
    }
    const picker = document.getElementById('attendeesPicker');
    picker.innerHTML = list.length ? list.map((u,i) => `
      <div class="attendance-row">
        <input type="checkbox" class="attendeeCheck" data-dept="${isHeads?(u.department_id||''):raw}" value="${u.id}">
        <div class="ar-person">
          <div class="avatar-gradient avatar-g${i%8}" style="width:30px; height:30px; font-size:11px;">${esc(avatarInitials(u.full_name))}</div>
          <span style="font-size:13px; font-weight:600;">${esc(u.full_name)}${isHeads?` <span style="font-size:10.5px;color:#9A6B12;font-weight:600;">— ${esc(label('role',u.role))}</span>`:''}</span>
        </div>
        <span style="font-size:12px; color:#6B756F;">${esc(u.position_title || '-')}</span>
        ${attendanceToggleHtml(u.id)}
      </div>
    `).join('') : `<p class="empty-state">${isHeads?'لا يوجد رؤساء أقسام مسجلون':'لا يوجد موظفون في هذا القسم'}</p>`;
    picker.querySelectorAll('.attendeeCheck').forEach(wireAttendeeRow);
    picker.querySelectorAll('.attendance-toggle').forEach(wireAttendanceToggle);
    updateAttendeesCount();
  }
  renderPrimaryAttendees();
  document.getElementById('mDept').addEventListener('change', renderPrimaryAttendees);

  // ============ مساعد جدول الأعمال ============
  const AGENDA_TEMPLATES = {
    sales: { goal: 'مراجعة أرقام المبيعات وتحليل الأداء وتحديد خطة التحسين.', items: ['مراجعة أرقام المبيعات', 'مقارنة الأداء بالمستهدف', 'مناقشة أسباب الانخفاض أو النمو', 'تحديد فرص التحسين', 'توزيع المهام والمتابعة'], notes: 'يرجى تجهيز تقرير المبيعات قبل الاجتماع.' },
    operations: { goal: 'متابعة سير التشغيل ومعالجة التحديات اليومية.', items: ['مراجعة أداء التشغيل', 'مناقشة المشاكل الحالية', 'تحديد أسباب التعطيل', 'توزيع المهام على المسؤولين', 'تحديد موعد المتابعة'], notes: 'يرجى تجهيز تقرير التشغيل قبل الاجتماع.' },
    quality: { goal: 'مراجعة ملاحظات الجودة والإجراءات التصحيحية المطلوبة.', items: ['عرض نتائج زيارة الجودة', 'مراجعة البنود غير المطابقة', 'تحديد الإجراءات التصحيحية', 'تحديد المسؤوليات', 'تحديد موعد المتابعة'], notes: 'يرجى إرفاق صور الملاحظات وتقارير الزيارة.' },
    financial: { goal: 'مراجعة الوضع المالي واعتماد الصرف والخطة القادمة.', items: ['مراجعة التقرير المالي', 'مناقشة المصروفات والإيرادات', 'اعتماد الطلبات المالية المعلّقة', 'مراجعة خطة الميزانية', 'تحديد الأولويات المالية'], notes: 'يرجى تجهيز التقارير المالية والفواتير قبل الاجتماع.' },
    emergency: { goal: 'معالجة مشكلة عاجلة تؤثر على التشغيل واتخاذ قرارات فورية.', items: ['وصف المشكلة والوضع الحالي', 'تحليل الأسباب', 'اقتراح الحلول الفورية', 'تحديد المسؤول والمهلة', 'خطة المتابعة'], notes: 'حضور المسؤولين المعنيين إلزامي.' },
    weekly: { goal: 'متابعة أداء الأسبوع الماضي وتحديد أولويات الأسبوع الجاي.', items: ['مراجعة ما تم إنجازه', 'مناقشة العقبات', 'استعراض المهام المتأخرة', 'تحديد أولويات الأسبوع القادم', 'توزيع المسؤوليات'], notes: 'يرجى تحديث المهام في النظام قبل الاجتماع.' },
    decision: { goal: 'دراسة موضوع محدد واعتماد قرار رسمي بشأنه.', items: ['عرض الموضوع والخلفية', 'استعراض البدائل المتاحة', 'مناقشة المخاطر والفوائد', 'التصويت على القرار', 'توثيق القرار وتوزيع المهام'], notes: 'إرفاق كل المستندات المتعلقة بالموضوع.' }
  };
  const agendaItems = [];
  const mGoal = document.getElementById('mGoal');
  const mNotes = document.getElementById('mNotes');
  const mAgendaHidden = document.getElementById('mAgenda');
  const mAgendaList = document.getElementById('mAgendaList');
  const mAgendaInput = document.getElementById('mAgendaInput');
  const mAgendaEmpty = document.getElementById('mAgendaEmpty');
  const mAgendaPreviewBody = document.getElementById('mAgendaPreviewBody');

  function syncAgendaHidden() {
    mAgendaHidden.value = agendaItems.join('\n');
    mAgendaEmpty.style.display = agendaItems.length ? 'none' : 'block';
    renderAgendaPreview();
  }
  function renderAgendaList() {
    mAgendaList.innerHTML = agendaItems.map((t, i) => `
      <li class="agenda-item">
        <span class="ai-num">${i+1}</span>
        <span class="ai-text" data-i="${i}">${esc(t)}</span>
        <button type="button" class="ai-btn" data-edit="${i}" title="تعديل"><span data-lucide="pencil" style="width:13px;height:13px;"></span></button>
        <button type="button" class="ai-btn" data-up="${i}" title="لأعلى" ${i===0?'disabled':''}><span data-lucide="arrow-up" style="width:13px;height:13px;"></span></button>
        <button type="button" class="ai-btn" data-down="${i}" title="لأسفل" ${i===agendaItems.length-1?'disabled':''}><span data-lucide="arrow-down" style="width:13px;height:13px;"></span></button>
        <button type="button" class="ai-btn danger" data-del="${i}" title="حذف"><span data-lucide="trash-2" style="width:13px;height:13px;"></span></button>
      </li>
    `).join('');
    if (window.lucide) lucide.createIcons();
    mAgendaList.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => { agendaItems.splice(Number(b.dataset.del), 1); renderAgendaList(); syncAgendaHidden(); }));
    mAgendaList.querySelectorAll('[data-up]').forEach(b => b.addEventListener('click', () => { const i = Number(b.dataset.up); if (i>0) { [agendaItems[i-1], agendaItems[i]] = [agendaItems[i], agendaItems[i-1]]; renderAgendaList(); syncAgendaHidden(); } }));
    mAgendaList.querySelectorAll('[data-down]').forEach(b => b.addEventListener('click', () => { const i = Number(b.dataset.down); if (i<agendaItems.length-1) { [agendaItems[i+1], agendaItems[i]] = [agendaItems[i], agendaItems[i+1]]; renderAgendaList(); syncAgendaHidden(); } }));
    mAgendaList.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => {
      const i = Number(b.dataset.edit);
      const span = mAgendaList.querySelector(`.ai-text[data-i="${i}"]`);
      if (!span) return;
      span.setAttribute('contenteditable', 'true');
      span.focus();
      const range = document.createRange(); range.selectNodeContents(span);
      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
      const commit = () => { agendaItems[i] = span.textContent.trim() || agendaItems[i]; span.removeAttribute('contenteditable'); span.textContent = agendaItems[i]; syncAgendaHidden(); };
      span.addEventListener('blur', commit, { once: true });
      span.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); span.blur(); } });
    }));
  }
  function addAgendaItem(text) {
    const t = String(text || '').trim(); if (!t) return;
    agendaItems.push(t); renderAgendaList(); syncAgendaHidden();
  }
  function renderAgendaPreview() {
    const goal = mGoal.value.trim();
    const notes = mNotes.value.trim();
    if (!goal && !agendaItems.length && !notes) { mAgendaPreviewBody.innerHTML = '<div class="mp-empty">لم يتم إدخال جدول الأعمال بعد.</div>'; return; }
    const first3 = agendaItems.slice(0, 3).map((t, i) => `${i+1}. ${esc(t)}`).join('<br>');
    mAgendaPreviewBody.innerHTML = `
      ${goal ? `<div class="mp-row"><span class="k">الهدف:</span>${esc(goal)}</div>` : ''}
      <div class="mp-row"><span class="k">عدد النقاط:</span>${agendaItems.length}</div>
      ${first3 ? `<div class="mp-row" style="margin-right:8px;">${first3}${agendaItems.length>3?`<br><span style="color:#6B756F;">... و${agendaItems.length-3} نقطة أخرى</span>`:''}</div>` : ''}
      ${notes ? `<div class="mp-row"><span class="k">ملاحظات:</span>${esc(notes.length>90?notes.slice(0,90)+'…':notes)}</div>` : ''}
    `;
  }

  // إضافة نقطة
  document.getElementById('mAgendaAdd').addEventListener('click', () => { addAgendaItem(mAgendaInput.value); mAgendaInput.value = ''; mAgendaInput.focus(); });
  mAgendaInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); addAgendaItem(mAgendaInput.value); mAgendaInput.value = ''; } });

  // Chips: إضافة للـ textarea
  document.querySelectorAll('[data-chip-target] .agenda-chip').forEach(btn => btn.addEventListener('click', () => {
    const target = btn.closest('[data-chip-target]').dataset.chipTarget;
    const el = document.getElementById(target);
    const txt = btn.dataset.text;
    el.value = el.value.trim() ? el.value.trim() + '\n' + txt : txt;
    renderAgendaPreview();
  }));

  // Chips جدول الأعمال (يضاف كنقطة)
  document.querySelectorAll('[data-quick-agenda] .agenda-chip').forEach(btn => btn.addEventListener('click', () => addAgendaItem(btn.dataset.text)));

  // ---------- إدارة القوالب المخصصة (localStorage) ----------
  const TPL_STORE_KEY = 'shouon_meeting_tpls_v1';
  function loadCustomTpls() {
    try { return JSON.parse(localStorage.getItem(TPL_STORE_KEY) || '[]') || []; } catch (e) { return []; }
  }
  function saveCustomTpls(list) { localStorage.setItem(TPL_STORE_KEY, JSON.stringify(list)); }

  function renderCustomTplGroup() {
    const g = document.getElementById('mTplCustomGroup');
    const list = loadCustomTpls();
    if (!list.length) { g.style.display = 'none'; g.innerHTML = ''; }
    else { g.style.display = ''; g.label = '—— قوالبي المخصصة ——'; g.innerHTML = list.map((t, i) => `<option value="custom:${i}">⭐ ${esc(t.name)}</option>`).join(''); }
    const mng = document.getElementById('mTplManageBtn');
    if (mng) mng.style.display = list.length ? '' : 'none';
  }

  // ---------- تحميل الاجتماعات السابقة كقوالب ----------
  async function loadPreviousMeetingsAsTpls() {
    const g = document.getElementById('mTplPrevGroup');
    try {
      let q = sb.from('meetings').select('id, title, meeting_type, summary, meeting_datetime, department_id, departments(name)').order('meeting_datetime', { ascending: false }).limit(15);
      if (CURRENT_USER.role !== 'admin' && CURRENT_USER.role !== 'company_manager') {
        q = q.or(`organizer_id.eq.${CURRENT_USER.id},department_id.eq.${CURRENT_USER.department_id}`);
      }
      const { data } = await q;
      if (!data || !data.length) { g.style.display = 'none'; g.innerHTML = ''; return; }
      g.style.display = '';
      g.innerHTML = data.map(m => {
        const date = (m.meeting_datetime || '').slice(0, 10);
        const dept = m.departments ? m.departments.name : '';
        return `<option value="prev:${m.id}">🔁 ${esc((m.title||'').slice(0,40))} — ${date}${dept?' · '+esc(dept):''}</option>`;
      }).join('');
    } catch (e) { g.style.display = 'none'; }
  }

  // ---------- مطابقة القالب مع القسم ----------
  const DEPT_TO_TPL = {
    'مبيعات': 'builtin:sales', 'التسويق': 'builtin:sales',
    'التشغيل': 'builtin:operations', 'العمليات': 'builtin:operations',
    'الجودة': 'builtin:quality',
    'المالية': 'builtin:financial', 'المشتريات': 'builtin:financial',
  };
  function highlightMatchingTpl() {
    const raw = document.getElementById('mDept').value;
    const sel = document.getElementById('mTemplateSelect');
    // امسح أي علامة قديمة
    sel.querySelectorAll('option[data-suggested="1"]').forEach(o => { o.textContent = o.textContent.replace(/^✨ /,''); o.removeAttribute('data-suggested'); });
    if (raw === 'heads' || !raw) return;
    const deptName = (departments || []).find(d => String(d.id) === String(raw))?.name || '';
    const match = Object.entries(DEPT_TO_TPL).find(([kw]) => deptName.includes(kw));
    if (!match) return;
    const opt = sel.querySelector(`option[value="${match[1]}"]`);
    if (opt) { opt.textContent = '✨ ' + opt.textContent; opt.setAttribute('data-suggested', '1'); }
  }

  renderCustomTplGroup();
  loadPreviousMeetingsAsTpls();
  highlightMatchingTpl();
  document.getElementById('mDept').addEventListener('change', highlightMatchingTpl);

  // ---------- اختيار قالب (مدمج: built-in / custom / previous) ----------
  document.getElementById('mTemplateSelect').addEventListener('change', async (e) => {
    const raw = e.target.value;
    if (!raw) return;
    const [kind, key] = raw.split(':');
    const hasContent = mGoal.value.trim() || agendaItems.length || mNotes.value.trim();
    if (hasContent && !confirm('سيتم استبدال الهدف وجدول الأعمال والملاحظات بمحتوى القالب. متابعة؟')) {
      e.target.value = ''; return;
    }

    let t = null;
    if (kind === 'builtin') {
      t = AGENDA_TEMPLATES[key];
    } else if (kind === 'custom') {
      t = loadCustomTpls()[Number(key)];
    } else if (kind === 'prev') {
      const mid = Number(key);
      const [{ data: m }, { data: ag }] = await Promise.all([
        sb.from('meetings').select('summary').eq('id', mid).single(),
        sb.from('meeting_agenda').select('item_text').eq('meeting_id', mid).order('id')
      ]);
      const [goalPart, notesPart] = String(m?.summary || '').split(' — ');
      t = { goal: goalPart || '', items: (ag || []).map(a => a.item_text), notes: notesPart || '' };
    }
    if (!t) { e.target.value = ''; return; }

    mGoal.value = t.goal || '';
    agendaItems.length = 0; (t.items || []).forEach(x => agendaItems.push(x));
    mNotes.value = t.notes || '';
    renderAgendaList(); syncAgendaHidden();
    e.target.value = '';
    toast(kind === 'prev' ? 'تم استيراد بيانات الاجتماع السابق' : 'تم تحميل القالب', 'success');
  });

  // ---------- زر حفظ الحالي كقالب مخصص ----------
  document.getElementById('mTplSaveBtn').addEventListener('click', () => {
    const goal = mGoal.value.trim();
    const notes = mNotes.value.trim();
    if (!goal && !agendaItems.length && !notes) { toast('اكتب هدفًا أو أضف نقطة قبل الحفظ كقالب', 'warning'); return; }
    const name = prompt('اسم القالب:', '');
    if (!name || !name.trim()) return;
    const list = loadCustomTpls();
    // منع التكرار بالاسم
    const idx = list.findIndex(x => x.name === name.trim());
    const rec = { name: name.trim(), goal, items: [...agendaItems], notes };
    if (idx >= 0) list[idx] = rec; else list.push(rec);
    saveCustomTpls(list);
    renderCustomTplGroup();
    toast('تم حفظ القالب المخصص', 'success');
  });

  // ---------- زر إدارة/حذف قالب مخصص ----------
  document.getElementById('mTplManageBtn').addEventListener('click', () => {
    const list = loadCustomTpls();
    if (!list.length) return;
    const names = list.map((t, i) => `${i+1}. ${t.name}`).join('\n');
    const ans = prompt('اكتب رقم القالب لحذفه:\n\n' + names);
    const n = parseInt(ans, 10);
    if (!n || n < 1 || n > list.length) return;
    if (!confirm(`حذف القالب "${list[n-1].name}"؟`)) return;
    list.splice(n - 1, 1);
    saveCustomTpls(list);
    renderCustomTplGroup();
    toast('تم حذف القالب', 'success');
  });

  // تحديث المعاينة عند تغيير الهدف/الملاحظات
  mGoal.addEventListener('input', renderAgendaPreview);
  mNotes.addEventListener('input', renderAgendaPreview);
  if (window.lucide) lucide.createIcons();

  document.getElementById('mSelectAllAttBtn').addEventListener('click', () => {
    document.querySelectorAll('#attendeesPicker .attendeeCheck').forEach(cb => cb.checked = true);
    updateAttendeesCount();
  });
  document.getElementById('mDeselectAllAttBtn').addEventListener('click', () => {
    document.querySelectorAll('#attendeesPicker .attendeeCheck').forEach(cb => cb.checked = false);
    updateAttendeesCount();
  });

  // ---------- الانتداب من خارج القسم ----------
  const delegatedUserIds = new Set();
  document.getElementById('delegateToggleBtn').addEventListener('click', () => {
    document.getElementById('delegatePanel').classList.toggle('hidden');
  });
  document.getElementById('delegateDeptSelect').addEventListener('change', (e) => {
    const deptId = Number(e.target.value);
    const listBox = document.getElementById('delegateUsersList');
    if (!deptId) { listBox.innerHTML = ''; return; }
    const deptUsers = (allUsersForMeeting||[]).filter(u => u.department_id === deptId && !delegatedUserIds.has(u.id));
    listBox.innerHTML = deptUsers.length ? deptUsers.map(u => `
      <label style="display:flex; align-items:center; gap:8px; padding:5px 4px; cursor:pointer; font-size:13px;">
        <input type="checkbox" class="delegateCandidate" value="${u.id}" data-name="${esc(u.full_name)}" data-dept="${esc((departments||[]).find(d=>d.id===deptId)?.name||'')}" data-role="${esc(u.position_title||'')}">
        ${esc(u.full_name)}
      </label>
    `).join('') : '<p class="empty-state" style="padding:8px;">لا يوجد موظفون في هذا القسم</p>';

    listBox.querySelectorAll('.delegateCandidate').forEach(cb => {
      cb.addEventListener('change', (e2) => {
        if (!e2.target.checked) return;
        const uid = Number(e2.target.value);
        const uname = e2.target.dataset.name;
        const udept = e2.target.dataset.dept;
        const urole = e2.target.dataset.role;
        delegatedUserIds.add(uid);
        const row = document.createElement('div');
        row.className = 'attendance-row';
        row.innerHTML = `
          <input type="checkbox" class="attendeeCheck" checked value="${uid}" data-external="1" style="display:none;">
          <div class="ar-person">
            <span style="font-size:13px; font-weight:600;">${esc(uname)}</span>
            <span style="font-size:10.5px; color:#D6A437; background:rgba(214,164,55,0.12); padding:1px 8px; border-radius:8px;">انتداب — ${esc(udept)}</span>
          </div>
          <span style="font-size:12px; color:#6B756F;">${esc(urole || '-')}</span>
          ${attendanceToggleHtml(uid)}
        `;
        document.getElementById('delegatedSelectedList').appendChild(row);
        row.querySelector('.attendance-toggle').addEventListener('click', () => {}); // placeholder, wired below
        wireAttendanceToggle(row.querySelector('.attendance-toggle'));
        const removeBtn = document.createElement('button');
        removeBtn.type = 'button'; removeBtn.className = 'btn btn-outline btn-sm';
        removeBtn.style.cssText = 'padding:3px 8px; margin-right:6px;';
        removeBtn.innerHTML = '<span data-lucide="x" style="width:12px;height:12px;"></span>';
        row.querySelector('.ar-person').appendChild(removeBtn);
        removeBtn.addEventListener('click', () => {
          delegatedUserIds.delete(uid);
          row.remove();
          document.getElementById('delegateDeptSelect').dispatchEvent(new Event('change'));
          updateAttendeesCount();
        });
        if (window.lucide) lucide.createIcons();
        e2.target.closest('label').remove();
        updateAttendeesCount();
      });
    });
  });

  // ---------- منطق الحفظ الموحّد ----------
  async function submitMeeting(sendInvites) {
    const errBox = document.getElementById('createError');
    errBox.classList.remove('show');
    try {
      const dateVal = document.getElementById('mDate').value;
      const timeVal = document.getElementById('mTime').value;
      if (!dateVal || !timeVal) throw new Error('حدد تاريخ ووقت الاجتماع');
      const meetingDatetime = `${dateVal}T${timeVal}`;
      const activeLocBtn = document.querySelector('#mLocationTypeControl button.active');
      const isOnlineOnly = activeLocBtn?.dataset.val === 'online';
      const locDetail = isOnlineOnly ? document.getElementById('mLocLink').value : document.getElementById('mLocDetail').value;

      const goal = document.getElementById('mGoal').value.trim();
      const notes = document.getElementById('mNotes').value.trim();
      const summaryText = [goal, notes].filter(Boolean).join(' — ') || null;

      const rawDept = document.getElementById('mDept').value;
      const meetingDeptId = rawDept === 'heads' ? (CURRENT_USER.department_id || null) : Number(rawDept);
      const { data: newMeeting, error } = await sb.from('meetings').insert({
        title: document.getElementById('mTitle').value,
        meeting_type: document.getElementById('mType').value,
        department_id: meetingDeptId,
        meeting_datetime: meetingDatetime,
        location_type: document.getElementById('mLocation').value,
        location_detail: locDetail || null,
        summary: summaryText,
        organizer_id: CURRENT_USER.id,
        status: 'scheduled'
      }).select().single();
      if (error) throw error;
      await sb.from('conversations').insert({ conversation_type: 'meeting', meeting_id: newMeeting.id, title: 'نقاش: ' + newMeeting.title });

      const agendaText = document.getElementById('mAgenda').value.trim();
      if (agendaText) {
        const items = agendaText.split('\n').map(s => s.trim()).filter(Boolean);
        let order = 1;
        for (const item of items) {
          await sb.from('meeting_agenda').insert({ meeting_id: newMeeting.id, item_text: item, item_order: order++ });
        }
      }

      const checkedBoxes = [...document.querySelectorAll('.attendeeCheck:checked')];
      const meetingDateStr = fmtDateAr(newMeeting.meeting_datetime);
      const meetingTimeStr = (newMeeting.meeting_datetime || '').slice(11, 16);
      for (const cb of checkedBoxes) {
        const uid = Number(cb.value);
        const toggleBtn = document.querySelector(`.attendance-toggle[data-user="${uid}"] button.active`);
        const attType = toggleBtn && toggleBtn.dataset.val === 'remote' ? 'remote' : 'in_person';
        await sb.from('meeting_attendees').insert({ meeting_id: newMeeting.id, user_id: uid, attendance_status: 'invited', attendance_type: attType });
        if (sendInvites) {
          const typeLabel = attType === 'remote' ? 'عن بعد' : 'حضوري';
          const linkPart = attType === 'remote' && newMeeting.location_detail ? ` — رابط الاجتماع: ${newMeeting.location_detail}` : '';
          await sb.from('notifications').insert({
            user_id: uid,
            title: 'تمت دعوتك إلى اجتماع جديد',
            body: `${newMeeting.title} — ${meetingDateStr} الساعة ${meetingTimeStr} — نوع حضورك: ${typeLabel}${linkPart}`,
            link: '#meeting_detail/' + newMeeting.id
          });
        }
      }
      toast(sendInvites ? 'تم جدولة الاجتماع وإرسال الدعوات بنجاح' : 'تم حفظ الاجتماع (بدون إرسال الدعوات الآن)', 'success');
      location.hash = '#meetings';
      renderApp();
    } catch (err) {
      errBox.textContent = err.message; errBox.classList.add('show');
    }
  }

  document.getElementById('mSaveDraftBtn').addEventListener('click', () => submitMeeting(false));
  document.getElementById('mSaveLaterBtn').addEventListener('click', () => submitMeeting(false));
  document.getElementById('createMeetingForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const sendInvites = document.getElementById('mSendInvitesNow').checked;
    await submitMeeting(sendInvites);
  });

  updateSummary();
}

  if (error || !m) { body.innerHTML = '<p class="error-msg show">الاجتماع غير موجود</p>'; return; }

  const [{ data: attendees }, { data: agenda }, { data: decisions }, { data: tasks }, { data: conv }, { data: allUsers }, { data: prepReports }] = await Promise.all([
    sb.from('meeting_attendees').select('*, users(full_name)').eq('meeting_id', meetingId),
    sb.from('meeting_agenda').select('*').eq('meeting_id', meetingId).order('item_order'),

      } catch (err) {
        errBox.textContent = err.message; errBox.classList.add('show');
      }
    });
  }

  document.getElementById('printMinutesBtn').addEventListener('click', () => printMeetingMinutes({ ...m, attendees, agenda, decisions, tasks }));

  document.getElementById('prepReportSubmitBtn').addEventListener('click', async () => {
    const errBox = document.getElementById('prepReportError');
    errBox.classList.remove('show');
    const notes = document.getElementById('prepReportNotes').value.trim();
    const fileInput = document.getElementById('prepReportFile');
    const file = fileInput.files[0];
    if (!notes && !file) { errBox.textContent = 'اكتب ملاحظة أو ارفع ملفًا على الأقل'; errBox.classList.add('show'); return; }
    try {
      let attachment = null;
      if (file) {
        const filePath = `meeting-prep/${meetingId}/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${(file.name.split('.').pop()||'bin').replace(/[^a-zA-Z0-9]/g,'').slice(0,8)||'bin'}`;
        const { error: upErr } = await sb.storage.from('maintenance').upload(filePath, file, { contentType: file.type || undefined });
        if (upErr) throw upErr;
        const { data: urlData } = sb.storage.from('maintenance').getPublicUrl(filePath);
        attachment = { url: urlData.publicUrl, name: file.name, type: file.type };
      }
      const { error } = await sb.from('meeting_preparation_reports').insert({
        meeting_id: meetingId, user_id: CURRENT_USER.id, notes: notes || null,
        file_url: attachment ? attachment.url : null,
        file_name: attachment ? attachment.name : null,
        file_type: attachment ? attachment.type : null
      });
      if (error) throw error;
      toast('تم رفع تقرير التحضير بنجاح', 'success');
      location.hash = '#meeting_detail/' + meetingId;
      renderApp();
    } catch (err) {
      errBox.textContent = err.message; errBox.classList.add('show');
    }
  });

  // ============ رفع محضر الاجتماع ============
  const minutesUploadBtn = document.getElementById('mMinutesUploadBtn');
  if (minutesUploadBtn) {
    minutesUploadBtn.addEventListener('click', async () => {
      const errBox = document.getElementById('mMinutesError');
      errBox.classList.remove('show');
      const notes = document.getElementById('mMinutesNotes').value.trim();
      const fileInput = document.getElementById('mMinutesFile');
      const file = fileInput.files[0];
      if (!file) { errBox.textContent = 'اختر ملف المحضر أولًا'; errBox.classList.add('show'); return; }
      if (file.size > 10 * 1024 * 1024) { errBox.textContent = 'الحد الأقصى لحجم الملف 10MB'; errBox.classList.add('show'); return; }
      minutesUploadBtn.disabled = true;
      minutesUploadBtn.innerHTML = '<span data-lucide="loader" style="width:13px;height:13px;"></span> جاري الرفع...';
      try {
        const ext = (file.name.split('.').pop() || 'bin').replace(/[^a-zA-Z0-9]/g,'').slice(0,8) || 'bin';
        const filePath = `meeting-minutes/${meetingId}/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
        const { error: upErr } = await sb.storage.from('maintenance').upload(filePath, file, { contentType: file.type || undefined });
        if (upErr) throw upErr;
        const { data: urlData } = sb.storage.from('maintenance').getPublicUrl(filePath);
        const { error: updErr } = await sb.from('meetings').update({
          minutes_file_url: urlData.publicUrl,
          minutes_file_name: file.name,
          minutes_uploaded_at: new Date().toISOString(),
          minutes_uploaded_by: CURRENT_USER.id,
          minutes_notes: notes || null
        }).eq('id', meetingId);
        if (updErr) throw updErr;
        // إشعار كل الحضور
        const attRows = (attendees || []).filter(a => a.user_id !== CURRENT_USER.id);
        if (attRows.length) {
          await sb.from('notifications').insert(attRows.map(a => ({
            user_id: a.user_id,
            title: '📄 تم رفع محضر الاجتماع',
            body: `محضر اجتماع "${m.title}" متاح للتحميل`,
            link: '#meeting_detail/' + meetingId
          })));
        }
        toast('تم رفع المحضر بنجاح', 'success');
        renderApp();
      } catch (err) {
        errBox.textContent = err.message || 'فشل رفع المحضر';
        errBox.classList.add('show');
        minutesUploadBtn.disabled = false;
        minutesUploadBtn.innerHTML = '<span data-lucide="upload" style="width:13px;height:13px;"></span> رفع المحضر';
        if (window.lucide) lucide.createIcons();
      }
    });
  }

  const minutesRemoveBtn = document.getElementById('mMinutesRemoveBtn');
  if (minutesRemoveBtn) {
    minutesRemoveBtn.addEventListener('click', async () => {
      if (!confirm('حذف محضر الاجتماع؟')) return;
      const { error } = await sb.from('meetings').update({
        minutes_file_url: null, minutes_file_name: null,
        minutes_uploaded_at: null, minutes_uploaded_by: null, minutes_notes: null
      }).eq('id', meetingId);
      if (error) { toast(error.message, 'error'); return; }
      toast('تم حذف المحضر', 'success');
      renderApp();
    });
  }

  if (canManage) {
    document.getElementById('updateStatusBtn').addEventListener('click', async () => {
      const errBox = document.getElementById('statusError');
      errBox.classList.remove('show');
      const newStatus = document.getElementById('statusSelect').value;
      if (newStatus === 'closed') {
        const { data: incomplete } = await sb.from('action_items').select('id, title, delay_reason').eq('meeting_id', meetingId).neq('status', 'completed');
        const withoutReason = (incomplete || []).filter(t => !t.delay_reason || !t.delay_reason.trim());
        if (withoutReason.length) {
          errBox.textContent = 'لا يمكن إغلاق الاجتماع: توجد مهام غير مكتملة بدون سبب تأخير: ' + withoutReason.map(t => t.title).join('، ');
          errBox.classList.add('show');
          return;
        }
      }
      const { error: updErr } = await sb.from('meetings').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', meetingId);
      if (updErr) { errBox.textContent = updErr.message; errBox.classList.add('show'); return; }
      renderApp();
    });
  }

  await loadChatMessages(conversationId);
  wireChatInputBar((text, msgType, replyToId, attachment, textColor, textAlign) => sendChatMessage(conversationId, text, msgType, replyToId, attachment, textColor, textAlign), conversationId);
}

// ============ تصنيف أيقونة المرفق حسب نوعه ============
function attachmentIcon(fileName, fileType) {
  const ext = (fileName || '').split('.').pop().toLowerCase();
  if ((fileType && fileType.includes('pdf')) || ext === 'pdf') return { icon: 'file-text', color: '#D32F2F' };
  if (['xls','xlsx'].includes(ext) || (fileType && fileType.includes('sheet'))) return { icon: 'file-spreadsheet', color: '#1F7A3A' };
  if (['doc','docx'].includes(ext) || (fileType && fileType.includes('word'))) return { icon: 'file-text', color: '#2F80C9' };
  if (fileType && fileType.startsWith('image/')) return { icon: 'image', color: '#D6A437' };
  return { icon: 'paperclip', color: '#6B756F' };
}

async function loadChatMessages(conversationId) {
  const { data: messages } = await sb.from('messages').select('*, users(full_name)').eq('conversation_id', conversationId).order('sent_at', { ascending: true });
  const box = document.getElementById('chatMessages');
  if (!box) return;
  if (!messages || !messages.length) { box.innerHTML = '<p class="empty-state">لا توجد رسائل بعد</p>'; return; }
  const typeLabel = { important: 'مهمة', urgent: 'عاجلة', follow_up: 'متابعة', decision: 'قرار' };
  const byId = {}; messages.forEach(m => byId[m.id] = m);
  const pinnedMessages = messages.filter(m => m.is_pinned);
  const pinnedHtml = pinnedMessages.length ? `
    <div style="background:rgba(214,164,55,0.08); border:1px solid rgba(214,164,55,0.3); border-radius:10px; padding:10px 12px; margin-bottom:12px;">
      <div style="font-size:11.5px; font-weight:700; color:#9A6B12; display:flex; align-items:center; gap:5px; margin-bottom:6px;"><span data-lucide="pin" style="width:12px;height:12px;"></span> رسائل مثبتة (${pinnedMessages.length})</div>
      ${pinnedMessages.map(m => `<div style="font-size:12px; padding:4px 0; display:flex; justify-content:space-between; gap:8px;"><span><strong>${m.users?esc(m.users.full_name):''}:</strong> ${esc((m.message_text||'').slice(0,60))}</span><button onclick="togglePinMessage(${m.id}, false)" style="background:none;border:none;cursor:pointer;color:#9A6B12;" title="إلغاء التثبيت"><span data-lucide="pin-off" style="width:12px;height:12px;"></span></button></div>`).join('')}
    </div>` : '';
  box.innerHTML = pinnedHtml + messages.map(m => {
    const replyMsg = m.reply_to_message_id ? byId[m.reply_to_message_id] : null;
    const isImage = m.attachment_type && m.attachment_type.startsWith('image/');
    const attIcon = m.attachment_url ? attachmentIcon(m.attachment_name, m.attachment_type) : null;
    return `
    <div class="msg-bubble ${m.sender_id === CURRENT_USER.id ? 'own' : ''} ${m.message_type && m.message_type !== 'normal' ? 'type-' + m.message_type : ''}" data-msg-id="${m.id}">
      <div class="meta">${m.users ? esc(m.users.full_name) : ''} · ${fmtDate(m.sent_at)} ${m.message_type && m.message_type !== 'normal' ? `<span class="type-tag ${m.message_type}">${typeLabel[m.message_type]}</span>` : ''} ${m.is_pinned ? '<span data-lucide="pin" style="width:11px;height:11px;display:inline-block;vertical-align:-1px;color:#D6A437;"></span>' : ''}
        <button type="button" class="reply-btn" onclick="togglePinMessage(${m.id}, ${!m.is_pinned})" style="background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:11px;" title="${m.is_pinned ? 'إلغاء التثبيت' : 'تثبيت الرسالة'}"><span data-lucide="pin" style="width:11px;height:11px;"></span></button>
        <button type="button" class="reply-btn" onclick="setReplyTarget(${m.id}, '${esc(m.message_text).replace(/'/g,"")}', '${m.users ? esc(m.users.full_name).replace(/'/g,"") : ""}')" style="background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:11px; margin-right:auto;">↩️ رد</button>
      </div>
      ${replyMsg ? `<div style="background:rgba(0,0,0,0.05); border-right:2px solid var(--primary); padding:4px 8px; border-radius:5px; font-size:11.5px; margin-bottom:5px; color:var(--text-muted);">${esc(replyMsg.users ? '' : '')}↩️ ${esc((replyMsg.message_text||'').slice(0,50))}</div>` : ''}
      ${m.attachment_url ? (isImage ? `<img src="${m.attachment_url}" style="max-width:220px; border-radius:8px; margin-bottom:5px; display:block;">` : `<a href="${m.attachment_url}" target="_blank" style="display:flex; align-items:center; gap:6px; background:rgba(0,0,0,0.05); padding:6px 10px; border-radius:6px; margin-bottom:5px; font-size:12.5px; color:${attIcon.color};"><span data-lucide="${attIcon.icon}" style="width:14px;height:14px;"></span> <span style="color:#24352E;">${esc(m.attachment_name || 'ملف مرفق')}</span></a>`) : ''}
      <div class="msg-text" style="${m.text_color ? `color:${m.text_color};` : ''} text-align:${m.text_align || 'right'};">${renderMsgText(m.message_text)}</div>
    </div>`;
  }).join('');
  box.scrollTop = box.scrollHeight;
  if (window.lucide) lucide.createIcons();
  // تعليم مقروء
  await sb.from('message_reads').upsert(
    messages.map(m => ({ message_id: m.id, user_id: CURRENT_USER.id, read_at: new Date().toISOString() })),
    { onConflict: 'message_id,user_id' }
  );
}

window.togglePinMessage = async function(messageId, pin) {
  const { error } = await sb.from('messages').update({ is_pinned: pin }).eq('id', messageId);
  if (error) { toast(error.message, 'error'); return; }
  toast(pin ? 'تم تثبيت الرسالة' : 'تم إلغاء التثبيت', 'success');
  const activeConvId = (typeof __currentTaskConvId !== 'undefined' && __currentTaskConvId) || (typeof __activeConversationId !== 'undefined' && __activeConversationId);
  if (activeConvId) await loadChatMessages(activeConvId);
};

async function sendChatMessage(conversationId, text, msgType, replyToId, attachment, textColor, textAlign) {
  if (!text) return;
  await sb.from('conversation_members').upsert({ conversation_id: conversationId, user_id: CURRENT_USER.id }, { onConflict: 'conversation_id,user_id' });
  await sb.from('messages').insert({
    conversation_id: conversationId, sender_id: CURRENT_USER.id, message_text: text, message_type: msgType || 'normal',
    reply_to_message_id: replyToId || null,
    attachment_url: attachment ? attachment.url : null,
    attachment_name: attachment ? attachment.name : null,
    attachment_type: attachment ? attachment.type : null,
    text_color: textColor || null,
    text_align: textAlign || 'right'
  });
  await loadChatMessages(conversationId);
}

// ============ حالة صفحة المهام (محلية) ============
const TasksState = { all: [], page: 1, pageSize: 10, sortKey: 'due_date', sortDir: 'asc', search: '', statusFilter: '', priorityFilter: '' };

async function pageTasks(body, urlQuery) {
  body.innerHTML = `
    <div class="kpi-grid" id="tasksKpi">
      ${[1,2,3,4].map(() => `<div class="kpi-card"><div class="skeleton skeleton-row" style="width:42px;height:42px;border-radius:8px;"></div><div class="skeleton skeleton-row" style="width:60%;margin-top:12px;"></div></div>`).join('')}
    </div>
    <div class="panel"><div class="panel-body"><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div></div></div>
  `;

  let query = sb.from('action_items').select('*, users(full_name), meetings(title)').order('due_date', { ascending: true });
  if (CURRENT_USER.role === 'employee') query = query.eq('assigned_to', CURRENT_USER.id);
  else if (!['admin','company_manager'].includes(CURRENT_USER.role)) query = query.eq('department_id', CURRENT_USER.department_id);
  const { data: tasks, error } = await query;
  if (error) { body.innerHTML = `<p class="error-msg show">${esc(error.message)}</p>`; return; }

  window.__tasks = tasks || [];
  TasksState.all = tasks || [];
  TasksState.page = 1;
  TasksState.search = ''; TasksState.statusFilter = ''; TasksState.priorityFilter = '';
  if (urlQuery) {
    if (urlQuery.status) TasksState.statusFilter = urlQuery.status === 'delayed' ? 'delayed' : urlQuery.status;
    if (urlQuery.search) TasksState.search = urlQuery.search;
  }

  renderTasksKpi(TasksState.all);
  renderTasksShell(body);
}

function renderTasksKpi(all) {
  const total = all.length;
  const inProgress = all.filter(t => t.status === 'in_progress').length;
  const completed = all.filter(t => t.status === 'completed').length;
  const today = new Date().toISOString().slice(0,10);
  const overdue = all.filter(t => t.status === 'delayed' || (t.due_date && t.due_date < today && t.status !== 'completed')).length;
  const box = document.getElementById('tasksKpi');
  if (!box) return;
  box.innerHTML = `
    <div class="kpi-card clickable-stat-card" data-target-page="tasks" data-scroll-target="tasks-table" aria-label="عرض كل المهام"><div class="kpi-icon c-blue"><span data-lucide="check-circle-2" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;color:var(--success);"></span></div><div class="kpi-value mono-num">${total}</div><div class="kpi-label">إجمالي المهام</div></div>
    <div class="kpi-card clickable-stat-card" data-target-page="tasks" data-filter-key="status" data-filter-value="in_progress" data-scroll-target="tasks-table" aria-label="عرض المهام قيد التنفيذ"><div class="kpi-icon c-gold">⏳</div><div class="kpi-value mono-num">${inProgress}</div><div class="kpi-label">قيد التنفيذ</div></div>
    <div class="kpi-card clickable-stat-card" data-target-page="tasks" data-filter-key="status" data-filter-value="completed" data-scroll-target="tasks-table" aria-label="عرض المهام المكتملة"><div class="kpi-icon c-green"><span data-lucide="flag" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${completed}</div><div class="kpi-label">مكتملة</div></div>
    <div class="kpi-card clickable-stat-card" data-target-page="tasks" data-filter-key="status" data-filter-value="delayed" data-scroll-target="tasks-table" aria-label="عرض المهام المتأخرة"><div class="kpi-icon c-red"><span data-lucide="alert-triangle" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;color:var(--danger);"></span></div><div class="kpi-value mono-num">${overdue}</div><div class="kpi-label">متأخرة</div></div>
  `;
}

function applyTasksFilters() {
  let rows = [...TasksState.all];
  if (TasksState.search) {
    const q = TasksState.search.toLowerCase();
    rows = rows.filter(t => (t.title||'').toLowerCase().includes(q) || (t.meetings?.title||'').toLowerCase().includes(q) || (t.users?.full_name||'').toLowerCase().includes(q));
  }
  if (TasksState.statusFilter) rows = rows.filter(t => t.status === TasksState.statusFilter);
  if (TasksState.priorityFilter) rows = rows.filter(t => t.priority === TasksState.priorityFilter);
  rows.sort((a, b) => {
    let va = a[TasksState.sortKey] || '', vb = b[TasksState.sortKey] || '';
    if (va < vb) return TasksState.sortDir === 'asc' ? -1 : 1;
    if (va > vb) return TasksState.sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  return rows;
}

    <div class="panel">
      <div class="panel-body">
        <div class="table-toolbar">

          <div class="search-wrap"><input type="text" id="tSearchInput" placeholder="بحث بالعنوان أو الاجتماع أو المسؤول..." value="${esc(TasksState.search)}"><span class="search-icon"></span></div>
          <span class="toolbar-divider"></span>
          <div class="filter-select-wrap"><span class="fsw-icon" data-lucide="funnel" style="width:15px;height:15px;"></span>
          <select id="tStatusFilter">
            <option value="">كل الحالات</option>
            <option value="not_started" ${TasksState.statusFilter==='not_started'?'selected':''}>لم تبدأ</option>
            <option value="in_progress" ${TasksState.statusFilter==='in_progress'?'selected':''}>قيد التنفيذ</option>
            <option value="completed" ${TasksState.statusFilter==='completed'?'selected':''}>مكتملة</option>
            <option value="delayed" ${TasksState.statusFilter==='delayed'?'selected':''}>متأخرة</option>
          </select></div>
          <div class="filter-select-wrap"><span class="fsw-icon" data-lucide="flag" style="width:15px;height:15px;"></span>
          <select id="tPriorityFilter">
            <option value="">كل الأولويات</option>
            <option value="high" ${TasksState.priorityFilter==='high'?'selected':''}>عالية</option>
            <option value="medium" ${TasksState.priorityFilter==='medium'?'selected':''}>متوسطة</option>
            <option value="low" ${TasksState.priorityFilter==='low'?'selected':''}>منخفضة</option>
          </select></div>
          <div class="filter-select-wrap"><span class="fsw-icon" data-lucide="list" style="width:15px;height:15px;"></span>
          <select id="tPageSize">
            <option value="10" ${TasksState.pageSize===10?'selected':''}>10 / صفحة</option>
            <option value="25" ${TasksState.pageSize===25?'selected':''}>25 / صفحة</option>

          </select></div>
        </div>
        <div id="tasksTableWrap"></div>

      </div>
    </div>
    <div id="taskModalHost"></div>
  `;
  renderTasksKpi(TasksState.all);
  renderTasksTableBody();
  wireTasksToolbar();
}

function renderTasksTableBody() {
  const rows = applyTasksFilters();
  const totalPages = Math.max(1, Math.ceil(rows.length / TasksState.pageSize));
  if (TasksState.page > totalPages) TasksState.page = totalPages;
  const startIdx = (TasksState.page - 1) * TasksState.pageSize;
  const pageRows = rows.slice(startIdx, startIdx + TasksState.pageSize);
  const sortArrow = (key) => TasksState.sortKey === key ? (TasksState.sortDir === 'asc' ? '▲' : '▼') : '';
  const today = new Date().toISOString().slice(0,10);

  const wrap = document.getElementById('tasksTableWrap');
  if (!wrap) return;

  if (!rows.length) {
    wrap.innerHTML = `<div class="empty-illust"><div class="icon"><span data-lucide="check-circle-2" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;color:var(--success);"></span></div><h4>لا توجد مهام مطابقة</h4><p>${TasksState.search || TasksState.statusFilter || TasksState.priorityFilter ? 'جرّب تغيير الفلاتر' : 'المهام تُضاف من داخل تفاصيل الاجتماع'}</p></div>`;
    return;
  }

  wrap.innerHTML = `
    <div style="overflow-x:auto;">
    <table class="adv-table">
      <thead><tr>
        <th class="sortable" data-sort="title">المهمة <span class="sort-arrow">${sortArrow('title')}</span></th>
        <th>الاجتماع</th>
        <th>المسؤول</th>
        <th class="sortable" data-sort="due_date">التسليم <span class="sort-arrow">${sortArrow('due_date')}</span></th>
        <th class="sortable" data-sort="priority">الأولوية <span class="sort-arrow">${sortArrow('priority')}</span></th>
        <th>الإنجاز</th>
        <th class="sortable" data-sort="status">الحالة <span class="sort-arrow">${sortArrow('status')}</span></th>
        <th>إجراءات</th>
      </tr></thead>
      <tbody>
        ${pageRows.map(t => {
          const overdue = t.due_date && t.due_date < today && t.status !== 'completed';
          return `<tr>
            <td style="font-weight:600; cursor:pointer;" onclick="openTaskDrawer(${t.id})">${esc(t.title)}</td>
            <td>${t.meetings ? esc(t.meetings.title) : '-'}</td>
            <td>${t.users ? esc(t.users.full_name) : '-'}</td>
            <td class="mono-num">${t.due_date || '-'} ${overdue ? '<span style="color:var(--danger); font-size:11px;"><span data-lucide="alert-triangle" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;color:var(--danger);"></span></span>' : ''}</td>
            <td>${badgeHtml(t.priority, 'priority')}</td>
            <td style="width:120px;">
              <div style="display:flex; align-items:center; gap:6px;">
                <div style="flex:1; height:6px; background:var(--bg); border-radius:3px; overflow:hidden;"><div style="height:100%; width:${t.progress_percent}%; background:${t.progress_percent>=100?'var(--success)':t.progress_percent>=50?'var(--warning)':'var(--danger)'};"></div></div>
                <span class="mono-num" style="font-size:11px; color:var(--text-muted);">${t.progress_percent}%</span>
              </div>
            </td>
            <td>${badgeHtml(overdue ? 'delayed' : t.status, 'task_status')}</td>
            <td>
              <div class="row-actions">
                <button title="عرض وتعديل" onclick="openTaskModal(${t.id})"><span data-lucide="pencil" style="width:13px;height:13px;"></span></button>
                <button title="معاينة سريعة" onclick="openTaskDrawer(${t.id})"><span data-lucide="eye" style="width:13px;height:13px;"></span></button>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
    <div class="pagination">
      <span>عرض ${startIdx + 1}-${Math.min(startIdx + TasksState.pageSize, rows.length)} من ${rows.length}</span>
      <div class="pages" id="tPaginationPages"></div>
    </div>
    <div class="drawer-overlay" id="tDrawerOverlay" onclick="closeTaskDrawer()"></div>
    <div class="drawer" id="tDrawer"></div>
  `;

  wrap.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (TasksState.sortKey === key) TasksState.sortDir = TasksState.sortDir === 'asc' ? 'desc' : 'asc';
      else { TasksState.sortKey = key; TasksState.sortDir = 'asc'; }
      renderTasksTableBody();
    });
  });
  renderTasksPagination(totalPages);
}

function renderTasksPagination(totalPages) {
  const box = document.getElementById('tPaginationPages');
  if (!box) return;
  let html = '';
  for (let p = 1; p <= totalPages; p++) {
    if (totalPages > 7 && p !== 1 && p !== totalPages && Math.abs(p - TasksState.page) > 1) {
      if (p === 2 || p === totalPages - 1) html += `<span style="padding:0 4px;">…</span>`;
      continue;
    }
    html += `<button class="${p === TasksState.page ? 'active' : ''}" data-page="${p}">${p}</button>`;
  }
  box.innerHTML = html;
  box.querySelectorAll('button[data-page]').forEach(btn => {
    btn.addEventListener('click', () => { TasksState.page = Number(btn.dataset.page); renderTasksTableBody(); });
  });
}

function wireTasksToolbar() {
  let searchTimer;
  document.getElementById('tSearchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { TasksState.search = e.target.value; TasksState.page = 1; renderTasksTableBody(); }, 250);
  });
  document.getElementById('tStatusFilter').addEventListener('change', (e) => { TasksState.statusFilter = e.target.value; TasksState.page = 1; renderTasksTableBody(); });
  document.getElementById('tPriorityFilter').addEventListener('change', (e) => { TasksState.priorityFilter = e.target.value; TasksState.page = 1; renderTasksTableBody(); });
  document.getElementById('tPageSize').addEventListener('change', (e) => { TasksState.pageSize = Number(e.target.value); TasksState.page = 1; renderTasksTableBody(); });
  document.getElementById('tResetFiltersBtn').addEventListener('click', () => {
    TasksState.search = ''; TasksState.statusFilter = ''; TasksState.priorityFilter = ''; TasksState.page = 1;
    renderTasksShell(document.getElementById('pageBody'));
  });
}

// ============ مشروع المهمة ============
window.openTaskProject = async function(taskId, task) {
  const { data: project } = await sb.from('task_projects').select('*, users(full_name)').eq('task_id', taskId).maybeSingle();
  document.getElementById('taskModalOverlay').remove();

  if (!project) {
    // المسؤول عن المهمة فقط يقدر يفتح مشروع
    if (task.assigned_to !== CURRENT_USER.id && !['admin','company_manager'].includes(CURRENT_USER.role)) {
      alert('فقط المسؤول عن المهمة يمكنه فتح مشروع لها');
      return;
    }
    const { data: allUsers } = await sb.from('users').select('id, full_name').eq('is_active', true).order('full_name');
    document.getElementById('taskModalHost').innerHTML = `
      <div class="modal-overlay" id="projOverlay">
        <div class="panel modal-box">
          <div class="panel-header"><h3>فتح مشروع للمهمة: ${esc(task.title)}</h3><button class="modal-close-x" onclick="document.getElementById('projOverlay').remove()"><span data-lucide="x" style="width:14px;height:14px;"></span></button></div>
          <div class="panel-body">
            <div class="error-msg" id="newProjError"></div>
            <div class="field"><label>اسم المشروع</label><input type="text" id="npName" required value="${esc('مشروع تنفيذ: ' + task.title)}"></div>
            <div class="field"><label>أعضاء المشروع</label>
              <select id="npMembers" multiple size="6" style="width:100%; padding:8px;">
                ${(allUsers||[]).filter(u => u.id !== CURRENT_USER.id).map(u => `<option value="${u.id}">${esc(u.full_name)}</option>`).join('')}
              </select>
              <small style="color:var(--text-muted);">اضغط Ctrl (أو Cmd) لاختيار أكثر من عضو</small>
            </div>
            <button class="btn btn-primary" id="npSaveBtn">إنشاء المشروع</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('npSaveBtn').addEventListener('click', async () => {
      const errBox = document.getElementById('newProjError');
      const name = document.getElementById('npName').value.trim();
      const selected = [...document.getElementById('npMembers').selectedOptions].map(o => Number(o.value));
      if (!name) { errBox.textContent = 'اسم المشروع مطلوب'; errBox.classList.add('show'); return; }
      try {
        const { data: newProj, error } = await sb.from('task_projects').insert({
          task_id: taskId, project_name: name, lead_user_id: CURRENT_USER.id, status: 'active'
        }).select().single();
        if (error) throw error;

        const insertMember = (uid, part) => sb.from('task_project_members').insert({ task_project_id: newProj.id, user_id: uid, assigned_part: part || null });
        await insertMember(CURRENT_USER.id, 'المسؤول الرئيسي');
        for (const uid of selected) await insertMember(uid, null);

        const { data: conv } = await sb.from('conversations').insert({ conversation_type: 'task_project', task_project_id: newProj.id, title: 'شات مشروع: ' + name }).select().single();
        const addConvMember = (uid) => sb.from('conversation_members').insert({ conversation_id: conv.id, user_id: uid });
        await addConvMember(CURRENT_USER.id);
        for (const uid of selected) await addConvMember(uid);

        document.getElementById('projOverlay').remove();
        openTaskProject(taskId, task);
      } catch (err) {
        errBox.textContent = err.message; errBox.classList.add('show');
      }
    });
    return;
  }

  // عرض المشروع الموجود
  const [{ data: members }, { data: updates }] = await Promise.all([
    sb.from('task_project_members').select('*, users(full_name)').eq('task_project_id', project.id),
    sb.from('task_project_updates').select('*, users(full_name)').eq('task_project_id', project.id).order('created_at', { ascending: false })
  ]);
  const { data: allUsers } = await sb.from('users').select('id, full_name, department_id').eq('is_active', true).order('full_name');
  const { data: allDepts } = await sb.from('departments').select('*').order('name');
  const isLead = project.lead_user_id === CURRENT_USER.id;
  const myMembership = (members || []).find(mm => mm.user_id === CURRENT_USER.id);
  const { data: projConv } = await sb.from('conversations').select('id').eq('task_project_id', project.id).maybeSingle();

  // تحديث تلقائي لحالة "متأخرة" لو تجاوز الموعد
  const today = new Date().toISOString().slice(0,10);
  for (const mm of (members||[])) {
    if (mm.end_date && mm.end_date < today && mm.status !== 'completed' && mm.status !== 'delayed') {
      await sb.from('task_project_members').update({ status: 'delayed' }).eq('id', mm.id);
      mm.status = 'delayed';
    }
  }

  document.getElementById('taskModalHost').innerHTML = `
    <div class="modal-overlay" id="projOverlay">
      <div class="panel modal-box" style="width:640px;">
        <div class="panel-header"><h3>${esc(project.project_name)}</h3><button class="modal-close-x" onclick="document.getElementById('projOverlay').remove()"><span data-lucide="x" style="width:14px;height:14px;"></span></button></div>
        <div class="panel-body">
          <p><strong>المسؤول الرئيسي:</strong> ${project.users ? esc(project.users.full_name) : '-'} &nbsp;|&nbsp; <strong>إنجاز المشروع:</strong> ${project.progress_percent}%</p>
          <div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">
            ${projConv ? `<button class="btn btn-outline btn-sm" id="groupChatBtn"><span data-lucide="users" style="width:14px;height:14px;"></span> شات المشروع الجماعي</button>` : ''}
            <button class="btn btn-outline btn-sm" id="viewReportBtn"><span data-lucide="bar-chart-3" style="width:14px;height:14px;"></span> تقرير الإنجاز</button>

          <h4 style="margin-top:16px;"><span data-lucide="table" style="width:14px;height:14px;vertical-align:-2px;"></span> جدول متابعة المشاركين</h4>

            <tbody>
            ${(members||[]).map((mm,i) => {

              const pColor = mm.status === 'delayed' ? '#D32F2F' : (pct >= 70 ? '#1F7A3A' : pct >= 40 ? '#D6A437' : '#2F80C9');
              return `<tr>
              <td><div style="display:flex; align-items:center; gap:6px;"><div class="avatar-gradient avatar-g${i%8}" style="width:26px; height:26px; font-size:10px;">${esc((mm.users?.full_name||'').trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join(''))}</div>${mm.users ? esc(mm.users.full_name) : '-'}</div></td>
              <td>${(allDepts||[]).find(d=>d.id===mm.department_id)?.name || '-'}</td>
              <td style="max-width:160px;">${esc(mm.subtask_title || mm.assigned_part || '-')}</td>
              <td>${badgeHtml(mm.status, 'task_status')}</td>
              <td style="min-width:110px;"><div style="display:flex;align-items:center;gap:6px;"><div style="flex:1;height:7px;background:#ECEFE9;border-radius:999px;overflow:hidden;min-width:50px;"><div style="height:100%;width:${pct}%;background:${pColor};border-radius:999px;"></div></div><span style="font-weight:700;font-size:11.5px;color:${pColor};">${pct}%</span></div></td>
              <td style="font-size:11.5px;">${mm.end_date || mm.due_date || '-'}</td>
              <td style="max-width:140px;font-size:11.5px;color:var(--text-muted);">${esc(mm.notes || '-')}</td>
              <td>
                <div style="display:flex;gap:4px;">
                  ${mm.user_id !== CURRENT_USER.id ? `<button class="btn btn-outline btn-sm" title="تواصل" onclick="openDirectChatFromDirectory(${mm.user_id}, '${esc((mm.users?.full_name||'').replace(/'/g,''))}')" style="padding:4px 7px;"><span data-lucide="message-circle" style="width:12px;height:12px;"></span></button>` : ''}
                  ${isLead && mm.user_id !== CURRENT_USER.id ? `<button class="btn btn-outline btn-sm" title="إرسال تذكير" data-remind="${mm.user_id}" data-remind-title="${esc((mm.subtask_title||mm.assigned_part||'مهمتك الفرعية').replace(/"/g,''))}" style="padding:4px 7px;color:#D6A437;border-color:#D6A437;"><span data-lucide="bell" style="width:12px;height:12px;"></span></button>` : ''}
                  ${isLead && mm.status !== 'completed' ? `<button class="btn btn-outline btn-sm" title="إغلاق المهمة الفرعية" data-close-member="${mm.id}" style="padding:4px 7px;color:#1F7A3A;border-color:#1F7A3A;"><span data-lucide="check-circle-2" style="width:12px;height:12px;"></span></button>` : ''}

          <div class="field"><label>عنوان المهمة الفرعية</label><input type="text" id="amTitle" placeholder="مثال: تصميم الواجهة الرئيسية"></div>

          <div class="field"><label>الأولوية</label><select id="amPriority"><option value="high">عالية</option><option value="medium" selected>متوسطة</option><option value="low">منخفضة</option></select></div>
          <div style="display:flex; gap:10px;">
            <div class="field" style="flex:1;"><label>تاريخ البداية</label><input type="date" id="amStartDate"></div>
            <div class="field" style="flex:1;"><label>مدة التنفيذ (أيام)</label><input type="number" id="amDuration" min="1" placeholder="مثال: 5"></div>
          </div>
          <div class="field"><label>تاريخ الانتهاء (يُحسب تلقائيًا)</label><input type="date" id="amEndDate" readonly style="background:var(--bg);"></div>
          <button class="btn btn-outline btn-sm" id="amSaveBtn">إضافة العضو والمهمة الفرعية</button>
          ` : ''}

          ${myMembership ? `
          <h4 style="margin-top:16px;"><span data-lucide="edit-3" style="width:14px;height:14px;vertical-align:-2px;"></span> تحديثك: ما نسبة الإنجاز الحالية؟</h4>
          <div class="error-msg" id="myUpdateError"></div>
          <div class="field"><label>وصف ما تم إنجازه</label><textarea id="muWork" rows="2"></textarea></div>
          <div class="field"><label>نسبة التقدم (%)</label><input type="number" id="muProgress" min="0" max="100" value="${myMembership.progress_percent}"></div>
          <div class="field"><label><input type="checkbox" id="muDelayed"> يوجد تأخير</label></div>
          <div class="field"><label>سبب التأخير (إن وجد)</label><input type="text" id="muDelayReason"></div>
          <button class="btn btn-primary btn-sm" id="muSaveBtn">حفظ تحديثي</button>
          ` : ''}

          <h4 style="margin-top:16px;">سجل التحديثات</h4>
          <ul>${(updates||[]).slice(0,8).map(u => `<li style="padding:6px 0; border-bottom:1px solid var(--border);"><strong>${u.users ? esc(u.users.full_name) : ''}</strong>: ${esc(u.work_done || '')} (${u.progress_percent}%)${u.is_delayed ? ' <span style="color:var(--danger)"><span data-lucide="alert-triangle" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;color:var(--danger);"></span> متأخر</span>' : ''}<br><small style="color:var(--text-muted)">${fmtDate(u.created_at)}</small></li>`).join('') || '<li class="empty-state">لا توجد تحديثات بعد</li>'}</ul>

      body: `تذكير بمتابعة مهمتك الفرعية "${btn.dataset.remindTitle}" ضمن مشروع "${project.project_name}"`,

    const mm = (members || []).find(x => x.id === memberId);
    await sb.from('task_project_members').update({ status: 'completed', progress_percent: 100 }).eq('id', memberId);

    await sb.from('task_projects').update({ progress_percent: avg, updated_at: new Date().toISOString() }).eq('id', project.id);
    await sb.from('action_items').update({ progress_percent: avg, status: avg >= 100 ? 'completed' : 'in_progress' }).eq('id', project.task_id);
    toast('تم إغلاق المهمة الفرعية', 'success');
    document.getElementById('projOverlay').remove();
    openTaskProject(taskId, task);
  }));

  if (isLead) {
    // حساب تاريخ الانتهاء تلقائيًا من تاريخ البداية + المدة
    const recalcEndDate = () => {
      const start = document.getElementById('amStartDate').value;
      const dur = Number(document.getElementById('amDuration').value);
      if (start && dur > 0) {
        const d = new Date(start);
        d.setDate(d.getDate() + dur);
        document.getElementById('amEndDate').value = d.toISOString().slice(0,10);
      }
    };
    document.getElementById('amStartDate').addEventListener('change', recalcEndDate);
    document.getElementById('amDuration').addEventListener('input', recalcEndDate);

    document.getElementById('amSaveBtn').addEventListener('click', async () => {
      const errBox = document.getElementById('addMemberError');
      try {
        const uid = Number(document.getElementById('amUser').value);
        const deptOfUser = Number(document.querySelector(`#amUser option[value="${uid}"]`)?.dataset.dept || 0);
        const { error } = await sb.from('task_project_members').insert({
          task_project_id: project.id, user_id: uid,
          subtask_title: document.getElementById('amTitle').value || null,
          assigned_part: document.getElementById('amTitle').value || null,
          description: document.getElementById('amDesc').value || null,
          department_id: deptOfUser || null,
          priority: document.getElementById('amPriority').value,
          start_date: document.getElementById('amStartDate').value || null,
          duration_days: Number(document.getElementById('amDuration').value) || null,
          end_date: document.getElementById('amEndDate').value || null,
          due_date: document.getElementById('amEndDate').value || null,
          status: 'not_started'
        });
        if (error) throw error;
        if (projConv) await sb.from('conversation_members').insert({ conversation_id: projConv.id, user_id: uid });
        const subtaskTitle = document.getElementById('amTitle').value || 'مهمة فرعية';
        await sb.from('notifications').insert({
          user_id: uid,
          title: 'تم إسناد مهمة فرعية لك',
          body: `ضمن مشروع تنفيذ المهمة: "${task.title}" — المهمة الفرعية: "${subtaskTitle}"`,
          link: '#tasks'
        });
        toast('تمت إضافة العضو والمهمة الفرعية', 'success');
        document.getElementById('projOverlay').remove();
        openTaskProject(taskId, task);
      } catch (err) {
        errBox.textContent = err.message; errBox.classList.add('show');
      }
    });
  }

  if (projConv) {
    document.getElementById('groupChatBtn')?.addEventListener('click', async () => {
      document.getElementById('projOverlay').remove();
      document.getElementById('taskModalHost').innerHTML = '';
      let panel = document.getElementById('taskChatPanel');
      if (!panel) {
        document.body.insertAdjacentHTML('beforeend', `
          <div class="modal-overlay" id="groupChatOverlay">
            <div class="panel modal-box">
              <div class="panel-header"><h3><span data-lucide="message-circle" style="width:15px;height:15px;vertical-align:-2px;margin-left:5px;"></span>شات مشروع: ${esc(project.project_name)}</h3><button class="modal-close-x" onclick="document.getElementById('groupChatOverlay').remove()"><span data-lucide="x" style="width:14px;height:14px;"></span></button></div>
              <div class="chat-box">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input">${chatInputBarHtml()}</div>
              </div>
            </div>
          </div>
        `);
        await loadChatMessages(projConv.id);
        wireChatInputBar((text, msgType, replyToId, attachment, textColor, textAlign) => sendChatMessage(projConv.id, text, msgType, replyToId, attachment, textColor, textAlign), projConv.id);
        document.getElementById('chatInput').onkeydown = (e) => { if (e.key === 'Enter') document.getElementById('sendBtn').click(); };
      }
    });
  }

  document.getElementById('viewReportBtn').addEventListener('click', () => {
    document.getElementById('projOverlay').remove();
    showProjectReport(task, project, members || [], allDepts || []);
  });

  if (myMembership) {
    document.getElementById('muSaveBtn').addEventListener('click', async () => {
      const errBox = document.getElementById('myUpdateError');
      try {
        const progress = Number(document.getElementById('muProgress').value);
        const isDelayed = document.getElementById('muDelayed').checked;
        const { error: updErr } = await sb.from('task_project_updates').insert({
          task_project_id: project.id, user_id: CURRENT_USER.id,
          work_done: document.getElementById('muWork').value,
          progress_percent: progress, is_delayed: isDelayed,
          delay_reason: document.getElementById('muDelayReason').value || null
        });
        if (updErr) throw updErr;
        await sb.from('task_project_members').update({
          progress_percent: progress,
          status: isDelayed ? 'delayed' : (progress >= 100 ? 'completed' : 'in_progress')
        }).eq('task_project_id', project.id).eq('user_id', CURRENT_USER.id);

        // تحديث نسبة إنجاز المشروع الكلية = متوسط تقدم الأعضاء (باستثناء المسؤول الرئيسي لو ماعندوش مهمة فرعية فعلية)
        const { data: allMembers } = await sb.from('task_project_members').select('progress_percent').eq('task_project_id', project.id);
        const avg = allMembers.length ? Math.round(allMembers.reduce((s, x) => s + x.progress_percent, 0) / allMembers.length) : 0;
        await sb.from('task_projects').update({ progress_percent: avg, updated_at: new Date().toISOString() }).eq('id', project.id);

        // تحديث نسبة إنجاز المهمة الرئيسية تلقائيًا لتساوي نسبة إنجاز المشروع
        await sb.from('action_items').update({
          progress_percent: avg,
          status: avg >= 100 ? 'completed' : 'in_progress'
        }).eq('id', project.task_id);

        // إشعار المسؤول الرئيسي بالتحديث (لو المحدِّث مش هو نفسه)
        if (project.lead_user_id && project.lead_user_id !== CURRENT_USER.id) {
          await sb.from('notifications').insert({
            user_id: project.lead_user_id,
            title: isDelayed ? '⚠️ تأخر في مشروع التنفيذ' : 'تحديث إنجاز في مشروع التنفيذ',
            body: `${CURRENT_USER.full_name} حدّث نسبة إنجازه إلى ${progress}% في مشروع "${project.project_name}"${isDelayed ? ' — يوجد تأخير' : ''}`,
            link: '#tasks'
          });
        }

        document.getElementById('projOverlay').remove();
        openTaskProject(taskId, task);
      } catch (err) {
        errBox.textContent = err.message; errBox.classList.add('show');
      }
    });
  }
};

  });
  document.getElementById('dtFile').addEventListener('change', (e) => {
    const label = document.getElementById('dtFileLabel');
    label.textContent = e.target.files[0] ? e.target.files[0].name : 'اسحب الملف هنا أو اضغط لاختيار مرفق';
  });

  document.getElementById('deptTaskForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errBox = document.getElementById('dtError');
    try {
      const assigneeId = Number(document.getElementById('dtAssignee').value);
      const title = document.getElementById('dtTitle').value;
      const dueVal = document.getElementById('dtDue').value;
      const priority = document.getElementById('dtPriority').value;
      const fileInput = document.getElementById('dtFile');

      let attachment = null;
      if (fileInput.files[0]) {
        const file = fileInput.files[0];
        const filePath = `dept-tasks/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${(file.name.split('.').pop()||'bin').replace(/[^a-zA-Z0-9]/g,'').slice(0,8)||'bin'}`;
        const { error: upErr } = await sb.storage.from('maintenance').upload(filePath, file, { contentType: file.type || undefined });
        if (upErr) throw upErr;
        const { data: urlData } = sb.storage.from('maintenance').getPublicUrl(filePath);
        attachment = { url: urlData.publicUrl, name: file.name, type: file.type };
      }

      const { error: insErr } = await sb.from('department_tasks').insert({
        title, description: document.getElementById('dtDesc').value || null,
        assigned_by: CURRENT_USER.id, assigned_to: assigneeId,
        due_datetime: dueVal, priority,
        attachment_url: attachment ? attachment.url : null,
        attachment_name: attachment ? attachment.name : null,
        attachment_type: attachment ? attachment.type : null
      });
      if (insErr) throw insErr;

      await sb.from('notifications').insert({
        user_id: assigneeId,
        title: 'لديك مهمة جديدة',
        body: `${title} — من ${CURRENT_USER.full_name} — الموعد النهائي: ${fmtDateAr(dueVal)}`,
        link: '#department_tasks'
      });

      toast('تم إسناد المهمة وإرسال الإشعار', 'success');
      location.hash = '#department_tasks';
      renderApp();
    } catch (err) {
      errBox.textContent = err.message; errBox.classList.add('show');
    }
  });
}

    if (canEdit) {
      document.getElementById('dtdProgress').addEventListener('input', (e) => document.getElementById('dtdProgVal').textContent = e.target.value);

};

  });
  document.getElementById('emDraftBtn').addEventListener('click', () => submitEmergencyAlert(true));
  document.getElementById('emSendBtn').addEventListener('click', () => submitEmergencyAlert(false));

  document.getElementById('emSearchInput').addEventListener('input', (e) => { EmergencyState.search = e.target.value.toLowerCase(); renderEmergencyTable(); });
  document.getElementById('emSeverityFilter').addEventListener('change', (e) => { EmergencyState.severityFilter = e.target.value; renderEmergencyTable(); });
  document.getElementById('emStatusFilter').addEventListener('change', (e) => { EmergencyState.statusFilter = e.target.value; renderEmergencyTable(); });

  updateEmergencyPreview();
  if (window.lucide) lucide.createIcons();
}

function updateEmergencyPreview() {
  document.getElementById('pvTitle').textContent = document.getElementById('emTitle').value || '-';
  document.getElementById('pvType').textContent = EMERGENCY_TYPES[document.getElementById('emType').value] || '-';
  const activeSev = document.querySelector('.severity-btn.active');
  document.getElementById('pvSeverity').innerHTML = activeSev ? `<span class="severity-badge ${SEVERITY_META[activeSev.dataset.val].cls}">${SEVERITY_META[activeSev.dataset.val].label}</span>` : '-';
  const deptSel = document.getElementById('emDept');
  document.getElementById('pvDept').textContent = deptSel.value ? deptSel.options[deptSel.selectedIndex].text : 'كل الإدارة العليا';

async function submitEmergencyAlert(isDraft) {
  const errBox = document.getElementById('emError');
  errBox.classList.remove('show');
  const title = document.getElementById('emTitle').value.trim();
  const msg = document.getElementById('emMessage').value.trim();
  if (!isDraft && !title && !msg) { errBox.textContent = 'اكتب عنوان الحالة أو تفاصيلها على الأقل'; errBox.classList.add('show'); return; }
  try {
    const deptId = document.getElementById('emDept').value ? Number(document.getElementById('emDept').value) : null;
    const recipientId = document.getElementById('emRecipient').value ? Number(document.getElementById('emRecipient').value) : null;
    const severity = document.querySelector('.severity-btn.active')?.dataset.val || 'medium';
    const fileInput = document.getElementById('emFile');
    let attachment = null;
    if (fileInput.files[0]) {
      const file = fileInput.files[0];
      const filePath = `emergency/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${(file.name.split('.').pop()||'bin').replace(/[^a-zA-Z0-9]/g,'').slice(0,8)||'bin'}`;
      const { error: upErr } = await sb.storage.from('maintenance').upload(filePath, file, { contentType: file.type || undefined });
      if (upErr) throw upErr;
      const { data: urlData } = sb.storage.from('maintenance').getPublicUrl(filePath);
      attachment = { url: urlData.publicUrl, name: file.name };
    }

    const { data: newAlert, error } = await sb.from('emergency_alerts').insert({
      sender_id: CURRENT_USER.id, title, message: msg || title, status: 'open',
      department_id: deptId, recipient_id: recipientId,
      emergency_type: document.getElementById('emType').value,
      severity, location: document.getElementById('emLocation').value || null,
      requires_ack: document.getElementById('emRequiresAck').checked,
      processing_status: 'new', is_draft: isDraft,
      attachment_url: attachment ? attachment.url : null,
      attachment_name: attachment ? attachment.name : null,
      escalation_enabled: document.getElementById('emEscalation').checked,
      escalation_after_minutes: Number(document.getElementById('emEscAfter').value),
      escalation_to: document.getElementById('emEscTo').value,
    }).select().single();
    if (error) throw error;

    await sb.from('emergency_activity_log').insert({ alert_id: newAlert.id, action_text: isDraft ? 'تم حفظ التنبيه كمسودة' : 'تم إنشاء التنبيه', created_by: CURRENT_USER.id });

    if (!isDraft) {
      let targets = [];
      const ccIds = [...document.getElementById('emCc').selectedOptions].map(o => Number(o.value));
      if (recipientId) targets = [recipientId];
      else if (deptId) {
        const { data: deptManagers } = await sb.from('users').select('id').eq('department_id', deptId).in('role', ['department_manager','projects_manager','development_manager','admin','company_manager']);
        targets = (deptManagers || []).map(u => u.id);
        if (!targets.length) { const { data: managers } = await sb.from('users').select('id').in('role', ['admin', 'company_manager']); targets = (managers || []).map(u => u.id); }
      } else {
        const { data: managers } = await sb.from('users').select('id').in('role', ['admin', 'company_manager']);
        targets = (managers || []).map(u => u.id);
      }
      const allTargets = [...new Set([...targets, ...ccIds])];
      for (const uid of allTargets) {
        await sb.from('emergency_recipients').insert({ alert_id: newAlert.id, user_id: uid, is_cc: ccIds.includes(uid) && !targets.includes(uid) });
        await sb.from('notifications').insert({ user_id: uid, title: '🚨 تواصل طارئ', body: `${CURRENT_USER.full_name}: ${(title||msg).slice(0, 100)}`, link: '#emergency' });
      }
      await sb.from('emergency_activity_log').insert({ alert_id: newAlert.id, action_text: `تم إرسال التنبيه إلى ${allTargets.length} مستلم`, created_by: CURRENT_USER.id });
    }

    toast(isDraft ? 'تم حفظ التنبيه كمسودة' : 'تم إرسال التنبيه الطارئ بنجاح', 'success');
    location.hash = '#emergency';
    renderApp();
  } catch (err) {
    errBox.textContent = err.message; errBox.classList.add('show');
  }
}

async function pageDecisions(body, urlQuery) {

  let query = sb.from('decisions').select('*, users!responsible_user_id(full_name), meetings(title, department_id), departments(name), decision_viewers(user_id), linked_task:action_items!decision_id(id, status)').order('created_at', { ascending: false });
  const { data: decisions, error } = await query;
