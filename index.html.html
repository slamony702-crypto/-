        <div class="rep-export-bar">
          <button class="btn btn-outline" data-qexp="visits"><span data-lucide="download" style="width:14px;height:14px;"></span> كل الزيارات</button>
          <button class="btn btn-outline" data-qexp="violations"><span data-lucide="download" style="width:14px;height:14px;"></span> المخالفات</button>
          <button class="btn btn-outline" onclick="window.print()"><span data-lucide="printer" style="width:14px;height:14px;"></span> طباعة الصفحة</button>
        </div>
      </div></div>`;
    }

    el.innerHTML = html;
    if (window.lucide) lucide.createIcons();

    el.querySelectorAll('[data-qexp]').forEach(b => b.addEventListener('click', () => {
      if (b.dataset.qexp === 'visits') {
        repDownloadCSV('تقرير_زيارات_الجودة', ['رقم الزيارة','الفرع','المفتش','النوع','التاريخ','الالتزام','الحالة'], allV.map(v => [v.visit_no||v.id, v.branches?.name||'', v.inspector_name||v.users?.full_name||'', label('quality_visit_type',v.visit_type), (v.visit_date||'').slice(0,10), Math.round(Number(v.compliance_pct||0))+'%', v.status==='completed'?'مكتملة':'مسودة']));
      } else {
        const nc = compItems.filter(it => it.status === 'non_conform' || it.status === 'follow_up');
        repDownloadCSV('تقرير_مخالفات_الجودة', ['البند','القسم','الفرع','الحالة','الإجراء التصحيحي','ملاحظات','التاريخ'], nc.map(it => { const v = visitById[it.visit_id]||{}; return [it.item_text, secTitle[it.section_id]||'', v.branches?.name||'', label('quality_status',it.status), it.corrective_action?(it.corrective_action==='custom'?(it.custom_corrective_action||'مخصص'):label('quality_corrective',it.corrective_action)):'', it.notes||'', (v.visit_date||'').slice(0,10)]; }));
      }
    }));
  }

  document.getElementById('qrepTabs').querySelectorAll('.rep-tab').forEach(b => b.addEventListener('click', () => {
    state.tab = b.dataset.tab;
    document.querySelectorAll('#qrepTabs .rep-tab').forEach(x => x.classList.toggle('active', x === b));
    renderTab();
  }));
  renderTab();
}

const MAINT_SEVERITY_COLOR = {
  // مقياس درجة الخطورة (الأساسي): منخفض/متوسط/عالي/حرج
  low: '#1F7A3A', medium: '#D6A437', high: '#F2994A', critical: '#D32F2F',
  // توافق مع القيم القديمة إن وُجدت
  emergency: '#D32F2F', urgent: '#F2994A', normal: '#2F80C9', preventive: '#1F7A3A'
};
const MAINT_PRIORITY_KEYS = ['low','medium','high','critical'];
const MAINT_STATUS_COLOR = {
  new: '#2F80C9', under_review: '#7C6BF2', awaiting_inspection: '#F2994A',
  inspection_reported: '#4A90E2', awaiting_approval: '#F2994A',
  awaiting_quotes: '#F2994A', awaiting_finance: '#F2994A',
  in_progress: '#D6A437', awaiting_receipt: '#4A90E2',
  closed: '#1F7A3A', rejected: '#D32F2F'
};

function maintSevBadge(sev) {
  const color = MAINT_SEVERITY_COLOR[sev] || '#666';
  const grp = MAINT_PRIORITY_KEYS.includes(sev) ? 'maint_priority' : 'maint_severity';
  return `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11.5px;font-weight:700;background:${color}18;color:${color};">${label(grp, sev)}</span>`;
}
function maintStatusBadge(st) {
  const color = MAINT_STATUS_COLOR[st] || '#666';
  return `<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:12px;font-size:11.5px;font-weight:700;background:${color}18;color:${color};">${label('maint_status', st)}</span>`;
}

async function logMaintTimeline(requestId, eventType, fromStatus, toStatus, note) {
  try {
    await sb.from('maintenance_timeline').insert({
      request_id: requestId, event_type: eventType,
      from_status: fromStatus, to_status: toStatus,
      note: note || null, actor_id: CURRENT_USER?.id || null
    });
  } catch (e) { /* silent */ }
}

async function notifyMaintUsers(userIds, title, body, link) {
  const rows = (userIds || []).filter(Boolean).map(uid => ({
    user_id: uid, title, body, link: link || '#maintenance'
  }));
  if (!rows.length) return;
  try { await sb.from('notifications').insert(rows); } catch (e) {}
}

// قراءة مدة الفيديو بالثواني قبل الرفع
function getVideoDuration(file) {
  return new Promise((resolve, reject) => {
    const v = document.createElement('video');
    v.preload = 'metadata';
    v.onloadedmetadata = () => { const d = v.duration; URL.revokeObjectURL(v.src); resolve(d); };
    v.onerror = () => { URL.revokeObjectURL(v.src); reject(new Error('cannot read video')); };
    v.src = URL.createObjectURL(file);
  });
}

// رفع صورة data URI إلى Storage وإرجاع الرابط العام (أو null للـ fallback)
async function uploadDataUri(dataUri, pathPrefix) {
  try {
    const res = await fetch(dataUri);
    const blob = await res.blob();
    const path = `${pathPrefix}/${Date.now()}_${Math.random().toString(36).slice(2, 8)}.jpg`;
    const { error } = await sb.storage.from('maintenance').upload(path, blob, { contentType: blob.type || 'image/jpeg' });
    if (error) return null;
    const { data } = sb.storage.from('maintenance').getPublicUrl(path);
    return data?.publicUrl || null;
  } catch (e) { return null; }
}

// رفع ملف إلى Supabase Storage (bucket: maintenance) وإرجاع الرابط العام
async function uploadMaintFile(file, requestId) {
  try {
    const ext = (file.name.split('.').pop() || 'bin').toLowerCase().replace(/[^a-z0-9]/g, '');
    const path = `req-${requestId}/${Date.now()}.${ext}`;
    const { error } = await sb.storage.from('maintenance').upload(path, file, { cacheControl: '3600', upsert: false, contentType: file.type || undefined });
    if (error) { console.warn('storage upload failed:', error.message); return null; }
    const { data } = sb.storage.from('maintenance').getPublicUrl(path);
    return data?.publicUrl || null;
  } catch (e) { console.warn('storage upload exception:', e); return null; }
}

// ضغط الصورة إلى data URI صغير عبر canvas
function compressImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width >= height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

    sb.from('maintenance_timeline').select('*, users(full_name)').eq('request_id', rid).order('created_at', { ascending: true }),
    sb.from('maintenance_inspections').select('*, users(full_name)').eq('request_id', rid).order('created_at', { ascending: false }),
    sb.from('maintenance_quotes').select('*, maintenance_suppliers(name)').eq('request_id', rid).order('created_at', { ascending: true }),

    sb.from('maintenance_repairs').select('*').eq('request_id', rid).order('created_at', { ascending: false }).limit(1),

function renderMaintActions(status, req, perms) {
  const { isMgr, isFinance, isBranchMgr } = perms;
  const btns = [];

  if (status === 'new' && isMgr) {
    btns.push(`<button class="btn" data-mt-action="accept_review" style="background:var(--primary);color:#fff;"><span data-lucide="check" style="width:14px;height:14px;"></span> قبول للفحص</button>`);
    btns.push(`<button class="btn btn-outline" data-mt-action="reject" style="color:var(--danger);border-color:var(--danger);"><span data-lucide="x" style="width:14px;height:14px;"></span> رفض</button>`);
  }
  if (status === 'awaiting_inspection' && isMgr) {
    btns.push(`<button class="btn" data-mt-action="add_inspection" style="background:var(--primary);color:#fff;"><span data-lucide="search" style="width:14px;height:14px;"></span> رفع تقرير الفحص</button>`);
  }
  if (status === 'inspection_reported' && isMgr) {
    btns.push(`<button class="btn" data-mt-action="approve_next" style="background:var(--primary);color:#fff;"><span data-lucide="check-circle" style="width:14px;height:14px;"></span> اعتماد الحالة</button>`);
  }
  if (status === 'awaiting_quotes' && isMgr) {
    btns.push(`<button class="btn" data-mt-action="add_quote" style="background:var(--primary);color:#fff;"><span data-lucide="plus" style="width:14px;height:14px;"></span> إضافة عرض سعر</button>`);
    btns.push(`<button class="btn btn-outline" data-mt-action="send_finance"><span data-lucide="send" style="width:14px;height:14px;"></span> إرسال للمالية</button>`);
  }
  if (status === 'awaiting_finance' && isFinance) {
    btns.push(`<button class="btn" data-mt-action="finance_approve" style="background:var(--primary);color:#fff;"><span data-lucide="banknote" style="width:14px;height:14px;"></span> اعتماد الصرف</button>`);
    btns.push(`<button class="btn btn-outline" data-mt-action="finance_reject" style="color:var(--danger);border-color:var(--danger);"><span data-lucide="x" style="width:14px;height:14px;"></span> رفض الصرف</button>`);
  }
  if (status === 'in_progress' && isMgr) {
    btns.push(`<button class="btn" data-mt-action="finish_repair" style="background:var(--primary);color:#fff;"><span data-lucide="hammer" style="width:14px;height:14px;"></span> رفع تقرير الإصلاح</button>`);
  }
  if (status === 'awaiting_receipt' && (isBranchMgr || isMgr)) {
    btns.push(`<button class="btn" data-mt-action="confirm_receipt" style="background:var(--primary);color:#fff;"><span data-lucide="check-circle-2" style="width:14px;height:14px;"></span> تأكيد الاستلام</button>`);
  }

  if (!btns.length) return '';
  return `<div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border);">${btns.join('')}</div>`;
}

function wireMaintActionButtons(req) {
  document.querySelectorAll('[data-mt-action]').forEach(btn => {
    btn.addEventListener('click', () => handleMaintAction(btn.dataset.mtAction, req));
  });
  document.querySelectorAll('[data-select-quote]').forEach(btn => {
    btn.addEventListener('click', () => selectMaintQuote(req, Number(btn.dataset.selectQuote), btn.dataset.quotePrice));
  });
}

async function selectMaintQuote(req, quoteId, price) {
  confirmModal('اعتماد هذا العرض كعرض فائز وإرساله للمالية؟', async () => {
    await sb.from('maintenance_quotes').update({ is_selected: false }).eq('request_id', req.id);
    await sb.from('maintenance_quotes').update({ is_selected: true }).eq('id', quoteId);
    const upd = { selected_quote_id: quoteId, updated_at: new Date().toISOString() };
    if (price) upd.estimated_cost = Number(price);
    if (req.status === 'awaiting_quotes') upd.status = 'awaiting_finance';
    await sb.from('maintenance_requests').update(upd).eq('id', req.id);
    await logMaintTimeline(req.id, 'quote_selected', req.status, upd.status || req.status, 'تم اختيار العرض الفائز وإرساله للمالية');
    const { data: fin } = await sb.from('users').select('id').in('role', ['finance','admin','company_manager']).eq('is_active', true);
    await notifyMaintUsers((fin||[]).map(u => u.id), '💰 طلب موافقة مالية', `${req.request_no || '#'+req.id} — بانتظار اعتماد الصرف`, '#maintenance_detail/' + req.id);
    toast('تم اختيار العرض وإرساله للمالية', 'success');
    pageMaintenanceDetail(document.getElementById('pageBody'), req.id);
  }, false);
}

async function handleMaintAction(action, req) {
  const rid = req.id;
  const prev = req.status;

  const advance = async (newStatus, note) => {
    await sb.from('maintenance_requests').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', rid);
    await logMaintTimeline(rid, 'status_change', prev, newStatus, note);
    if (req.requester_id) await notifyMaintUsers([req.requester_id], `تحديث حالة الطلب ${req.request_no || '#'+rid}`, label('maint_status', newStatus), '#maintenance_detail/' + rid);
    toast(note || 'تم تحديث الحالة', 'success');
    pageMaintenanceDetail(document.getElementById('pageBody'), rid);
  };

  if (action === 'accept_review') return advance('awaiting_inspection', 'تم قبول الطلب للفحص');
  if (action === 'approve_next') {
    // Decide by last inspection recommendation
    const { data: last } = await sb.from('maintenance_inspections').select('*').eq('request_id', rid).order('created_at', { ascending: false }).limit(1);
    const rec = last?.[0]?.recommendation;
    if (rec === 'reject') return advance('rejected', 'تم رفض الحالة بناءً على تقرير الفحص');
    if (last?.[0]?.fix_type === 'external') return advance('awaiting_quotes', 'اعتُمدت الحالة — بانتظار عروض الأسعار');
    return advance('in_progress', 'اعتُمدت الحالة للإصلاح المباشر');
  }
  if (action === 'send_finance') return advance('awaiting_finance', 'أُرسل الطلب للمالية');

  if (action === 'reject') {
    const host = document.createElement('div');
    host.className = 'modal-overlay';
    host.innerHTML = `
      <div class="panel modal-box" style="width:420px;max-width:95%;">
        <div class="panel-header"><h3 class="panel-title">رفض طلب الصيانة</h3></div>
        <div class="panel-body">
          <div class="form-field"><label>سبب الرفض *</label><textarea id="mtRejectReason" rows="3" class="form-input" placeholder="اكتب سبب الرفض..."></textarea></div>
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
            <button type="button" class="btn btn-outline" id="mtRejectCancel">إلغاء</button>
            <button type="button" class="btn" id="mtRejectOk" style="background:var(--danger);color:#fff;">تأكيد الرفض</button>
          </div>
        </div>
      </div>`;
    document.body.appendChild(host);
    host.querySelector('#mtRejectCancel').addEventListener('click', () => host.remove());
    host.querySelector('#mtRejectOk').addEventListener('click', async () => {
      const reason = host.querySelector('#mtRejectReason').value.trim();
      if (!reason) { toast('اكتب سبب الرفض', 'error'); return; }
      host.remove();
      await sb.from('maintenance_requests').update({ status: 'rejected', reject_reason: reason, updated_at: new Date().toISOString() }).eq('id', rid);
      await logMaintTimeline(rid, 'status_change', prev, 'rejected', 'رُفض الطلب: ' + reason);
      toast('تم الرفض', 'success');
      pageMaintenanceDetail(document.getElementById('pageBody'), rid);
    });
    return;
  }

  if (action === 'add_inspection') return openMaintInspectionModal(req);
  if (action === 'add_quote') return openMaintQuoteModal(req);
  if (action === 'finance_approve') return openMaintFinanceModal(req, true);
  if (action === 'finance_reject') return openMaintFinanceModal(req, false);
  if (action === 'finish_repair') return openMaintRepairModal(req);
  if (action === 'confirm_receipt') return openMaintReceiptModal(req);
}

  const close = () => { host.remove(); if (changed && onChange) onChange(); };
  host.querySelector('#brClose').addEventListener('click', close);
  host.addEventListener('click', (e) => { if (e.target === host) close(); });

  const refresh = async () => {
    const { data: list } = await sb.from('branches').select('*').order('name');
    host.querySelector('#brList').innerHTML = rowsHtml(list);
    if (window.lucide) lucide.createIcons();
    wireDel();
  };

  const wireDel = () => {
    host.querySelectorAll('[data-del-branch]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = Number(btn.dataset.delBranch);
        const { count } = await sb.from('maintenance_requests').select('id', { count: 'exact', head: true }).eq('branch_id', id);
        if (count && count > 0) { toast('لا يمكن حذف فرع مرتبط بطلبات صيانة', 'error'); return; }
        const { error } = await sb.from('branches').delete().eq('id', id);
        if (error) { toast(error.message, 'error'); return; }
        changed = true; toast('تم حذف الفرع', 'success'); refresh();
      });
    });
  };
  wireDel();

  host.querySelector('#brForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const { error } = await sb.from('branches').insert({ name: fd.get('name'), address: fd.get('address') || null });
    if (error) { toast(error.message, 'error'); return; }
    changed = true; toast('تم إضافة الفرع', 'success');
    e.target.reset();
    refresh();
  });
}

async function pageMaintenancePreventive(body, query) {
  const canManage = ['admin','company_manager','operations_manager','maintenance_officer'].includes(CURRENT_USER.role);

    sb.from('maintenance_preventive_schedule').select('*, branches(name), maintenance_equipment(equipment_name), users!maintenance_preventive_schedule_assigned_to_fkey(full_name)').order('scheduled_date', { ascending: true }),
    sb.from('branches').select('*').eq('is_active', true).order('name'),
    sb.from('maintenance_equipment').select('id, equipment_name, branch_id').eq('is_active', true).order('equipment_name'),
    sb.from('users').select('id, full_name').eq('is_active', true).order('full_name')

  const rows = schedule || [];
  const today = new Date().toISOString().slice(0, 10);
  // تحديث تلقائي لحالة "متأخرة"

    b.addEventListener('click', () => {
      const id = Number(b.dataset.mtSEdit);
      const s = (suppliers || []).find(x => x.id === id);
      openSupplierModal(s);
    });
  });
}

</script>
</body>
</html>
