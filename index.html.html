async function renderPermissionsSection() {
  const host = document.getElementById('permissionsSection');
  const { data: allRolePerms } = await sb.from('role_permissions').select('*');
  const { data: allUsers } = await sb.from('users').select('id, full_name, role, departments(name)').eq('is_active', true).order('full_name');

  function permFor(role, sectionKey) {
    return (allRolePerms || []).find(p => p.role === role && p.section_key === sectionKey) || { can_view: false, can_manage: false };
  }

  host.innerHTML = `
    <div class="panel">
      <div class="panel-header"><h3><span data-lucide="shield" style="width:15px;height:15px;vertical-align:-2px;margin-left:5px;"></span>صلاحيات الأدوار (تُطبَّق فورًا على كل المنصة)</h3></div>
      <div class="panel-body">
        <p style="font-size:12px; color:var(--text-muted); margin-bottom:14px;">أي تغيير هنا بيتفعّل تلقائيًا لكل المستخدمين بنفس الدور من أول تسجيل دخول تالي لهم. <span data-lucide="check-circle-2" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;color:var(--success);"></span> = يقدر يشوف القسم فقط · <span data-lucide="wrench" style="width:13px;height:13px;"></span> = يقدر يشوف ويدير (يضيف/يعدّل/يحذف)</p>
        <div style="overflow-x:auto;">
        <table class="adv-table" style="font-size:12px;">
          <thead><tr>
            <th style="position:sticky; right:0; background:var(--bg); z-index:2;">القسم</th>
            ${PERMISSION_ROLES.map(r => `<th colspan="2" style="text-align:center;">${label('role', r)}</th>`).join('')}
          </tr>
          <tr>
            <th style="position:sticky; right:0; background:var(--bg); z-index:2;"></th>
            ${PERMISSION_ROLES.map(() => `<th style="text-align:center;"><span data-lucide="eye" style="width:13px;height:13px;"></span></th><th style="text-align:center;"><span data-lucide="wrench" style="width:13px;height:13px;"></span></th>`).join('')}
          </tr></thead>
          <tbody>
            ${PERMISSION_SECTIONS.map(sec => `
              <tr>
                <td style="font-weight:600; position:sticky; right:0; background:var(--surface);">${sec.label}</td>
                ${PERMISSION_ROLES.map(role => {
                  const p = permFor(role, sec.key);
                  const isSelfAdmin = role === 'admin';
                  return `
                  <td style="text-align:center;"><input type="checkbox" class="permCheck" data-role="${role}" data-section="${sec.key}" data-field="can_view" ${p.can_view ? 'checked' : ''} ${isSelfAdmin ? 'disabled title="الأدمن دائمًا كامل الصلاحية"' : ''}></td>
                  <td style="text-align:center;"><input type="checkbox" class="permCheck" data-role="${role}" data-section="${sec.key}" data-field="can_manage" ${p.can_manage ? 'checked' : ''} ${isSelfAdmin ? 'disabled title="الأدمن دائمًا كامل الصلاحية"' : ''}></td>
                  `;
                }).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><h3><span data-lucide="globe" style="width:15px;height:15px;vertical-align:-2px;margin-left:5px;"></span>نطاق الصلاحية (شركة كاملة أو القسم فقط)</h3></div>
      <div class="panel-body">
        <p style="font-size:12px; color:var(--text-muted); margin-bottom:14px;">بيتحكم في حدود رؤية/إدارة كل دور عند تفعيل صلاحية "<span data-lucide="wrench" style="width:13px;height:13px;"></span> إدارة" — هل تشمل الشركة كلها، ولا تتحدد بقسم الشخص نفسه بس؟ (بيتفعّل فورًا)</p>
        <div style="overflow-x:auto;">
        <table class="adv-table" style="font-size:12px;">
          <thead><tr><th>القسم</th>${PERMISSION_ROLES.filter(r=>r!=='admin').map(r => `<th style="text-align:center;">${label('role', r)}</th>`).join('')}</tr></thead>
          <tbody>
            ${PERMISSION_SECTIONS.map(sec => `
              <tr>
                <td style="font-weight:600;">${sec.label}</td>
                ${PERMISSION_ROLES.filter(r=>r!=='admin').map(role => {
                  const p = permFor(role, sec.key);
                  return `<td style="text-align:center;">
                    <select class="scopeSelect" data-role="${role}" data-section="${sec.key}" style="font-size:11px; padding:2px 4px;">
                      <option value="company_wide" ${p.scope==='company_wide'?'selected':''}>الشركة كلها</option>
                      <option value="own_department" ${p.scope==='own_department'?'selected':''}>قسمه فقط</option>
                    </select>
                  </td>`;
                }).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><h3><span data-lucide="user" style="width:15px;height:15px;vertical-align:-2px;margin-left:5px;"></span>استثناءات فردية (لموظف/مسؤول محدد)</h3></div>
      <div class="panel-body">
        <p style="font-size:12px; color:var(--text-muted); margin-bottom:12px;">تُستخدم عندما تريد منح موظف معيّن صلاحية أعلى أو أقل من صلاحية دوره الافتراضية، دون التأثير على بقية زملائه من نفس الدور.</p>
        <div class="field"><label>اختر الشخص</label>
          <select id="overrideUserSelect">
            <option value="">اختر مستخدم...</option>
            ${(allUsers||[]).map(u => `<option value="${u.id}">${esc(u.full_name)} — ${label('role', u.role)} (${u.departments ? esc(u.departments.name) : '-'})</option>`).join('')}
          </select>
        </div>
        <div id="overrideEditor"></div>
      </div>
    </div>
  `;

  document.querySelectorAll('.permCheck').forEach(cb => {
    cb.addEventListener('change', async () => {
      const role = cb.dataset.role, sectionKey = cb.dataset.section, field = cb.dataset.field;
      const { error } = await sb.from('role_permissions').upsert(
        { role, section_key: sectionKey, [field]: cb.checked },
        { onConflict: 'role,section_key' }
      );
      if (error) { toast(error.message, 'error'); cb.checked = !cb.checked; return; }
      toast(`تم تحديث صلاحية "${label('role', role)}" فورًا`, 'success');
      if (role === CURRENT_USER.role) await loadPermissions(); // تحديث فوري لو المستخدم عدّل صلاحية دوره هو نفسه
    });
  });

  document.querySelectorAll('.scopeSelect').forEach(sel => {
    sel.addEventListener('change', async () => {
      const role = sel.dataset.role, sectionKey = sel.dataset.section;
      const { error } = await sb.from('role_permissions').upsert(
        { role, section_key: sectionKey, scope: sel.value },
        { onConflict: 'role,section_key' }
      );
      if (error) { toast(error.message, 'error'); return; }
      toast(`تم تحديث نطاق "${label('role', role)}" فورًا`, 'success');
      if (role === CURRENT_USER.role) await loadPermissions();
    });
  });

  document.getElementById('overrideUserSelect').addEventListener('change', async (e) => {
    const userId = e.target.value;
    const editorHost = document.getElementById('overrideEditor');

    const { data: overrides } = await sb.from('user_permission_overrides').select('*').eq('user_id', userId);
    function ovFor(sectionKey) { return (overrides||[]).find(o => o.section_key === sectionKey); }

    editorHost.innerHTML = `
      <table class="adv-table" style="font-size:12px; margin-top:12px;">
        <thead><tr><th>القسم</th><th><span data-lucide="eye" style="width:13px;height:13px;"></span> عرض</th><th><span data-lucide="wrench" style="width:13px;height:13px;"></span> إدارة</th></tr></thead>
        <tbody>
          ${PERMISSION_SECTIONS.map(sec => {
            const ov = ovFor(sec.key);
            return `<tr>
              <td>${sec.label}</td>
              <td>
                <select class="overrideSelect" data-section="${sec.key}" data-field="can_view" data-userid="${userId}">
                  <option value="">حسب الدور (افتراضي)</option>
                  <option value="true" ${ov && ov.can_view===true?'selected':''}>✔ مسموح دائمًا</option>
                  <option value="false" ${ov && ov.can_view===false?'selected':''}>✘ ممنوع دائمًا</option>
                </select>
              </td>
              <td>

        const { data: existing } = await sb.from('user_permission_overrides').select('*').eq('user_id', uid).eq('section_key', sectionKey).maybeSingle();
        const payload = { user_id: uid, section_key: sectionKey, can_view: existing ? existing.can_view : null, can_manage: existing ? existing.can_manage : null };
        payload[field] = val;
        const { error } = await sb.from('user_permission_overrides').upsert(payload, { onConflict: 'user_id,section_key' });
        if (error) { toast(error.message, 'error'); return; }

        if (uid === CURRENT_USER.id) await loadPermissions();

function getPeriodBounds(periodType, refDate) {
  const d = new Date(refDate);
  if (periodType === 'month') {
    const start = new Date(d.getFullYear(), d.getMonth(), 1);
    const end = new Date(d.getFullYear(), d.getMonth() + 1, 0);
    return { start, end, label: start.toLocaleDateString('ar-EG', { month: 'long', year: 'numeric' }) };
  }
  if (periodType === 'quarter') {
    const q = Math.floor(d.getMonth() / 3);
    const start = new Date(d.getFullYear(), q * 3, 1);
    const end = new Date(d.getFullYear(), q * 3 + 3, 0);
    return { start, end, label: `الربع ${q + 1} — ${d.getFullYear()}` };
  }
  // year
  const start = new Date(d.getFullYear(), 0, 1);
  const end = new Date(d.getFullYear(), 11, 31);
  return { start, end, label: `عام ${d.getFullYear()}` };
}

  if (DeptGoalsState.statusFilter) rows = rows.filter(g => g.status === DeptGoalsState.statusFilter);
  if (DeptGoalsState.priorityFilter) rows = rows.filter(g => g.priority === DeptGoalsState.priorityFilter);
  return rows;
}

function showDeptGoalsReport() {
  const { deptName } = window.__deptGoalsCtx;
  const goals = window.__deptGoals;
  const total = goals.length;
  const completed = goals.filter(g=>g.status==='completed');
  const inProgress = goals.filter(g=>g.status==='in_progress');
  const notStarted = goals.filter(g=>g.status==='not_started');
  const delayed = goals.filter(g=>g.status==='delayed');
  const overall = total ? Math.round(goals.reduce((s,g)=>s+g.progress_percent,0)/total) : 0;
  const pct = (n) => total ? Math.round(n/total*100) : 0;

  document.getElementById('root').insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="deptReportOverlay">
      <div class="panel modal-box" style="width:480px;">
        <div class="panel-header"><h3><span data-lucide="bar-chart-3" style="width:15px;height:15px;vertical-align:-2px;margin-left:5px;"></span>تقرير إنجاز أهداف قسم ${esc(deptName)}</h3><button class="modal-close-x" onclick="document.getElementById('deptReportOverlay').remove()"><span data-lucide="x" style="width:14px;height:14px;"></span></button></div>
        <div class="panel-body">
          <div class="drawer-row"><span class="k">إجمالي الأهداف</span><span class="mono-num" style="font-weight:700;">${total}</span></div>
          <div class="drawer-row"><span class="k"><span data-lucide="check-circle-2" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;color:var(--success);"></span> مكتملة</span><span class="mono-num">${completed.length} (${pct(completed.length)}%)</span></div>
          <div class="drawer-row"><span class="k"><span style="color:#1565C0;">●</span> قيد التنفيذ</span><span class="mono-num">${inProgress.length} (${pct(inProgress.length)}%)</span></div>
          <div class="drawer-row"><span class="k"><span style="color:#9e9e9e;">●</span> لم تبدأ</span><span class="mono-num">${notStarted.length} (${pct(notStarted.length)}%)</span></div>
          <div class="drawer-row"><span class="k"><span style="color:#C62828;">●</span> متأخرة</span><span class="mono-num">${delayed.length} (${pct(delayed.length)}%)</span></div>
          <div style="margin-top:14px;">
            <strong>نسبة الإنجاز الكلية: ${overall}%</strong>
            <div class="goal-progress-bar" style="width:100%; height:10px; margin-top:6px;"><div class="fill" style="width:${overall}%; background:var(--primary);"></div></div>
          </div>
          ${delayed.length ? `
          <div style="margin-top:14px;">
            <strong style="font-size:13px;">الأهداف المتأخرة:</strong>
            <ul style="margin-top:6px;">${delayed.map(g => `<li>• ${esc(g.title)} ${g.assignee ? '(' + esc(g.assignee.full_name) + ')' : ''}</li>`).join('')}</ul>
          </div>` : ''}
          <p style="margin-top:14px; font-size:11.5px; color:var(--text-muted);">آخر تحديث: ${fmtDateAr(new Date().toISOString())}</p>
        </div>
      </div>
    </div>
  `);
}

window.editGoalProgress = function(goalId, currentProgress, currentNotes, currentStatus) {
  document.getElementById('root').insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="goalProgressOverlay">
      <div class="panel modal-box">

        <div class="panel-body">
          <div class="field"><label>نسبة الإنجاز (%)</label><input type="number" id="gpProgress" min="0" max="100" value="${currentProgress}"></div>

              <option value="not_started" ${currentStatus==='not_started'?'selected':''}>لم تبدأ</option>

async function pageDashboard(body) {
  const isAdmin = ['admin','company_manager'].includes(CURRENT_USER.role);
  let meetingsQuery = sb.from('meetings').select('*');
  if (!isAdmin) meetingsQuery = meetingsQuery.eq('department_id', CURRENT_USER.department_id);
  const { data: meetings } = await meetingsQuery;

  let tasksQuery = sb.from('action_items').select('*');
  if (!isAdmin) tasksQuery = tasksQuery.eq('department_id', CURRENT_USER.department_id);
  const { data: tasks } = await tasksQuery;

  const thisMonth = new Date().toISOString().slice(0, 7);
  const meetingsThisMonth = (meetings || []).filter(m => (m.meeting_datetime || '').slice(0, 7) === thisMonth).length;
  const meetingsOpen = (meetings || []).filter(m => ['scheduled', 'in_follow_up'].includes(m.status)).length;
  const meetingsClosed = (meetings || []).filter(m => m.status === 'closed').length;
  const tasksCompleted = (tasks || []).filter(t => t.status === 'completed').length;
  const today = new Date().toISOString().slice(0, 10);
  const tasksDelayed = (tasks || []).filter(t => t.status === 'delayed' || (t.due_date && t.due_date < today && t.status !== 'completed')).length;

  const recentMeetings = [...(meetings || [])].sort((a, b) => (b.meeting_datetime || '').localeCompare(a.meeting_datetime || '')).slice(0, 5);

  // اجتماعات الأسبوع (السبت→الخميس بالتقويم الميلادي المحلي، ببساطة: آخر 7 أيام قادمة)
  const nowD = new Date();
  const weekEnd = new Date(nowD.getTime() + 7 * 86400000);
  const meetingsThisWeek = (meetings || []).filter(m => {
    if (!m.meeting_datetime) return false;
    const d = new Date(m.meeting_datetime);
    return d >= nowD && d <= weekEnd && m.status === 'scheduled';
  }).length;

  // طلبات صيانة عاجلة/حرجة مفتوحة
  let maintUrgent = 0;
  try {
    let mq = sb.from('maintenance_requests').select('id, severity, status');
    const { data: maintRows } = await mq;
    maintUrgent = (maintRows || []).filter(r => ['high','critical'].includes(r.severity) && !['closed','rejected'].includes(r.status)).length;
  } catch (e) {}

  const { data: recentMsgsRaw } = await sb.from('messages').select('*, users(full_name), conversations(conversation_type)').order('sent_at', { ascending: false }).limit(6);
  const { data: myReads } = await sb.from('message_reads').select('message_id').eq('user_id', CURRENT_USER.id);
  const readIds = new Set((myReads||[]).map(r=>r.message_id));
  const recentMsgs = recentMsgsRaw || [];

  const canCreate = can('meetings', 'manage');

  // ============ بيانات مركز المتابعة اليومي ============
  let deptTasksQuery = sb.from('department_tasks').select('*, assignee:assigned_to(full_name)');
  if (!isAdmin) deptTasksQuery = deptTasksQuery.eq('assigned_to', CURRENT_USER.id);
  let simpleTasksQuery = sb.from('action_items').select('*, users(full_name)');
  if (!isAdmin) simpleTasksQuery = simpleTasksQuery.eq('department_id', CURRENT_USER.department_id);
  const [{ data: tasksDetailed }, { data: deptTasks }, { data: openDecisions }] = await Promise.all([
    simpleTasksQuery,
    deptTasksQuery,
    sb.from('decisions').select('*, users(full_name)').in('status', ['new', 'in_progress']).order('due_date', { ascending: true }).limit(10)
  ]);

  const todayStr = new Date().toISOString().slice(0, 10);
  function daysAgoLabel(dateStr) {
    const diff = Math.floor((new Date(todayStr) - new Date(dateStr)) / 86400000);
    if (diff <= 0) return 'اليوم';
    if (diff === 1) return 'يوم واحد';
    if (diff === 2) return 'يومان';
    return diff + ' أيام';
  }

  const overdueItems = [
    ...(tasksDetailed || []).filter(t => t.due_date && t.due_date < todayStr && t.status !== 'completed').map(t => ({ id: t.id, title: t.title, assignee: t.users?.full_name, due: t.due_date, type: 'tasks' })),
    ...(deptTasks || []).filter(t => t.due_datetime && t.due_datetime.slice(0,10) < todayStr && t.status !== 'completed').map(t => ({ id: t.id, title: t.title, assignee: t.assignee?.full_name, due: t.due_datetime.slice(0,10), type: 'department_tasks' }))
  ].sort((a,b) => a.due.localeCompare(b.due));

    ...(deptTasks || []).filter(t => t.due_datetime && t.due_datetime.slice(0,10) === todayStr && t.status !== 'completed').map(t => ({ id: t.id, title: t.title, assignee: t.assignee?.full_name, progress: t.progress_percent || 0, type: 'department_tasks' }))

      <button class="quick-action-btn" onclick="location.hash='#tasks'"><span class="qa-icon" style="background:rgba(198,40,40,0.08); color:var(--danger);"><span data-lucide="folder-kanban" style="width:15px;height:15px;"></span></span> مشروع مهمة</button>

/* ============ تثبيت التطبيق (PWA) ============ */
(function () {
  const DISMISS_KEY = 'iabDismissedAt';
  const DISMISS_DAYS = 3;
  let deferredInstallPrompt = null;

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }

  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }
  function isDismissedRecently() {
    const t = localStorage.getItem(DISMISS_KEY);
    if (!t) return false;
    return (Date.now() - Number(t)) < DISMISS_DAYS * 24 * 60 * 60 * 1000;
  }
  function showBanner() {
    if (isStandalone() || isDismissedRecently()) return;
    const el = document.getElementById('installAppBanner');
    if (el) el.classList.remove('hidden');
  }
  function hideBanner() {
    const el = document.getElementById('installAppBanner');
    if (el) el.classList.add('hidden');
    localStorage.setItem(DISMISS_KEY, String(Date.now()));
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    window.__deferredInstallPrompt = e;
    document.dispatchEvent(new CustomEvent('pwa-installable'));
    showBanner();
  });

  window.addEventListener('appinstalled', () => {
    deferredInstallPrompt = null;
    window.__deferredInstallPrompt = null;
    window.__pwaInstalled = true;
    document.dispatchEvent(new CustomEvent('pwa-installed'));
    hideBanner();
  });

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isAndroid = /android/i.test(navigator.userAgent);
  const isMobile = isIOS || isAndroid;

  function showManualInstructions() {
    const titleEl = document.getElementById('iabInstructionsTitle');
    const textEl = document.getElementById('iabInstructionsText');
    if (isIOS) {
      titleEl.textContent = 'تثبيت التطبيق على آيفون';
      textEl.innerHTML = 'اضغط زر <b>المشاركة</b> <span data-lucide="share" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;"></span> بالأسفل في Safari، ثم اختر <b>"إضافة إلى الشاشة الرئيسية"</b>.';
    } else {
      titleEl.textContent = 'تثبيت التطبيق على الأندرويد';
      textEl.innerHTML = 'اضغط زر القائمة <b>⋮</b> بأعلى المتصفح، ثم اختر <b>"إضافة إلى الشاشة الرئيسية"</b> أو <b>"تثبيت التطبيق"</b>.';
    }
    document.getElementById('iabIosModal')?.classList.remove('hidden');
    if (window.lucide) lucide.createIcons();
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (isMobile && !isStandalone()) setTimeout(showBanner, 600);

    document.getElementById('iabCloseBtn')?.addEventListener('click', hideBanner);

    document.getElementById('iabInstallBtn')?.addEventListener('click', async () => {
      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        hideBanner();
      } else {
        showManualInstructions();
      }
    });

    document.getElementById('iabIosCloseBtn')?.addEventListener('click', () => {
      document.getElementById('iabIosModal')?.classList.add('hidden');
      hideBanner();
    });
  });
})();

      <div class="search-wrap" style="flex:1;"><input type="text" id="gsInput" class="search-input" value="${esc(q)}" placeholder="ابحث في الاجتماعات، المهام، القرارات، الصيانة، الجودة، الموظفين..."></div>

/* ============ صفحة الإشعارات الموسّعة ============ */
async function pageNotifications(body, query) {
  body.innerHTML = '<p class="empty-state">جاري تحميل الإشعارات...</p>';
  const { data: notifs } = await sb.from('notifications')
    .select('*').eq('user_id', CURRENT_USER.id)
    .order('created_at', { ascending: false }).limit(200);
  const rows = notifs || [];

  const state = { tab: query?.tab || 'all', search: '' };

  function classifyLink(link) {
    if (!link) return 'other';
    if (link.includes('meeting')) return 'meetings';
    if (link.includes('task')) return 'tasks';
    if (link.includes('maintenance')) return 'maintenance';
    if (link.includes('quality')) return 'quality';
    if (link.includes('conversation')) return 'chat';
    if (link.includes('emergency')) return 'emergency';
    return 'other';
  }

  function iconFor(cat) {
    return { meetings: 'calendar', tasks: 'check-square', maintenance: 'wrench', quality: 'shield-check', chat: 'message-circle', emergency: 'siren', other: 'bell' }[cat] || 'bell';
  }
  function colorFor(cat) {
    return { meetings: '#2F80C9', tasks: '#D6A437', maintenance: '#0F3D2E', quality: '#1F7A3A', chat: '#7C6BF2', emergency: '#D32F2F', other: '#6B756F' }[cat] || '#6B756F';
  }

  const unreadCount = rows.filter(n => !n.is_read).length;
  const catCounts = { all: rows.length, unread: unreadCount, meetings: 0, tasks: 0, maintenance: 0, quality: 0, chat: 0, emergency: 0 };
  rows.forEach(n => { const c = classifyLink(n.link); if (catCounts[c] != null) catCounts[c]++; });

  const tabs = [
    ['all','الكل','list'],['unread','غير مقروءة','bell-ring'],
    ['meetings','اجتماعات','calendar'],['tasks','مهام','check-square'],
    ['maintenance','صيانة','wrench'],['quality','جودة','shield-check'],
    ['chat','رسائل','message-circle'],['emergency','طارئ','siren']
  ];

  body.innerHTML = `
    <div class="mt-hero-header">
      <div><h2><span class="mt-accent"></span> <span data-lucide="bell" style="width:22px;height:22px;color:#0F3D2E;"></span> الإشعارات</h2>
        <p>راجع كل الإشعارات، صنّفها حسب النوع، وحذف القديم منها.</p></div>
      <div style="display:flex;gap:8px;align-self:center;flex-wrap:wrap;">
        <button class="btn btn-outline" id="notifMarkAll" style="font-size:12px;" ${unreadCount?'':'disabled'}><span data-lucide="check-check" style="width:14px;height:14px;"></span> علّم الكل كمقروء</button>
        <button class="btn btn-outline" id="notifDeleteRead" style="font-size:12px;color:var(--danger);border-color:var(--danger);"><span data-lucide="trash-2" style="width:14px;height:14px;"></span> حذف المقروءة</button>
      </div>
    </div>

    <div class="rep-tabs" id="notifTabs">${tabs.map(t => `<button class="rep-tab ${t[0]===state.tab?'active':''}" data-tab="${t[0]}"><span data-lucide="${t[2]}" style="width:14px;height:14px;"></span> ${t[1]} <span style="margin-right:4px;font-size:10.5px;background:rgba(0,0,0,0.08);padding:1px 7px;border-radius:8px;">${catCounts[t[0]]||0}</span></button>`).join('')}</div>

    <div class="table-toolbar" style="margin-bottom:14px;">
      <div class="search-wrap" style="flex:1;"><input type="text" id="notifSearch" class="search-input" placeholder="بحث في الإشعارات..."></div>
    </div>

    <div id="notifBody"></div>
  `;
  if (window.lucide) lucide.createIcons();

  function groupByTime(list) {
    const today = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today.getTime() - 86400000);
    const weekAgo = new Date(today.getTime() - 7*86400000);
    const groups = { today: [], yesterday: [], week: [], older: [] };
    list.forEach(n => {
      const d = new Date(n.created_at);
      if (d >= today) groups.today.push(n);
      else if (d >= yesterday) groups.yesterday.push(n);
      else if (d >= weekAgo) groups.week.push(n);
      else groups.older.push(n);
    });
    return groups;
  }

  function renderList() {
    let filtered = [...rows];
    if (state.tab === 'unread') filtered = filtered.filter(n => !n.is_read);
    else if (state.tab !== 'all') filtered = filtered.filter(n => classifyLink(n.link) === state.tab);
    if (state.search) {
      const q = state.search.toLowerCase();
      filtered = filtered.filter(n => ((n.title||'') + ' ' + (n.body||'')).toLowerCase().includes(q));
    }
    if (!filtered.length) { document.getElementById('notifBody').innerHTML = '<div class="panel"><div class="panel-body" style="text-align:center;color:var(--text-muted);padding:40px;font-size:13px;"><span data-lucide="bell-off" style="width:32px;height:32px;color:#9aa39c;"></span><div style="margin-top:10px;">لا توجد إشعارات</div></div></div>'; if (window.lucide) lucide.createIcons(); return; }

    const g = groupByTime(filtered);
    const sections = [['today','اليوم'],['yesterday','أمس'],['week','خلال الأسبوع'],['older','قديمة']];
    document.getElementById('notifBody').innerHTML = sections.map(([k,lbl]) => {
      if (!g[k].length) return '';
      return `<div class="panel" style="margin-bottom:14px;">
        <div class="panel-header"><h3 class="panel-title"><span data-lucide="clock" style="width:15px;height:15px;"></span> ${lbl} <span style="font-size:11.5px;color:var(--text-muted);font-weight:600;">(${g[k].length})</span></h3></div>
        <div class="panel-body" style="padding:0;">
          ${g[k].map(n => { const cat = classifyLink(n.link); return `
            <div class="notif-row ${n.is_read?'':'unread'}" data-id="${n.id}" data-link="${esc(n.link||'')}" style="display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;${n.is_read?'':'background:rgba(31,122,58,0.05);'}">
              <div style="width:36px;height:36px;border-radius:10px;background:${colorFor(cat)}18;color:${colorFor(cat)};display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span data-lucide="${iconFor(cat)}" style="width:17px;height:17px;"></span></div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:${n.is_read?600:800};font-size:13.5px;color:var(--text);">${esc(n.title)}</div>
                ${n.body?`<div style="font-size:12.5px;color:var(--text-muted);margin-top:3px;line-height:1.6;">${esc(n.body)}</div>`:''}
                <div style="font-size:11.5px;color:var(--text-muted);margin-top:4px;">${fmtDate(n.created_at)}</div>
              </div>
              <button class="ai-btn danger" data-del="${n.id}" title="حذف" onclick="event.stopPropagation();" style="align-self:center;"><span data-lucide="x" style="width:13px;height:13px;"></span></button>
            </div>
          `; }).join('')}
        </div>
      </div>`;
    }).join('');
    if (window.lucide) lucide.createIcons();

    document.querySelectorAll('.notif-row').forEach(row => row.addEventListener('click', async () => {
      const id = Number(row.dataset.id);
      const link = row.dataset.link;
      const nRec = rows.find(x => x.id === id);
      if (nRec && !nRec.is_read) {
        await sb.from('notifications').update({ is_read: true }).eq('id', id);
        nRec.is_read = true;
      }
      if (link) location.hash = link;
    }));
    document.querySelectorAll('[data-del]').forEach(btn => btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = Number(btn.dataset.del);
      const { error } = await sb.from('notifications').delete().eq('id', id);
      if (error) { toast(error.message, 'error'); return; }
      const idx = rows.findIndex(x => x.id === id);
      if (idx >= 0) rows.splice(idx, 1);
      renderList();
    }));
  }

  renderList();

  document.getElementById('notifTabs').querySelectorAll('.rep-tab').forEach(b => b.addEventListener('click', () => {
    state.tab = b.dataset.tab;
    document.querySelectorAll('#notifTabs .rep-tab').forEach(x => x.classList.toggle('active', x === b));
    renderList();
  }));
  document.getElementById('notifSearch').addEventListener('input', e => { state.search = e.target.value; renderList(); });

  document.getElementById('notifMarkAll').addEventListener('click', async () => {
    const { error } = await sb.from('notifications').update({ is_read: true }).eq('user_id', CURRENT_USER.id).eq('is_read', false);
    if (error) { toast(error.message, 'error'); return; }
    rows.forEach(n => n.is_read = true);
    toast('تم تعليم كل الإشعارات كمقروءة', 'success');
    pageNotifications(body, query);
  });
  document.getElementById('notifDeleteRead').addEventListener('click', async () => {
    if (!confirm('حذف كل الإشعارات المقروءة؟ لا يمكن التراجع.')) return;
    const { error } = await sb.from('notifications').delete().eq('user_id', CURRENT_USER.id).eq('is_read', true);
    if (error) { toast(error.message, 'error'); return; }
    toast('تم حذف الإشعارات المقروءة', 'success');
    pageNotifications(body, query);
  });
}

const Q_STATUS_COLOR = { conform: '#1F7A3A', follow_up: '#D6A437', non_conform: '#D32F2F', na: '#6B756F', fixed_on_site: '#2F80C9' };
const Q_CORRECTIVE_OPTS = ['none','verbal_warning','retrain','immediate_cleaning','urgent_maintenance','replace_tool','temp_stop','fix_on_visit','raise_maintenance','escalate','custom'];
function qScoreColor(pct) { return pct >= 90 ? '#1F7A3A' : pct >= 75 ? '#D6A437' : pct >= 50 ? '#F2994A' : '#D32F2F'; }

/* ---------- لوحة الجودة + قائمة الزيارات ---------- */
async function pageQuality(body, query) {
  const canCreate = can('quality', 'manage') || ['admin','company_manager','quality_manager','operations_manager','department_manager'].includes(CURRENT_USER.role);

  body.innerHTML = `
    <div class="mt-hero-header">
      <div>
        <h2><span class="mt-accent"></span> <span data-lucide="shield-check" style="width:22px;height:22px;color:#0F3D2E;"></span> إدارة الجودة</h2>
        <p>نفّذ زيارات تدقيق الجودة على الفروع، قيّم المعايير التشغيلية، وتابع نسب الالتزام والمخالفات.</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-self:center;">
        <a href="#quality_reports" class="btn btn-outline" style="font-size:12.5px;border-color:#D6A437;color:#9A6B12;"><span data-lucide="bar-chart-3" style="width:15px;height:15px;"></span> تقارير الجودة</a>
        ${canCreate ? '<a href="#quality_new" class="btn" style="background:var(--primary);color:#fff;font-size:12.5px;"><span data-lucide="plus" style="width:15px;height:15px;"></span> زيارة جودة جديدة</a>' : ''}
      </div>
    </div>
    <div class="kpi-grid" id="qKpi">${[1,2,3,4].map(()=>'<div class="kpi-card"><div class="skeleton skeleton-row" style="width:42px;height:42px;border-radius:8px;"></div><div class="skeleton skeleton-row" style="width:60%;margin-top:12px;"></div></div>').join('')}</div>
    <div class="panel" id="qSkeleton"><div class="panel-body"><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row"></div></div></div>
  `;
  if (window.lucide) lucide.createIcons();

  const [{ data: visits }, { data: branches }] = await Promise.all([
    sb.from('quality_visits').select('*, branches(name), users(full_name)').order('created_at', { ascending: false }),
    sb.from('branches').select('*').eq('is_active', true).order('name')
  ]);
  const rows = visits || [];
  const thisMonth = new Date().toISOString().slice(0, 7);
  const monthVisits = rows.filter(r => (r.visit_date || r.created_at || '').slice(0, 7) === thisMonth).length;
  const completed = rows.filter(r => r.status === 'completed');
  const avgCompliance = completed.length ? Math.round(completed.reduce((s, r) => s + Number(r.compliance_pct || 0), 0) / completed.length) : 0;
  const openNonConform = rows.reduce((s, r) => s + Number(r.non_conform_count || 0), 0);

  // أقل الفروع التزامًا
  const branchScores = {};
  completed.forEach(r => { const b = r.branches?.name || '—'; (branchScores[b] = branchScores[b] || []).push(Number(r.compliance_pct || 0)); });
  const lowBranches = Object.entries(branchScores).map(([n, arr]) => [n, Math.round(arr.reduce((a, b) => a + b, 0) / arr.length)]).sort((a, b) => a[1] - b[1]).slice(0, 5);

  document.getElementById('qKpi').innerHTML = `
    <div class="kpi-card"><div class="kpi-icon c-blue"><span data-lucide="clipboard-check" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${monthVisits}</div><div class="kpi-label">زيارات هذا الشهر</div></div>
    <div class="kpi-card"><div class="kpi-icon ${avgCompliance>=75?'c-green':'c-red'}"><span data-lucide="percent" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${avgCompliance}%</div><div class="kpi-label">متوسط الالتزام</div></div>
    <div class="kpi-card"><div class="kpi-icon c-red"><span data-lucide="alert-triangle" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${openNonConform}</div><div class="kpi-label">بنود غير مطابقة</div></div>
    <div class="kpi-card"><div class="kpi-icon c-gold"><span data-lucide="clipboard-list" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${rows.length}</div><div class="kpi-label">إجمالي الزيارات</div></div>
  `;

  document.getElementById('qSkeleton').remove();
  const analytics = lowBranches.length ? `
    <div class="panel" style="margin-top:14px;"><div class="panel-header"><h3 class="panel-title"><span data-lucide="trending-down" style="width:17px;height:17px;"></span> أقل الفروع التزامًا</h3></div><div class="panel-body">
      ${lowBranches.map(([n,p]) => `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px;"><span>${esc(n)}</span><strong style="color:${qScoreColor(p)};">${p}%</strong></div>`).join('')}

  const state = { branch: query?.branch || '', status: query?.status || '', search: '' };
  const listPanel = `
    ${analytics}
    <div class="panel" style="margin-top:14px;"><div class="panel-header"><h3 class="panel-title"><span data-lucide="list-checks" style="width:18px;height:18px;"></span> زيارات الجودة</h3></div>
    <div class="panel-body">
      <div class="table-toolbar" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
        <div class="search-wrap" style="flex:1;min-width:180px;"><input type="text" id="qSearch" placeholder="بحث برقم الزيارة أو الفرع..." class="search-input"></div>
        <select id="qBranchFilter" class="form-select"><option value="">كل الفروع</option>${(branches||[]).map(b => `<option value="${b.id}" ${state.branch==String(b.id)?'selected':''}>${esc(b.name)}</option>`).join('')}</select>
        <select id="qStatusFilter" class="form-select"><option value="">كل الحالات</option><option value="draft" ${state.status==='draft'?'selected':''}>مسودة</option><option value="completed" ${state.status==='completed'?'selected':''}>مكتملة</option></select>
      </div>
      <div style="overflow-x:auto;"><table class="adv-table"><thead><tr><th>#</th><th>الفرع</th><th>المقيّم</th><th>التاريخ</th><th>النوع</th><th>الالتزام</th><th>الحالة</th><th></th></tr></thead><tbody id="qTbody"></tbody></table></div>
    </div></div>
  `;
  body.insertAdjacentHTML('beforeend', listPanel);
  if (window.lucide) lucide.createIcons();

  function renderRows() {
    const q = state.search.trim().toLowerCase();
    const filtered = rows.filter(r => {
      if (state.branch && String(r.branch_id) !== state.branch) return false;
      if (state.status && r.status !== state.status) return false;
      if (q && !((r.visit_no||'') + ' ' + (r.branches?.name||'')).toLowerCase().includes(q)) return false;
      return true;
    });
    const tb = document.getElementById('qTbody');
    if (!filtered.length) { tb.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text-muted);">لا توجد زيارات</td></tr>'; return; }
    tb.innerHTML = filtered.map(r => {
      const pct = Math.round(Number(r.compliance_pct || 0));
      const href = r.status === 'draft' ? '#quality_new/' + r.id : '#quality_detail/' + r.id;
      return `<tr style="cursor:pointer;" onclick="location.hash='${href}'">
        <td style="font-weight:700;color:var(--primary);">${esc(r.visit_no || r.id)}</td>
        <td>${esc(r.branches?.name || '-')}</td>
        <td>${esc(r.inspector_name || r.users?.full_name || '-')}</td>
        <td style="font-size:11.5px;color:var(--text-muted);">${esc((r.visit_date||'').slice(0,10) || fmtDate(r.created_at))}</td>
        <td>${label('quality_visit_type', r.visit_type)}</td>
        <td>${r.status==='completed' ? `<span style="font-weight:800;color:${qScoreColor(pct)};">${pct}%</span>` : '-'}</td>
        <td>${r.status==='completed' ? '<span class="badge-status badge-done">مكتملة</span>' : '<span class="badge-status badge-closed">مسودة</span>'}</td>
        <td><a href="${href}" class="btn btn-outline" style="padding:4px 10px;font-size:11px;" onclick="event.stopPropagation();">${r.status==='draft'?'استكمال':'عرض'}</a></td>
      </tr>`;
    }).join('');
  }
  renderRows();
  document.getElementById('qSearch').addEventListener('input', e => { state.search = e.target.value; renderRows(); });
  document.getElementById('qBranchFilter').addEventListener('change', e => { state.branch = e.target.value; renderRows(); });
  document.getElementById('qStatusFilter').addEventListener('change', e => { state.status = e.target.value; renderRows(); });
}

/* ---------- زيارة جودة جديدة (جدول البنود والإجراءات التصحيحية) ---------- */
async function pageQualityVisitNew(body, param) {
  const resumeId = param ? Number(param) : null;
  const [{ data: sections }, { data: items }, { data: branches }, { data: users }] = await Promise.all([
    sb.from('quality_sections').select('*').eq('is_active', true).order('sort_order'),
    sb.from('quality_items').select('*').eq('is_active', true).order('sort_order'),
    sb.from('branches').select('*').eq('is_active', true).order('name'),
    sb.from('users').select('id, full_name').eq('is_active', true).order('full_name')
  ]);
  const secs = sections || [];
  const secTitle = {}; secs.forEach(s => secTitle[s.id] = s.title);
  const itemsBySec = {};
  (items || []).forEach(it => { (itemsBySec[it.section_id] = itemsBySec[it.section_id] || []).push(it); });
  const flat = [];
  secs.forEach(s => (itemsBySec[s.id] || []).forEach(it => flat.push(it)));
  const totalItems = flat.length;
  const usersList = users || [];

  // الحالة: بيانات كل بند + صور لكل قسم
  const Q = { items: {}, secPhotos: {}, meta: { branch_id: '', inspector_name: CURRENT_USER.full_name, visit_type: 'daily', visit_date: new Date().toISOString().slice(0, 10) } };
  flat.forEach(it => { Q.items[it.id] = { status: '', corrective: '', custom: '', notes: '', responsible: '', due: '', action_status: '' }; });
  secs.forEach(s => { Q.secPhotos[s.id] = []; });
  let prevByItem = {};

  if (resumeId) {
    const [{ data: v }, { data: vi }] = await Promise.all([
      sb.from('quality_visits').select('*').eq('id', resumeId).single(),
      sb.from('quality_visit_items').select('*').eq('visit_id', resumeId)
    ]);
    if (v) { Q.meta.branch_id = String(v.branch_id || ''); Q.meta.inspector_name = v.inspector_name || Q.meta.inspector_name; Q.meta.visit_type = v.visit_type || 'daily'; Q.meta.visit_date = (v.visit_date || '').slice(0, 10) || Q.meta.visit_date; }
    (vi || []).forEach(r => { const d = Q.items[r.item_id]; if (d) { d.status = r.status || ''; d.corrective = r.corrective_action || ''; d.custom = r.custom_corrective_action || ''; d.notes = r.notes || ''; d.responsible = r.responsible_user_id ? String(r.responsible_user_id) : ''; d.due = (r.due_date || '').slice(0, 10); d.action_status = r.action_status || ''; } });
  }

  const noBranches = !branches || !branches.length;
  const statusOpts = ['conform','non_conform','follow_up','na','fixed_on_site'];
  const optHtml = (group, list, sel) => list.map(v => `<option value="${v}" ${sel===v?'selected':''}>${label(group, v)}</option>`).join('');

  body.innerHTML = `
    <a href="#quality" class="mt-back-link"><span data-lucide="arrow-right" style="width:14px;height:14px;"></span> رجوع لزيارات الجودة</a>
    <div class="mt-hero-header">
      <div><h2><span class="mt-accent"></span> <span data-lucide="clipboard-check" style="width:22px;height:22px;color:#0F3D2E;"></span> متابعة الزيارات والإجراءات التصحيحية</h2>
        <p>كل بند في صف مستقل، بجانبه الإجراء التصحيحي وملاحظات الزيارة الحالية وملخص الزيارة السابقة. اسحب الجدول يمينًا ويسارًا لعرض باقي الأعمدة.</p></div>
    </div>

    ${noBranches ? '<div class="panel" style="border:1.5px solid #F2C94C;background:#FFFBEF;margin-bottom:14px;"><div class="panel-body" style="font-size:13px;color:#7A4E0E;">لا توجد فروع مسجلة. أضف فرعًا أولًا من قسم الصيانة → الفروع.</div></div>' : ''}

    <div class="meeting-form-card">
      <div class="meeting-section-title"><span class="mst-accent"></span><span data-lucide="map-pin" style="width:17px;height:17px;"></span> بيانات الزيارة</div>
      <div class="mform-grid">
        <div class="form-field"><label>الفرع *</label>
          <select id="qBranch" class="form-select" ${noBranches?'disabled':''}><option value="">اختر الفرع</option>${(branches||[]).map(b => `<option value="${b.id}" ${Q.meta.branch_id==String(b.id)?'selected':''}>${esc(b.name)}</option>`).join('')}</select></div>
        <div class="form-field"><label>اسم المفتش / المسؤول</label><input id="qInspector" class="form-input" value="${esc(Q.meta.inspector_name)}"></div>
        <div class="form-field"><label>نوع الزيارة</label>
          <select id="qType" class="form-select">${['daily','weekly','monthly','surprise'].map(t => `<option value="${t}" ${Q.meta.visit_type===t?'selected':''}>${label('quality_visit_type', t)}</option>`).join('')}</select></div>
        <div class="form-field"><label>تاريخ الزيارة</label><input id="qDate" type="date" class="form-input" value="${Q.meta.visit_date}"></div>
      </div>
    </div>

    <div class="q-progress-bar">
      <div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:12.5px;color:#24352E;">التقدّم</strong><span id="qProgPct" style="font-size:12.5px;font-weight:800;color:#0F3D2E;">0%</span></div>
      <div class="q-progress-track"><div class="q-progress-fill" id="qProgFill" style="width:0%;"></div></div>
      <div class="q-counters" id="qCounters"></div>
    </div>

    <div class="table-toolbar" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;">
      <div class="search-wrap" style="flex:1;min-width:170px;"><input type="text" id="qtSearch" class="search-input" placeholder="بحث في البنود..."></div>
      <select id="qtSecFilter" class="form-select"><option value="">كل الأقسام</option>${secs.map(s => `<option value="${s.id}">${esc(s.title)}</option>`).join('')}</select>
      <select id="qtStatusFilter" class="form-select"><option value="">كل الحالات</option>${statusOpts.map(s => `<option value="${s}">${label('quality_status', s)}</option>`).join('')}</select>
      <button type="button" class="btn btn-outline" id="qtAllConform" style="font-size:12px;"><span data-lucide="check-check" style="width:14px;height:14px;"></span> تعليم الكل «مطابق»</button>
      <button type="button" class="btn btn-outline qt-expand-btn" id="qtExpand" style="font-size:12px;"><span data-lucide="minimize-2" style="width:14px;height:14px;"></span> <span id="qtExpandLbl">العرض الموسّع</span></button>
    </div>

    <div class="qtbl-hint"><span data-lucide="move-horizontal" style="width:15px;height:15px;"></span> اسحب الجدول يمينًا ويسارًا لعرض الإجراء التصحيحي والملاحظات وملخص الزيارة السابقة.</div>

    <!-- صور الأقسام (اختياري لكل قسم) -->
    <details class="meeting-form-card" style="margin-bottom:12px;">
      <summary style="cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:800;color:#24352E;font-size:14px;list-style:none;"><span data-lucide="image" style="width:17px;height:17px;color:#D6A437;"></span> صور توثيقية لكل قسم (اختياري) <span style="margin-right:auto;font-size:11.5px;color:#6B756F;font-weight:600;">اضغط للفتح</span></summary>
      <div style="margin-top:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;">
        ${secs.map(s => `
          <div style="border:1px solid #E8E3D6;border-radius:12px;padding:10px;background:#FFFDF7;">
            <div style="font-weight:700;font-size:12.5px;color:#24352E;margin-bottom:8px;">${esc(s.title)}</div>
            <div class="mt-upload" style="padding:10px;"><input type="file" accept="image/*" multiple data-secphoto="${s.id}"><span data-lucide="image-plus" class="u-ic" style="width:20px;height:20px;"></span><div class="u-t" style="font-size:11.5px;">صور القسم</div></div>
            <div class="mt-thumbs" data-secthumbs="${s.id}"></div>
          </div>
        `).join('')}
      </div>
    </details>
    <datalist id="qUsersDL">${usersList.map(u => `<option value="${esc(u.full_name)}"></option>`).join('')}</datalist>

    <div class="qtbl-scroll">
      <table class="qtbl">
        <thead><tr>
          <th class="col-num">#</th>
          <th class="col-item">البند</th>
          <th>القسم</th>
          <th>الحالة الحالية</th>
          <th>الإجراء التصحيحي</th>
          <th>إجراء مخصص</th>
          <th>المسؤول</th>
          <th>تاريخ الاستحقاق</th>
          <th>حالة الإجراء</th>
          <th>ملاحظات الزيارة الحالية</th>
          <th>حالة الزيارة السابقة</th>
          <th>الإجراء السابق</th>
          <th>ملاحظات سابقة</th>
          <th>تاريخ آخر زيارة</th>
        </tr></thead>
        <tbody id="qtBody">
          ${flat.map((it, i) => { const d = Q.items[it.id]; return `
            <tr data-row data-item="${it.id}" data-sec="${it.section_id}">
              <td class="col-num">${i+1}</td>
              <td class="col-item">${esc(it.text)}</td>
              <td>${esc(secTitle[it.section_id] || '')}</td>
              <td><select class="qt-status" data-item="${it.id}" data-v="${d.status}"><option value="">—</option>${optHtml('quality_status', statusOpts, d.status)}</select></td>
              <td><select class="qt-corr" data-item="${it.id}"><option value="">—</option>${optHtml('quality_corrective', Q_CORRECTIVE_OPTS, d.corrective)}</select></td>
              <td><input class="qt-custom" data-item="${it.id}" value="${esc(d.custom)}" placeholder="اكتب الإجراء" style="display:${d.corrective==='custom'?'block':'none'};"></td>
              <td><input class="qt-resp" list="qUsersDL" data-item="${it.id}" value="${esc((usersList.find(u => String(u.id) === d.responsible) || {}).full_name || '')}" placeholder="اسم المسؤول"></td>
              <td><input type="date" class="qt-due" data-item="${it.id}" value="${d.due}"></td>
              <td><select class="qt-act" data-item="${it.id}"><option value="">—</option>${optHtml('quality_action_status', ['not_started','in_progress','done','overdue','cancelled'], d.action_status)}</select></td>
              <td><input class="qt-notes" data-item="${it.id}" value="${esc(d.notes)}" placeholder="ملاحظات..."></td>
              <td class="qt-prev" id="qprev-status-${it.id}">—</td>
              <td class="qt-prev" id="qprev-corr-${it.id}">—</td>
              <td class="qt-prev" id="qprev-notes-${it.id}">—</td>
              <td class="qt-prev" id="qprev-date-${it.id}">—</td>
            </tr>`; }).join('')}
        </tbody>
      </table>
    </div>

    <div class="mt-submit-bar">
      <a href="#quality" class="btn btn-outline"><span data-lucide="x" style="width:14px;height:14px;"></span> إلغاء</a>
      <button type="button" class="btn btn-outline" id="qSaveDraft"><span data-lucide="save" style="width:14px;height:14px;"></span> حفظ كمسودة</button>
      <button type="button" class="btn" id="qFinish" style="background:var(--primary);color:#fff;"><span data-lucide="check-circle-2" style="width:15px;height:15px;"></span> إنهاء الزيارة</button>
    </div>
  `;
  if (window.lucide) lucide.createIcons();

  // meta
  const qBranch = document.getElementById('qBranch');
  qBranch.addEventListener('change', async e => { Q.meta.branch_id = e.target.value; await loadPrev(e.target.value); });
  document.getElementById('qInspector').addEventListener('input', e => Q.meta.inspector_name = e.target.value);
  document.getElementById('qType').addEventListener('change', e => Q.meta.visit_type = e.target.value);
  document.getElementById('qDate').addEventListener('change', e => Q.meta.visit_date = e.target.value);

  function refreshProgress() {
    let c = 0, fx = 0, f = 0, n = 0, na = 0, answered = 0;
    flat.forEach(it => { const s = Q.items[it.id].status; if (!s) return; answered++; if (s==='conform') c++; else if (s==='fixed_on_site') fx++; else if (s==='follow_up') f++; else if (s==='non_conform') n++; else if (s==='na') na++; });
    const pct = totalItems ? Math.round(answered / totalItems * 100) : 0;
    document.getElementById('qProgPct').textContent = pct + '%';
    document.getElementById('qProgFill').style.width = pct + '%';
    document.getElementById('qCounters').innerHTML = `
      <span class="q-counter c-total">الكل ${totalItems}</span>
      <span class="q-counter c-conform">مطابق ${c}</span>
      <span class="q-counter" style="background:rgba(47,128,201,0.12);color:#2F80C9;">مُصحّح ${fx}</span>
      <span class="q-counter c-follow">متابعة ${f}</span>
      <span class="q-counter c-non">غير مطابق ${n}</span>
      <span class="q-counter c-na">لا ينطبق ${na}</span>`;
  }

  // status
  body.querySelectorAll('.qt-status').forEach(sel => sel.addEventListener('change', e => {
    Q.items[sel.dataset.item].status = e.target.value; sel.dataset.v = e.target.value; refreshProgress();
  }));
  // corrective + custom toggle
  body.querySelectorAll('.qt-corr').forEach(sel => sel.addEventListener('change', e => {
    Q.items[sel.dataset.item].corrective = e.target.value;
    const ci = body.querySelector('.qt-custom[data-item="' + sel.dataset.item + '"]');
    if (ci) ci.style.display = e.target.value === 'custom' ? 'block' : 'none';
  }));
  body.querySelectorAll('.qt-custom').forEach(i => i.addEventListener('input', e => Q.items[i.dataset.item].custom = e.target.value));
  body.querySelectorAll('.qt-resp').forEach(s => s.addEventListener('input', e => {
    const u = usersList.find(x => x.full_name === e.target.value.trim());
    Q.items[s.dataset.item].responsible = u ? String(u.id) : '';
  }));
  body.querySelectorAll('.qt-due').forEach(i => i.addEventListener('change', e => Q.items[i.dataset.item].due = e.target.value));
  body.querySelectorAll('.qt-act').forEach(s => s.addEventListener('change', e => Q.items[s.dataset.item].action_status = e.target.value));
  body.querySelectorAll('.qt-notes').forEach(i => i.addEventListener('input', e => Q.items[i.dataset.item].notes = e.target.value));

  // mark all conform
  document.getElementById('qtAllConform').addEventListener('click', () => {
    flat.forEach(it => { Q.items[it.id].status = 'conform'; });
    body.querySelectorAll('.qt-status').forEach(sel => { sel.value = 'conform'; sel.dataset.v = 'conform'; });
    refreshProgress();
  });

  // العرض الموسّع (تصغير الخط والأعمدة المثبّتة)
  const qtbl = body.querySelector('.qtbl'), expBtn = document.getElementById('qtExpand'), expLbl = document.getElementById('qtExpandLbl');
  function applyExpand(on) {
    qtbl.classList.toggle('compact', on);
    expBtn.classList.toggle('active', on);
    expLbl.textContent = on ? 'العرض العادي' : 'العرض الموسّع';
    localStorage.setItem('q_expand', on ? '1' : '0');
  }
  expBtn.addEventListener('click', () => applyExpand(!qtbl.classList.contains('compact')));
  if (localStorage.getItem('q_expand') === '1') applyExpand(true);

  // filters
  const fSearch = document.getElementById('qtSearch'), fSec = document.getElementById('qtSecFilter'), fStatus = document.getElementById('qtStatusFilter');
  function applyFilters() {
    const q = fSearch.value.trim().toLowerCase(), sec = fSec.value, stt = fStatus.value;
    body.querySelectorAll('#qtBody tr[data-row]').forEach(tr => {
      const it = flat.find(x => String(x.id) === tr.dataset.item);
      let show = true;
      if (q && !(it.text || '').toLowerCase().includes(q)) show = false;
      if (sec && tr.dataset.sec !== sec) show = false;
      if (stt && Q.items[tr.dataset.item].status !== stt) show = false;
      tr.style.display = show ? '' : 'none';
    });
  }
  fSearch.addEventListener('input', applyFilters);
  fSec.addEventListener('change', applyFilters);
  fStatus.addEventListener('change', applyFilters);

  // جلب ملخص الزيارة السابقة لنفس الفرع
  async function loadPrev(branchId) {
    prevByItem = {};
    flat.forEach(it => { ['status','corr','notes','date'].forEach(k => { const el = document.getElementById('qprev-' + k + '-' + it.id); if (el) { el.textContent = '—'; el.style.color = ''; } }); });
    if (!branchId) return;
    let query = sb.from('quality_visits').select('id, visit_date').eq('branch_id', branchId).eq('status', 'completed').order('visit_date', { ascending: false }).order('created_at', { ascending: false }).limit(1);
    if (resumeId) query = query.neq('id', resumeId);
    const { data: pv } = await query;
    if (!pv || !pv.length) return;
    const pvisit = pv[0];
    const { data: pit } = await sb.from('quality_visit_items').select('*').eq('visit_id', pvisit.id);
    (pit || []).forEach(r => { prevByItem[r.item_id] = { status: r.status, corrective: r.corrective_action, custom: r.custom_corrective_action, notes: r.notes, date: pvisit.visit_date }; });
    flat.forEach(it => {
      const p = prevByItem[it.id]; if (!p) return;
      const st = document.getElementById('qprev-status-' + it.id);
      if (st && p.status) { st.textContent = label('quality_status', p.status); st.style.color = Q_STATUS_COLOR[p.status] || ''; st.style.fontWeight = '700'; }
      const co = document.getElementById('qprev-corr-' + it.id);
      if (co) co.textContent = p.corrective ? (p.corrective === 'custom' ? (p.custom || 'مخصص') : label('quality_corrective', p.corrective)) : '—';
      const no = document.getElementById('qprev-notes-' + it.id);
      if (no) no.textContent = p.notes || '—';
      const dt = document.getElementById('qprev-date-' + it.id);
      if (dt) dt.textContent = (p.date || '').slice(0, 10) || '—';
    });
  }

  // رفع صور الأقسام (مضغوطة)
  body.querySelectorAll('[data-secphoto]').forEach(inp => inp.addEventListener('change', async () => {
    const sid = inp.dataset.secphoto;
    for (const f of Array.from(inp.files || [])) {
      if (Q.secPhotos[sid].length >= 6) { toast('حد أقصى 6 صور للقسم', 'warning'); break; }
      try { Q.secPhotos[sid].push(await compressImage(f, 1000, 0.6)); } catch (e) {}
    }
    inp.value = '';
    const tw = body.querySelector('[data-secthumbs="' + sid + '"]');
    tw.innerHTML = Q.secPhotos[sid].map((src, i) => `<div class="mt-thumb"><img src="${src}"><button type="button" class="rm" data-rmsecphoto="${i}" data-sid="${sid}">×</button></div>`).join('');
    tw.querySelectorAll('[data-rmsecphoto]').forEach(b => b.addEventListener('click', () => { Q.secPhotos[b.dataset.sid].splice(Number(b.dataset.rmsecphoto), 1); inp.dispatchEvent(new Event('change')); }));
  }));

  refreshProgress();
  if (Q.meta.branch_id) loadPrev(Q.meta.branch_id);

  async function persist(isFinish) {
    if (!Q.meta.branch_id) { toast('اختر الفرع أولًا', 'error'); return; }
    let c = 0, fx = 0, f = 0, n = 0, na = 0;
    flat.forEach(it => { const s = Q.items[it.id].status; if (s==='conform') c++; else if (s==='fixed_on_site') fx++; else if (s==='follow_up') f++; else if (s==='non_conform') n++; else if (s==='na') na++; });
    const compliant = c + fx, evaluated = c + fx + f + n;
    if (isFinish && evaluated === 0) { toast('قيّم بندًا واحدًا على الأقل قبل الإنهاء', 'error'); return; }
    const compliance = evaluated ? Math.round(compliant / evaluated * 100) : 0;

    const btn = isFinish ? document.getElementById('qFinish') : document.getElementById('qSaveDraft');
    const other = isFinish ? document.getElementById('qSaveDraft') : document.getElementById('qFinish');
    btn.disabled = true; other.disabled = true;

    const payload = {
      branch_id: Number(Q.meta.branch_id), inspector_id: CURRENT_USER.id, inspector_name: Q.meta.inspector_name || CURRENT_USER.full_name,
      visit_type: Q.meta.visit_type, visit_date: Q.meta.visit_date, status: isFinish ? 'completed' : 'draft',
      total_items: totalItems, conform_count: c + fx, follow_up_count: f, non_conform_count: n, na_count: na, compliance_pct: compliance,
      ended_at: isFinish ? new Date().toISOString() : null, updated_at: new Date().toISOString()
    };

    let visitId = resumeId;
    if (visitId) {
      await sb.from('quality_visits').update(payload).eq('id', visitId);
      await sb.from('quality_visit_items').delete().eq('visit_id', visitId);
      await sb.from('quality_attachments').delete().eq('visit_id', visitId);
    } else {
      payload.started_at = new Date().toISOString();
      const { data: created, error } = await sb.from('quality_visits').insert(payload).select().single();
      if (error) { toast(error.message, 'error'); btn.disabled = false; other.disabled = false; return; }
      visitId = created.id;
    }

    const itemRows = [];
    flat.forEach(it => {
      const d = Q.items[it.id];
      if (d.status || d.corrective || d.notes || d.responsible || d.due || d.action_status) {
        itemRows.push({ visit_id: visitId, section_id: it.section_id, item_id: it.id, item_text: it.text, status: d.status || null,
          corrective_action: d.corrective || null, custom_corrective_action: d.corrective === 'custom' ? (d.custom || null) : null,
          notes: d.notes || null, responsible_user_id: d.responsible ? Number(d.responsible) : null, due_date: d.due || null, action_status: d.action_status || null });
      }
    });
    if (itemRows.length) await sb.from('quality_visit_items').insert(itemRows);

    // حفظ صور الأقسام
    const photoRows = [];
    for (const sid of Object.keys(Q.secPhotos)) {
      const list = Q.secPhotos[sid];
      for (let i = 0; i < list.length; i++) {
        const url = await uploadDataUri(list[i], 'quality-' + visitId + '/sec-' + sid) || list[i];
        photoRows.push({ visit_id: visitId, section_id: Number(sid), file_url: url, file_name: 'صورة ' + (i + 1), file_type: 'image', uploaded_by: CURRENT_USER.id });
      }
    }
    if (photoRows.length) await sb.from('quality_attachments').insert(photoRows);

    toast(isFinish ? `تم إنهاء الزيارة — الالتزام ${compliance}%` : 'تم حفظ المسودة', 'success');
    location.hash = isFinish ? '#quality_detail/' + visitId : '#quality';
  }

  document.getElementById('qSaveDraft').addEventListener('click', () => persist(false));
  document.getElementById('qFinish').addEventListener('click', () => persist(true));
}

/* ---------- تقرير زيارة الجودة ---------- */
async function pageQualityVisitDetail(body, id) {
  if (!id) { body.innerHTML = '<p class="empty-state">زيارة غير معروفة</p>'; return; }
  const vid = Number(id);
  const [{ data: v }, { data: vitems }, { data: vsections }, { data: atts }, { data: secDefs }] = await Promise.all([
    sb.from('quality_visits').select('*, branches(name), users(full_name)').eq('id', vid).single(),
    sb.from('quality_visit_items').select('*').eq('visit_id', vid),
    sb.from('quality_visit_sections').select('*').eq('visit_id', vid),
    sb.from('quality_attachments').select('*').eq('visit_id', vid),
    sb.from('quality_sections').select('id, title, sort_order').order('sort_order')
  ]);
  if (!v) { body.innerHTML = '<p class="empty-state">الزيارة غير موجودة</p>'; return; }

  const pct = Math.round(Number(v.compliance_pct || 0));
  const color = qScoreColor(pct);
  const bySec = {};
  (vitems || []).forEach(it => { (bySec[it.section_id] = bySec[it.section_id] || []).push(it); });
  const secExtra = {};
  (vsections || []).forEach(s => secExtra[s.section_id] = s);
  const attBySec = {};
  (atts || []).forEach(a => { (attBySec[a.section_id] = attBySec[a.section_id] || []).push(a); });
  const secOrder = (secDefs || []).length ? secDefs : Object.keys(bySec).map(id => ({ id: Number(id), title: (bySec[id][0]||{}).section_id }));

  const issues = (vitems || []).filter(it => it.status === 'non_conform' || it.status === 'follow_up');

  body.innerHTML = `
    <a href="#quality" class="mt-back-link"><span data-lucide="arrow-right" style="width:14px;height:14px;"></span> رجوع لزيارات الجودة</a>
    <div class="panel">
      <div class="panel-body" style="display:flex;gap:18px;align-items:center;flex-wrap:wrap;">
        <div class="q-score-ring" style="background:conic-gradient(${color} ${pct*3.6}deg, #ECEFE9 0deg);">
          <div style="width:74px;height:74px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <span class="pct" style="color:${color};">${pct}%</span><span class="lbl" style="color:#6B756F;">الالتزام</span>
          </div>
        </div>
        <div style="flex:1;min-width:200px;">
          <h3 class="panel-title" style="margin:0;">${esc(v.visit_no || '#'+v.id)}</h3>
          <div style="font-size:13px;color:#24352E;font-weight:700;margin-top:5px;">${esc(v.branches?.name || '-')}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:3px;">${esc(v.inspector_name || v.users?.full_name || '')} · ${label('quality_visit_type', v.visit_type)} · ${esc((v.visit_date||'').slice(0,10))}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
            <span class="q-counter c-conform">مطابق ${v.conform_count||0}</span>

function repDownloadCSV(name, header, rows) {
  const esc2 = c => '"' + String(c == null ? '' : c).replace(/"/g, '""') + '"';
  const csv = [header, ...rows].map(r => r.map(esc2).join(',')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name + '.csv';
  document.body.appendChild(a); a.click(); a.remove();
  toast('تم تصدير الملف (Excel)', 'success');
}
function repAgeDays(dateStr) { if (!dateStr) return 0; return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000); }
function repDurDays(a, b) { if (!a || !b) return null; return Math.max(0, Math.round((new Date(b).getTime() - new Date(a).getTime()) / 86400000)); }
function repPct(n, t) { return t ? Math.round(n / t * 100) : 0; }

        ${tbl(['نوع الصيانة','عدد المغلقة','متوسط الإصلاح','أسرع','أطول'], typeKeys.map(t => { const arr = byT[t]; if (!arr||!arr.length) return ''; return `<tr><td style="font-weight:700;">${label('maint_type', t)}</td><td>${arr.length}</td><td>${Math.round(arr.reduce((a,b)=>a+b,0)/arr.length)} يوم</td><td>${Math.min(...arr)} يوم</td><td>${Math.max(...arr)} يوم</td></tr>`; }).join(''))}`;
    }

    else if (state.tab === 'staff') {
      const byU = {}; rows.forEach(r => { const n = r.owner?.full_name || r.requester?.full_name || 'غير مُسند'; (byU[n] = byU[n] || []).push(r); });
      const rowsHtml = Object.entries(byU).sort((a,b) => b[1].length - a[1].length).map(([n, list]) => {
        const cl = list.filter(r => r.status === 'closed').length, dl = list.filter(DELAYED).length, ip = list.filter(r => r.status === 'in_progress').length;
        const closedR = list.filter(r => r.status === 'closed' && repDurDays(r.created_at, r.updated_at) != null);
        const avg = closedR.length ? Math.round(closedR.reduce((s,r)=>s+repDurDays(r.created_at,r.updated_at),0)/closedR.length) : 0;
        const rate = repPct(cl, list.length);
        const perf = rate >= 80 ? ['risk-stable','ممتاز'] : (rate >= 50 ? ['risk-watch','جيد'] : ['risk-high','يحتاج متابعة']);
        return `<tr><td style="font-weight:700;">${esc(n)}</td><td>${list.length}</td><td style="color:#1F7A3A;">${cl}</td><td style="color:${dl?'#D32F2F':'inherit'};">${dl}</td><td>${ip}</td><td>${avg} يوم</td><td><div class="rep-bar-track" style="width:70px;display:inline-block;vertical-align:middle;"><span class="rep-bar-fill" style="width:${rate}%;background:${rate>=80?'#1F7A3A':rate>=50?'#D6A437':'#D32F2F'};"></span></div> ${rate}%</td><td><span class="risk-badge ${perf[0]}">${perf[1]}</span></td></tr>`;
      }).join('');
      html = tbl(['المسؤول','المسندة','مغلقة','متأخرة','قيد التنفيذ','متوسط الإغلاق','نسبة الإنجاز','التقييم'], rowsHtml);
    }

    else if (state.tab === 'costs') {
      const byB = {}; rows.forEach(r => { const n = r.branches?.name || '—'; byB[n] = (byB[n]||0) + cost(r); });
      const byT = {}; rows.forEach(r => { if (r.maintenance_type) byT[r.maintenance_type] = (byT[r.maintenance_type]||0) + cost(r); });
      const total = rows.reduce((s,r) => s + cost(r), 0);
      const topCost = [...rows].filter(r => cost(r) > 0).sort((a,b) => cost(b) - cost(a)).slice(0, 10);
      const maxB = Math.max(1, ...Object.values(byB));
      html = `
        <div class="rep-mini-grid"><div class="rep-mini"><div class="rm-lbl">إجمالي تكلفة الصيانة</div><div class="rm-val">${total.toLocaleString()} <span style="font-size:12px;">ر.س</span></div></div></div>
        <div class="mt-detail-grid">
          <div class="panel"><div class="panel-header"><h3 class="panel-title">التكلفة حسب الفرع</h3></div><div class="panel-body">
            ${Object.entries(byB).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]).map(([n,v]) => `<div class="rep-bar-row"><span class="rb-name">${esc(n)}</span><span class="rep-bar-track"><span class="rep-bar-fill" style="width:${repPct(v,maxB)}%;background:#0F3D2E;"></span></span><span class="rb-val">${v.toLocaleString()}</span></div>`).join('') || '<p style="color:var(--text-muted);font-size:12.5px;">لا توجد تكاليف مسجلة</p>'}
          </div></div>
          <div class="panel"><div class="panel-header"><h3 class="panel-title">التكلفة حسب النوع</h3></div><div class="panel-body">
            ${Object.entries(byT).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]).map(([n,v]) => `<div class="rep-bar-row"><span class="rb-name">${label('maint_type', n)}</span><span class="rep-bar-track"><span class="rep-bar-fill" style="width:${repPct(v,Math.max(1,...Object.values(byT)))}%;background:#D6A437;"></span></span><span class="rb-val">${v.toLocaleString()}</span></div>`).join('') || '<p style="color:var(--text-muted);font-size:12.5px;">لا توجد تكاليف</p>'}
          </div></div>
        </div>
        <div class="panel" style="margin-top:14px;"><div class="panel-header"><h3 class="panel-title">أعلى الطلبات تكلفة</h3></div><div class="panel-body">
          ${tbl(['#','الفرع','النوع','التكلفة','الحالة'], topCost.map(r => `<tr style="cursor:pointer;" onclick="location.hash='#maintenance_detail/${r.id}'"><td style="font-weight:700;color:var(--primary);">${esc(r.request_no||r.id)}</td><td>${esc(r.branches?.name||'-')}</td><td>${r.maintenance_type?label('maint_type',r.maintenance_type):'-'}</td><td style="font-weight:700;">${cost(r).toLocaleString()} ر.س</td><td>${maintStatusBadge(r.status)}</td></tr>`).join(''))}
        </div></div>`;
    }

    else if (state.tab === 'quotes') {
      const withQuotes = rows.filter(r => (quotesByReq[r.id] || []).length);
      const rowsHtml = withQuotes.map(r => {
        const qs = quotesByReq[r.id] || [];
        const prices = qs.filter(q => q.price).map(q => Number(q.price));
        const sel = qs.find(q => q.is_selected);
        return `<tr style="cursor:pointer;" onclick="location.hash='#maintenance_detail/${r.id}'"><td style="font-weight:700;color:var(--primary);">${esc(r.request_no||r.id)}</td><td>${esc(r.branches?.name||'-')}</td><td>${r.maintenance_type?label('maint_type',r.maintenance_type):'-'}</td><td>${qs.length}</td><td>${prices.length?Math.min(...prices).toLocaleString():'-'}</td><td>${prices.length?Math.max(...prices).toLocaleString():'-'}</td><td>${sel?esc(sel.supplier_name||'مختار'):'<span style="color:#F2994A;">لم يُختر</span>'}</td><td>${maintStatusBadge(r.status)}</td></tr>`;
      }).join('');
      html = tbl(['#','الفرع','النوع','عدد العروض','أقل سعر','أعلى سعر','المورد المختار','الحالة'], rowsHtml);
    }

    else if (state.tab === 'recurring') {
      const groups = {};
      rows.forEach(r => { const k = (r.branch_id||0) + '|' + (r.maintenance_type||'') + '|' + (r.affected_area||''); (groups[k] = groups[k] || []).push(r); });
      const rec = Object.values(groups).filter(g => g.length > 1).sort((a,b) => b.length - a.length);
      const rowsHtml = rec.map(g => {
        const r0 = g[0]; const tot = g.reduce((s,r) => s + cost(r), 0);
        const last = g.map(r => r.reported_at || r.created_at).sort().reverse()[0];
        const rec2 = g.length >= 3 ? 'استبدال' : (g.length >= 2 ? 'متابعة' : 'إصلاح');
        const rc = g.length >= 3 ? 'risk-high' : 'risk-watch';
        return `<tr><td style="font-weight:700;">${esc(r0.branches?.name||'-')}</td><td>${r0.maintenance_type?label('maint_type',r0.maintenance_type):label('maint_area',r0.affected_area)}</td><td>${r0.branch_location?label('maint_location',r0.branch_location):label('maint_area',r0.affected_area)}</td><td style="font-weight:700;color:#D32F2F;">${g.length}×</td><td style="font-size:11.5px;">${(last||'').slice(0,10)}</td><td>${tot.toLocaleString()} ر.س</td><td><span class="risk-badge ${rc}">${rec2}</span></td></tr>`;
      }).join('');
      html = tbl(['الفرع','نوع العطل','الموقع','عدد التكرار','آخر ظهور','إجمالي التكلفة','التوصية'], rowsHtml);
    }

    else if (state.tab === 'export') {
      html = `
        <div class="panel"><div class="panel-body">
          <p style="font-size:13px;color:#6B756F;margin-bottom:14px;">صدّر التقارير إلى ملف Excel (CSV بترميز عربي) أو اطبعها.</p>
          <div class="rep-export-bar">
            <button class="btn btn-outline" data-exp="all"><span data-lucide="download" style="width:14px;height:14px;"></span> كل طلبات الصيانة</button>
            <button class="btn btn-outline" data-exp="delayed"><span data-lucide="download" style="width:14px;height:14px;"></span> الطلبات المتأخرة</button>
            <button class="btn btn-outline" data-exp="critical"><span data-lucide="download" style="width:14px;height:14px;"></span> الأعطال الحرجة</button>
            <button class="btn btn-outline" data-exp="costs"><span data-lucide="download" style="width:14px;height:14px;"></span> التكاليف</button>
            <button class="btn btn-outline" onclick="window.print()"><span data-lucide="printer" style="width:14px;height:14px;"></span> طباعة الصفحة</button>
          </div>
        </div></div>`;
    }

    el.innerHTML = html;
    if (window.lucide) lucide.createIcons();

    el.querySelectorAll('[data-exp]').forEach(b => b.addEventListener('click', () => {
      const rows2 = getRows();
      const t = b.dataset.exp;
      const H = ['رقم الطلب','الفرع','القسم','نوع الصيانة','عنوان المشكلة','الخطورة','التأثير','الحالة','التكلفة','تاريخ البلاغ','أيام منذ البلاغ'];
      const toRow = r => [r.request_no||r.id, r.branches?.name||'', label('maint_area',r.affected_area), r.maintenance_type?label('maint_type',r.maintenance_type):'', r.issue_title||r.description||'', label('maint_priority',r.severity)||r.severity, label('maint_impact',r.impact_on_operation||'none'), label('maint_status',r.status), cost(r), (r.reported_at||'').slice(0,10), repAgeDays(r.reported_at||r.created_at)];
      let data = rows2;
      if (t === 'delayed') data = rows2.filter(DELAYED);
      if (t === 'critical') data = rows2.filter(CRIT);
      if (t === 'costs') data = rows2.filter(r => cost(r) > 0).sort((a,b)=>cost(b)-cost(a));
      repDownloadCSV('تقرير_الصيانة_' + t, H, data.map(toRow));
    }));
  }

  document.getElementById('repTabs').querySelectorAll('.rep-tab').forEach(b => b.addEventListener('click', () => {
    state.tab = b.dataset.tab;
    document.querySelectorAll('.rep-tab').forEach(x => x.classList.toggle('active', x === b));
    renderTab();
  }));
  ['fPeriod','fBranch','fType','fSeverity','fStatus'].forEach(id => document.getElementById(id).addEventListener('change', e => {
    state[id.replace('f','').toLowerCase()] = e.target.value; renderTab();
  }));
  renderTab();
}

/* ---------- مركز تقارير الجودة ---------- */
async function pageQualityReports(body, query) {
  body.innerHTML = '<p class="empty-state">جاري تحميل التقارير...</p>';
  const [{ data: visits }, { data: vitems }, { data: sections }] = await Promise.all([
    sb.from('quality_visits').select('*, branches(name), users(full_name)').order('created_at', { ascending: false }),
    sb.from('quality_visit_items').select('*'),
    sb.from('quality_sections').select('id, title, sort_order').order('sort_order')
  ]);
  const V = (visits || []).filter(v => v.status === 'completed');
  const allV = visits || [];
  const items = vitems || [];
  const secTitle = {}; (sections || []).forEach(s => secTitle[s.id] = s.title);
  const visitById = {}; allV.forEach(v => visitById[v.id] = v);
  const completedIds = new Set(V.map(v => v.id));
  const compItems = items.filter(it => completedIds.has(it.visit_id));

  const state = { tab: query?.tab || 'overview' };
  const tabs = [['overview','نظرة عامة','layout-dashboard'],['branch','مقارنة الفروع','building-2'],['violations','المخالفات','alert-triangle'],['corrective','الإجراءات التصحيحية','wrench'],['visits','الزيارات','clipboard-check'],['sections','محاور الجودة','list-checks'],['inspectors','المفتشون','users'],['export','التصدير','download']];

  body.innerHTML = `
    <a href="#quality" class="mt-back-link"><span data-lucide="arrow-right" style="width:14px;height:14px;"></span> رجوع للجودة</a>
    <div class="mt-hero-header">
      <div><h2><span class="mt-accent"></span> <span data-lucide="bar-chart-3" style="width:22px;height:22px;color:#0F3D2E;"></span> تقارير الجودة</h2>
        <p>متابعة أداء الجودة والمخالفات والإجراءات التصحيحية ومقارنة الفروع من مكان واحد.</p></div>
      <button class="btn btn-outline" onclick="window.print()" style="align-self:center;font-size:12px;"><span data-lucide="printer" style="width:14px;height:14px;"></span> طباعة</button>
    </div>
    <div class="rep-tabs" id="qrepTabs">${tabs.map(t => `<button class="rep-tab ${t[0]===state.tab?'active':''}" data-tab="${t[0]}"><span data-lucide="${t[2]}" style="width:14px;height:14px;"></span> ${t[1]}</button>`).join('')}</div>
    <div id="qrepContent"></div>
  `;
  if (window.lucide) lucide.createIcons();

  const tbl = (header, bodyRows) => `<div style="overflow-x:auto;"><table class="adv-table"><thead><tr>${header.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${bodyRows || '<tr><td colspan="'+header.length+'" style="text-align:center;padding:24px;color:var(--text-muted);">لا توجد بيانات</td></tr>'}</tbody></table></div>`;

  function renderTab() {
    const el = document.getElementById('qrepContent');
    let html = '';

    if (state.tab === 'overview') {
      const avg = V.length ? Math.round(V.reduce((s,v)=>s+Number(v.compliance_pct||0),0)/V.length) : 0;
      const nonConform = compItems.filter(it => it.status === 'non_conform').length;
      const branchesAudited = new Set(V.map(v => v.branch_id)).size;
      const bScore = {}; V.forEach(v => { const n = v.branches?.name || '—'; (bScore[n] = bScore[n] || []).push(Number(v.compliance_pct||0)); });
      const low = Object.entries(bScore).map(([n,a]) => [n, Math.round(a.reduce((x,y)=>x+y,0)/a.length)]).sort((a,b)=>a[1]-b[1]).slice(0,5);
      html = `
        <div class="rep-mini-grid">
          <div class="rep-mini"><div class="rm-lbl">زيارات مكتملة</div><div class="rm-val">${V.length}</div></div>
          <div class="rep-mini"><div class="rm-lbl">متوسط الالتزام</div><div class="rm-val" style="color:${qScoreColor(avg)};">${avg}%</div></div>
          <div class="rep-mini"><div class="rm-lbl">بنود غير مطابقة</div><div class="rm-val" style="color:#D32F2F;">${nonConform}</div></div>
          <div class="rep-mini"><div class="rm-lbl">فروع تم تدقيقها</div><div class="rm-val">${branchesAudited}</div></div>
        </div>
        <div class="panel"><div class="panel-header"><h3 class="panel-title">أقل الفروع التزامًا</h3></div><div class="panel-body">
          ${low.length ? low.map(([n,p]) => `<div class="rep-bar-row"><span class="rb-name">${esc(n)}</span><span class="rep-bar-track"><span class="rep-bar-fill" style="width:${p}%;background:${qScoreColor(p)};"></span></span><span class="rb-val">${p}%</span></div>`).join('') : '<p style="color:var(--text-muted);font-size:12.5px;">لا توجد بيانات</p>'}
        </div></div>`;
    }

    else if (state.tab === 'branch') {
      const byB = {}; V.forEach(v => { const k = v.branch_id || 0; (byB[k] = byB[k] || { name: v.branches?.name || '—', visits: [] }).visits.push(v); });
      const rowsHtml = Object.values(byB).map(g => {

      html = tbl(['البند','القسم','الفرع','الحالة','الإجراء التصحيحي','ملاحظات','تاريخ الزيارة'], rowsHtml);
    }

    else if (state.tab === 'corrective') {
      const cc = {}; compItems.forEach(it => { if (it.corrective_action) cc[it.corrective_action] = (cc[it.corrective_action]||0)+1; });

      html = `<div class="panel"><div class="panel-header"><h3 class="panel-title">توزيع الإجراءات التصحيحية</h3></div><div class="panel-body">
        ${Object.entries(cc).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `<div class="rep-bar-row"><span class="rb-name" style="min-width:160px;">${k==='custom'?'إجراء مخصص':label('quality_corrective',k)}</span><span class="rep-bar-track"><span class="rep-bar-fill" style="width:${repPct(v,max)}%;background:#2F80C9;"></span></span><span class="rb-val">${v}</span></div>`).join('') || '<p style="color:var(--text-muted);font-size:12.5px;">لا توجد إجراءات مسجلة</p>'}
      </div></div>`;
    }

    else if (state.tab === 'visits') {
      const rowsHtml = allV.map(v => { const pct = Math.round(Number(v.compliance_pct||0)); const href = v.status==='draft'?'#quality_new/'+v.id:'#quality_detail/'+v.id; return `<tr style="cursor:pointer;" onclick="location.hash='${href}'"><td style="font-weight:700;color:var(--primary);">${esc(v.visit_no||v.id)}</td><td>${esc(v.branches?.name||'-')}</td><td>${esc(v.inspector_name||v.users?.full_name||'-')}</td><td>${label('quality_visit_type',v.visit_type)}</td><td style="font-size:11.5px;">${(v.visit_date||'').slice(0,10)}</td><td>${v.status==='completed'?`<span style="font-weight:800;color:${qScoreColor(pct)};">${pct}%</span>`:'-'}</td><td>${v.status==='completed'?'<span class="badge-status badge-done">مكتملة</span>':'<span class="badge-status badge-closed">مسودة</span>'}</td></tr>`; }).join('');
      html = tbl(['#','الفرع','المفتش','النوع','التاريخ','الالتزام','الحالة'], rowsHtml);
    }

    else if (state.tab === 'sections') {
