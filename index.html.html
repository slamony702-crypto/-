  let all = decisions || [];
  if (!['admin', 'company_manager'].includes(CURRENT_USER.role)) {
    all = all.filter(d => {
      const deptId = d.meetings ? d.meetings.department_id : d.department_id;
      const isCompanyWide = !d.meeting_id && !d.department_id;

      const isResponsible = d.responsible_user_id === CURRENT_USER.id;
      const isSpecificViewer = (d.decision_viewers || []).some(v => v.user_id === CURRENT_USER.id);
      return isCompanyWide || isMyDept || isResponsible || isSpecificViewer;

  DecisionsState.all = all;

  DecisionsState.selected.clear();

  renderDecisionsKpi(all);
  renderDecisionsTable(body, canManage);
}

function renderDecisionsKpi(all) {
  const total = all.length;
  const newCount = all.filter(d => d.status === 'new').length;
  const inProgress = all.filter(d => d.status === 'in_progress').length;
  const executed = all.filter(d => d.status === 'executed').length;
  const today = new Date().toISOString().slice(0,10);
  const delayed = all.filter(d => d.status === 'delayed' || (d.due_date && d.due_date < today && d.status !== 'executed' && d.status !== 'cancelled')).length;
  const pendingApproval = all.filter(d => d.status === 'pending_approval').length;

  const mk = (icon, iconClass, value, label, filterValue, extra) => `
    <div class="kpi-card clickable-stat-card" data-target-page="decisions" ${filterValue ? `data-filter-key="status" data-filter-value="${filterValue}"` : ''} data-scroll-target="decisions-table" aria-label="عرض ${label}">
      <div class="kpi-icon ${iconClass}">${icon}</div><div class="kpi-value mono-num">${value}</div><div class="kpi-label">${label}</div>${extra||''}
    </div>`;

  document.getElementById('decisionsKpi').innerHTML =
    mk('<span data-lucide="check-circle-2" style="width:19px;height:19px;"></span>', 'c-green', executed, 'منفذة', 'executed') +
    mk('<span data-lucide="clock" style="width:19px;height:19px;"></span>', 'c-red', delayed, 'متأخرة', 'delayed', delayed>0?'<span class="stat-badge">تحتاج متابعة</span>':'') +
    mk('<span data-lucide="user-check" style="width:19px;height:19px;"></span>', 'c-gold', pendingApproval, 'تنتظر اعتماد', 'pending_approval') +
    mk('<span data-lucide="hourglass" style="width:19px;height:19px;"></span>', 'c-gold', inProgress, 'قيد التنفيذ', 'in_progress') +
    mk('🆕', 'c-blue', newCount, 'قرارات جديدة', 'new') +
    mk('<span data-lucide="pin" style="width:19px;height:19px;"></span>', 'c-blue', total, 'إجمالي القرارات', '');
  wireClickableStatCards();
}

function applyDecisionsFilters() {
  let rows = [...DecisionsState.all];
  if (DecisionsState.search) {
    const q = DecisionsState.search.toLowerCase();
    rows = rows.filter(d =>
      (d.decision_text || '').toLowerCase().includes(q) ||
      (d.meetings?.title || '').toLowerCase().includes(q) ||
      (d.users?.full_name || '').toLowerCase().includes(q)
    );
  }
  if (DecisionsState.statusFilter) rows = rows.filter(d => d.status === DecisionsState.statusFilter);
  if (DecisionsState.responsibleFilter) rows = rows.filter(d => String(d.responsible_user_id) === DecisionsState.responsibleFilter);
  if (DecisionsState.meetingFilter) rows = rows.filter(d => String(d.meeting_id) === DecisionsState.meetingFilter);
  if (DecisionsState.departmentFilter) rows = rows.filter(d => String(d.department_id) === DecisionsState.departmentFilter || (d.meetings && String(d.meetings.department_id) === DecisionsState.departmentFilter));
  if (DecisionsState.priorityFilter) rows = rows.filter(d => (d.priority || 'medium') === DecisionsState.priorityFilter);
  if (DecisionsState.dueBeforeFilter) rows = rows.filter(d => d.due_date && d.due_date <= DecisionsState.dueBeforeFilter);
  rows.sort((a, b) => {
    let va = a[DecisionsState.sortKey], vb = b[DecisionsState.sortKey];
    va = va || ''; vb = vb || '';
    if (va < vb) return DecisionsState.sortDir === 'asc' ? -1 : 1;
    if (va > vb) return DecisionsState.sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  DecisionsState.filtered = rows;
  return rows;
}

window.convertDecisionToTask = async function(decisionId) {
  const d = DecisionsState.all.find(x => x.id === decisionId);
  if (!d) return;
  try {
    const { error } = await sb.from('action_items').insert({
      title: d.decision_text.slice(0, 150),
      meeting_id: d.meeting_id || null,
      decision_id: decisionId,
      assigned_to: d.responsible_user_id,
      department_id: d.department_id || null,
      due_date: d.due_date,
      status: 'not_started',
      priority: 'medium',
      progress_percent: 0
    });
    if (error) throw error;
    await sb.from('decision_activity_log').insert({ decision_id: decisionId, action_text: 'تم تحويل القرار إلى مهمة', created_by: CURRENT_USER.id });
    toast('تم تحويل القرار إلى مهمة بنجاح', 'success');
    renderApp();
  } catch (err) {
    toast(err.message, 'error');
  }
};

async function wireStandaloneDecisionForm() {
  const toggleBtn = document.getElementById('toggleNewDecisionBtn');
  const panel = document.getElementById('newDecisionPanelStandalone');
  if (!toggleBtn || !panel) return;

  let allUsersCache = [];
  let departmentsCache = [];

  async function refreshResponsibleOptions() {
    const visibility = document.getElementById('ndsVisibility').value;
    let targetAudience = [];
    if (visibility === 'all') {
      targetAudience = allUsersCache;
    } else if (visibility === 'department') {
      const deptId = Number(document.getElementById('ndsDept').value);
      targetAudience = allUsersCache.filter(u => u.department_id === deptId);
    } else if (visibility === 'specific') {
      const selectedIds = [...document.getElementById('ndsUsers').selectedOptions].map(o => Number(o.value));
      targetAudience = allUsersCache.filter(u => selectedIds.includes(u.id));
    }
    const responsibleSelect = document.getElementById('ndsResponsible');
    responsibleSelect.innerHTML = targetAudience.length
      ? targetAudience.map(u => `<option value="${u.id}">${esc(u.full_name)}</option>`).join('')
      : `<option value="">يُحدَّد بعد اختيار الجهة الموجَّه إليها القرار</option>`;
    const allCheckbox = document.getElementById('ndsResponsibleAll');
    if (allCheckbox.checked) {
      [...responsibleSelect.options].forEach(opt => opt.selected = true);
      responsibleSelect.disabled = true;
    }
  }

  toggleBtn.addEventListener('click', async () => {
    const wasHidden = panel.classList.contains('hidden');
    panel.classList.toggle('hidden');
    if (wasHidden && !panel.dataset.loaded) {
      panel.dataset.loaded = '1';
      const [{ data: allUsers }, { data: departments }] = await Promise.all([
        sb.from('users').select('id, full_name, department_id').eq('is_active', true).order('full_name'),
        sb.from('departments').select('*').order('name')
      ]);
      allUsersCache = allUsers || [];
      departmentsCache = departments || [];
      document.getElementById('ndsDept').innerHTML = departmentsCache.map(d => `<option value="${d.id}">${esc(d.name)}</option>`).join('');
      document.getElementById('ndsUsers').innerHTML = allUsersCache.map(u => `<option value="${u.id}">${esc(u.full_name)}</option>`).join('');
      // القيمة الافتراضية "جميع الشركة" فارغة اختيار مسبق، نجهّز قائمة المسؤولين مباشرة
      refreshResponsibleOptions();
    }
  });

  document.getElementById('ndsVisibility').addEventListener('change', (e) => {
    document.getElementById('ndsDeptWrap').classList.toggle('hidden', e.target.value !== 'department');
    document.getElementById('ndsUsersWrap').classList.toggle('hidden', e.target.value !== 'specific');
    refreshResponsibleOptions();
  });
  document.getElementById('ndsDept').addEventListener('change', refreshResponsibleOptions);
  document.getElementById('ndsUsers').addEventListener('change', refreshResponsibleOptions);

  document.getElementById('ndsUsersSelectAll').addEventListener('change', (e) => {
    const usersSelect = document.getElementById('ndsUsers');
    [...usersSelect.options].forEach(opt => opt.selected = e.target.checked);
    refreshResponsibleOptions();
  });

  document.getElementById('ndsResponsibleAll').addEventListener('change', (e) => {
    const responsibleSelect = document.getElementById('ndsResponsible');
    if (e.target.checked) {
      [...responsibleSelect.options].forEach(opt => opt.selected = true);
      responsibleSelect.disabled = true;
    } else {
      responsibleSelect.disabled = false;
    }
  });

  document.getElementById('newDecisionFormStandalone').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errBox = document.getElementById('ndsError');
    errBox.classList.remove('show');
    try {
      const visibility = document.getElementById('ndsVisibility').value;
      const deptId = visibility === 'department' ? Number(document.getElementById('ndsDept').value) : null;
      const responsibleSelect = document.getElementById('ndsResponsible');
      const responsibleIds = [...responsibleSelect.options].filter(o => o.selected).map(o => Number(o.value));
      if (!responsibleIds.length) throw new Error('يجب اختيار مسؤول واحد على الأقل عن تنفيذ القرار');

      const { data: newDecision, error } = await sb.from('decisions').insert({
        decision_text: document.getElementById('ndsText').value,
        responsible_user_id: responsibleIds[0],
        priority: document.querySelector('input[name="ndsPriority"]:checked').value,
        due_date: document.getElementById('ndsDueDate').value,
        status: 'new',
        department_id: deptId,
        created_by: CURRENT_USER.id
      }).select().single();
      if (error) throw error;

      for (const uid of responsibleIds.slice(1)) {
        await sb.from('decision_sub_responsibles').insert({ decision_id: newDecision.id, user_id: uid });
      }

      if (visibility === 'specific') {
        const selectedIds = [...document.getElementById('ndsUsers').selectedOptions].map(o => Number(o.value));
        for (const uid of selectedIds) {
          await sb.from('decision_viewers').insert({ decision_id: newDecision.id, user_id: uid });
        }
      }

      await sb.from('decision_activity_log').insert([
        { decision_id: newDecision.id, action_text: 'تم إنشاء القرار', created_by: CURRENT_USER.id },
        { decision_id: newDecision.id, action_text: 'تم إسناد القرار إلى المسؤول', created_by: CURRENT_USER.id }
      ]);

      toast('تم إنشاء القرار بنجاح', 'success');
      renderApp();
    } catch (err) {
      errBox.textContent = err.message; errBox.classList.add('show');
    }
  });
}

function renderPaginationControls(totalPages) {
  const box = document.getElementById('paginationPages');
  if (!box) return;
  let html = '';
  for (let p = 1; p <= totalPages; p++) {
    if (totalPages > 7 && p !== 1 && p !== totalPages && Math.abs(p - DecisionsState.page) > 1) {
      if (p === 2 || p === totalPages - 1) html += `<span style="padding:0 4px;">…</span>`;
      continue;
    }
    html += `<button class="${p === DecisionsState.page ? 'active' : ''}" data-page="${p}">${p}</button>`;
  }
  box.innerHTML = html;
  box.querySelectorAll('button[data-page]').forEach(btn => {
    btn.addEventListener('click', () => {
      DecisionsState.page = Number(btn.dataset.page);
      const body = document.getElementById('pageBody');
      const canManage = can('decisions', 'manage');
      renderDecisionsTable(body, canManage);
    });
  });
}

function wireDecisionsTableEvents(body, canManage) {
  let searchTimer;
  document.getElementById('decSearchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      DecisionsState.search = e.target.value;
      DecisionsState.page = 1;
      renderDecisionsTable(body, canManage);
    }, 250);
  });
  document.getElementById('decStatusFilter').addEventListener('change', (e) => {
    DecisionsState.statusFilter = e.target.value;
    DecisionsState.page = 1;
    renderDecisionsTable(body, canManage);
  });
  document.getElementById('decResponsibleFilter').addEventListener('change', (e) => {
    DecisionsState.responsibleFilter = e.target.value;
    DecisionsState.page = 1;
    renderDecisionsTable(body, canManage);
  });
  document.getElementById('decMeetingFilter').addEventListener('change', (e) => {
    DecisionsState.meetingFilter = e.target.value;
    DecisionsState.page = 1;
    renderDecisionsTable(body, canManage);
  });
  document.getElementById('decDepartmentFilter').addEventListener('change', (e) => {
    DecisionsState.departmentFilter = e.target.value;
    DecisionsState.page = 1;
    renderDecisionsTable(body, canManage);
  });
  document.getElementById('decPriorityFilter').addEventListener('change', (e) => {
    DecisionsState.priorityFilter = e.target.value;
    DecisionsState.page = 1;
    renderDecisionsTable(body, canManage);
  });
  document.getElementById('decDueBeforeFilter').addEventListener('change', (e) => {
    DecisionsState.dueBeforeFilter = e.target.value;
    DecisionsState.page = 1;
    renderDecisionsTable(body, canManage);
  });
  document.getElementById('decPageSize').addEventListener('change', (e) => {
    DecisionsState.pageSize = Number(e.target.value);
    DecisionsState.page = 1;
    renderDecisionsTable(body, canManage);
  });
  document.getElementById('decResetFiltersBtn').addEventListener('click', () => {
    DecisionsState.search = ''; DecisionsState.statusFilter = ''; DecisionsState.responsibleFilter = '';
    DecisionsState.meetingFilter = ''; DecisionsState.departmentFilter = ''; DecisionsState.priorityFilter = '';
    DecisionsState.dueBeforeFilter = ''; DecisionsState.page = 1;
    renderDecisionsTable(body, canManage);
  });
  body.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (DecisionsState.sortKey === key) DecisionsState.sortDir = DecisionsState.sortDir === 'asc' ? 'desc' : 'asc';
      else { DecisionsState.sortKey = key; DecisionsState.sortDir = 'asc'; }
      renderDecisionsTable(body, canManage);
    });
  });

  const selectAll = document.getElementById('selectAllCheckbox');
  if (selectAll) {
    selectAll.addEventListener('change', (e) => {
      body.querySelectorAll('.rowCheckbox').forEach(cb => {
        cb.checked = e.target.checked;
        const id = Number(cb.dataset.id);
        if (e.target.checked) DecisionsState.selected.add(id); else DecisionsState.selected.delete(id);
      });
      updateBulkBar();
    });
  }
  body.querySelectorAll('.rowCheckbox').forEach(cb => {
    cb.addEventListener('change', () => {
      const id = Number(cb.dataset.id);
      if (cb.checked) DecisionsState.selected.add(id); else DecisionsState.selected.delete(id);
      updateBulkBar();
    });
  });
  document.getElementById('bulkClearBtn')?.addEventListener('click', () => {
    DecisionsState.selected.clear();
    renderDecisionsTable(body, canManage);
  });
  document.getElementById('bulkExecuteBtn')?.addEventListener('click', async () => {
    const ids = [...DecisionsState.selected];
    if (!ids.length) return;
    const { error } = await sb.from('decisions').update({ status: 'executed' }).in('id', ids);
    if (error) { toast(error.message, 'error'); return; }
    toast(`تم تحديث ${ids.length} قرار إلى "منفذ"`, 'success');
    DecisionsState.selected.clear();
    pageDecisions(body);
  });
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  const count = DecisionsState.selected.size;
  if (!bar) return;
  bar.classList.toggle('show', count > 0);
  const countEl = document.getElementById('bulkCount');
  if (countEl) countEl.textContent = `${count} محدد`;
}

function currentRoute() {
  const hash = location.hash.replace('#', '') || 'dashboard';
  const [pathPart, queryPart] = hash.split('?');
  const [page, param] = pathPart.split('/');
  const query = {};
  if (queryPart) {
    queryPart.split('&').forEach(pair => {
      const [k, v] = pair.split('=');
      if (k) query[decodeURIComponent(k)] = decodeURIComponent(v || '');
    });
  }
  return { page, param, query };
}

// دالة موحّدة: التنقل من أي كارت إحصائي لصفحة مفلترة + سكرول للجدول
function goToFiltered(page, filters, scrollTarget) {
  const allParams = { ...(filters || {}) };
  if (scrollTarget) allParams.scroll = scrollTarget;
  const qs = Object.entries(allParams).filter(([,v]) => v !== undefined && v !== null && v !== '').map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
  const newHash = '#' + page + (qs ? '?' + qs : '');
  if (location.hash === newHash) { renderApp(); } else { location.hash = newHash; }
}

// ربط أي كارت بصفة clickable-stat-card بمنطق التنقل الموحّد (تُستدعى بعد كل رندر)
function wireClickableStatCards() {
  document.querySelectorAll('.clickable-stat-card').forEach(card => {
    if (card.dataset.wired) return;
    card.dataset.wired = '1';
    card.style.cursor = 'pointer';
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    const go = () => {
      const targetPage = card.dataset.targetPage;
      const filterKey = card.dataset.filterKey;
      const filterValue = card.dataset.filterValue;
      const scrollTarget = card.dataset.scrollTarget;
      const filters = filterKey ? { [filterKey]: filterValue } : {};
      goToFiltered(targetPage, filters, scrollTarget);
    };
    card.addEventListener('click', go);
    card.addEventListener('keydown', (e) => { if (e.key === 'Enter') go(); });
  });
}

function scrollToTableTarget(id) {
  if (!id) return;
  setTimeout(() => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });

function isUserOnline(lastActiveAt) {
  if (!lastActiveAt) return false;
  return (Date.now() - new Date(lastActiveAt).getTime()) < 5 * 60 * 1000; // آخر 5 دقايق
}

async function checkTaskReminders() {
  if (!CURRENT_USER) return;
  const alreadyChecked = sessionStorage.getItem('reminders_checked_' + new Date().toDateString());
  if (alreadyChecked) return;
  sessionStorage.setItem('reminders_checked_' + new Date().toDateString(), '1');

  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tomorrowStr = tomorrow.toISOString().slice(0, 10);

  const [{ data: dueTasks }, { data: dueDeptTasks }] = await Promise.all([
    sb.from('action_items').select('id, title').eq('assigned_to', CURRENT_USER.id).eq('due_date', tomorrowStr).neq('status', 'completed'),
    sb.from('department_tasks').select('id, title, due_datetime').eq('assigned_to', CURRENT_USER.id).neq('status', 'completed')
  ]);

  const dueDeptTasksTomorrow = (dueDeptTasks || []).filter(t => t.due_datetime && t.due_datetime.slice(0, 10) === tomorrowStr);
  const allDue = [...(dueTasks || []).map(t => ({ ...t, type: 'tasks' })), ...dueDeptTasksTomorrow.map(t => ({ ...t, type: 'department_tasks' }))];
  if (!allDue.length) return;

  for (const t of allDue) {
    const { data: existing } = await sb.from('notifications')
      .select('id').eq('user_id', CURRENT_USER.id).eq('link', '#' + t.type)
      .ilike('title', '%تذكير%' + t.title.slice(0, 20) + '%').limit(1);
    if (existing && existing.length) continue;
    await sb.from('notifications').insert({
      user_id: CURRENT_USER.id,
      title: '⏰ تذكير: موعد نهائي غدًا',
      body: `مهمة "${t.title}" موعدها النهائي غدًا`,
      link: '#' + t.type
    });
  }
}

// تذكير قبل الاجتماع بـ24 ساعة أو أقل — يُفحص عند تحميل التطبيق (مرة واحدة يوميًا)
async function checkMeetingReminders() {
  if (!CURRENT_USER) return;
  const checkedKey = 'meeting_reminders_checked_' + new Date().toDateString();
  if (sessionStorage.getItem(checkedKey)) return;
  sessionStorage.setItem(checkedKey, '1');

  const now = new Date();
  const in24h = new Date(now.getTime() + 24 * 60 * 60 * 1000);

  // اجتماعات المستخدم اللي هيحضرها أو نظّمها
  const { data: myAttendance } = await sb.from('meeting_attendees')
    .select('meeting_id, meetings(id, title, meeting_datetime, status, location_type, location_detail)')
    .eq('user_id', CURRENT_USER.id).eq('attendance_status', 'invited');

  const upcoming = (myAttendance || [])
    .map(a => a.meetings)
    .filter(m => m && m.status === 'scheduled')
    .filter(m => {
      const dt = new Date(m.meeting_datetime);
      return dt > now && dt <= in24h;
    });

  if (!upcoming.length) return;

  for (const m of upcoming) {
    // منع التكرار: لو في إشعار بنفس العنوان لنفس الاجتماع لليوم دلوقتي، تخطاه
    const { data: existing } = await sb.from('notifications')
      .select('id')
      .eq('user_id', CURRENT_USER.id)
      .eq('link', '#meeting_detail/' + m.id)
      .ilike('title', '%تذكير%')
      .gte('created_at', new Date(Date.now() - 20 * 60 * 60 * 1000).toISOString())
      .limit(1);
    if (existing && existing.length) continue;

    const dt = new Date(m.meeting_datetime);
    const hoursTo = Math.round((dt.getTime() - now.getTime()) / (60 * 60 * 1000));
    const timeStr = dt.toISOString().slice(11, 16);
    const dateStr = fmtDateAr(m.meeting_datetime);
    const locPart = m.location_type === 'online' && m.location_detail ? ` — الرابط: ${m.location_detail}` : (m.location_detail ? ` — المكان: ${m.location_detail}` : '');
    await sb.from('notifications').insert({
      user_id: CURRENT_USER.id,
      title: `⏰ تذكير: اجتماع خلال ${hoursTo} ساعة`,
      body: `"${m.title}" — ${dateStr} الساعة ${timeStr}${locPart}`,
      link: '#meeting_detail/' + m.id
    });
  }
}

let __routeToken = 0;
function isStaleRoute(tk) { return tk !== __routeToken; }

async function route() {
  const { page, param, query } = currentRoute();
  const myTk = ++__routeToken;
  document.title = 'شؤون الغذاء - ' + (PAGE_TITLES[page] || '');
  const body = document.getElementById('pageBody');
  body.dataset.routeTk = String(myTk);
  try {
    if (isStaleRoute(myTk)) return;
    if (page === 'dashboard') await pageDashboard(body);
    else if (page === 'vision') await pageVision(body, param);
    else if (page === 'meetings') await pageMeetings(body, query);
    else if (page === 'meeting_detail') await pageMeetingDetail(body, param);
    else if (page === 'tasks') await pageTasks(body, query);
    else if (page === 'department_tasks') await pageDepartmentTasks(body, query);
    else if (page === 'decisions') await pageDecisions(body, query);
    else if (page === 'conversations') await pageConversations(body, query);
    else if (page === 'emergency') await pageEmergency(body);
    else if (page === 'maintenance') await pageMaintenance(body, query);
    else if (page === 'maintenance_new') await pageMaintenanceNew(body, param);
    else if (page === 'maintenance_detail') await pageMaintenanceDetail(body, param);
    else if (page === 'maintenance_suppliers') await pageMaintenanceSuppliers(body);
    else if (page === 'quality') await pageQuality(body, query);
    else if (page === 'quality_new') await pageQualityVisitNew(body, param);
    else if (page === 'quality_detail') await pageQualityVisitDetail(body, param);
    else if (page === 'quality_reports') await pageQualityReports(body, query);
    else if (page === 'maintenance_reports') await pageMaintenanceReports(body, query);
    else if (page === 'notifications') await pageNotifications(body, query);
    else if (page === 'search') await pageGlobalSearch(body, query);
    else if (page === 'maintenance_equipment') await pageMaintenanceEquipment(body);
    else if (page === 'maintenance_preventive') await pageMaintenancePreventive(body, query);
    else if (page === 'install_app') await pageInstallApp(body);
    else if (page === 'reports') await pageReports(body);
    else if (page === 'users') await pageUsers(body);
    else if (page === 'settings') await pageSettings(body);
    else if (page === 'my_profile') await pageMyProfile(body);
    else if (page === 'meeting_requests') await pageMeetingRequests(body);
    else body.innerHTML = '<p class="empty-state">الصفحة غير موجودة</p>';
  } catch (err) {
    body.innerHTML = `<p class="error-msg show">${esc(err.message || 'حدث خطأ')}</p>`;
  }
  if (window.lucide) lucide.createIcons();
  wireSearchIcons();
  initPremiumDateFields();
  wireClickableStatCards();
  scrollToTableTarget(query && query.scroll);
}

// ============ Helper: نطاق الصلاحيات ============
function deptScope(query, field = 'department_id') {
  if (CURRENT_USER.role === 'admin') return query;
  return query.eq(field, CURRENT_USER.department_id);
}

let __directorySelectedDept = 'all';

async function pageConversations(body, query) {

  const { data: departments } = await sb.from('departments').select('*').order('name');

  const { data: myConvsRaw } = await sb.from('conversation_members').select('conversation_id').eq('user_id', CURRENT_USER.id);
  const myConvIds = (myConvsRaw||[]).map(c=>c.conversation_id);
  const { data: myConversations } = myConvIds.length ? await sb.from('conversations').select('*').in('id', myConvIds).order('id', { ascending: false }) : { data: [] };

  const now = new Date();

  const inMeetingUserIds = new Set((liveAttendance||[]).filter(a => {
    if (!a.meetings) return false;
    const start = new Date(a.meetings.meeting_datetime);
    const end = new Date(start.getTime() + 60*60*1000);
    return now >= start && now <= end;

    // البحث اليدوي عن محادثة فردية بين الطرفين
    const { data: myConvs } = await sb.from('conversation_members').select('conversation_id').eq('user_id', CURRENT_USER.id);
    const myConvIds = (myConvs||[]).map(c=>c.conversation_id);
    let conversationId = null;
    if (myConvIds.length) {
      const { data: theirConvs } = await sb.from('conversation_members').select('conversation_id').eq('user_id', userId).in('conversation_id', myConvIds);
      if (theirConvs && theirConvs.length) {
        for (const tc of theirConvs) {
          const { data: convCheck } = await sb.from('conversations').select('id').eq('id', tc.conversation_id).eq('conversation_type', 'direct').maybeSingle();
          if (convCheck) { conversationId = convCheck.id; break; }
        }
      }
    }
    if (!conversationId) {
      const { data: newConv } = await sb.from('conversations').insert({ conversation_type: 'direct' }).select().single();
      conversationId = newConv.id;
      await sb.from('conversation_members').insert({ conversation_id: conversationId, user_id: CURRENT_USER.id });
      await sb.from('conversation_members').insert({ conversation_id: conversationId, user_id: userId });
    }
    __activeConversationId = conversationId;
    await loadChatMessages(conversationId);
    wireChatInputBar((text, msgType, replyToId, attachment, textColor, textAlign) => sendChatMessage(conversationId, text, msgType, replyToId, attachment, textColor, textAlign), conversationId);
  };

  // فتح محادثة محددة مباشرة (من قائمة الرسائل المنسدلة)
  window.openConversationThread = async function(convId) {
    const panel = document.getElementById('taskChatPanel');
    if (!panel) return;
    const { data: conv } = await sb.from('conversations').select('*').eq('id', convId).maybeSingle();
    let title = 'المحادثة';
    if (conv) {
      if (conv.conversation_type === 'direct') {
        const { data: mems } = await sb.from('conversation_members').select('user_id, users(full_name)').eq('conversation_id', convId).neq('user_id', CURRENT_USER.id);
        title = 'محادثة مع: ' + ((mems && mems[0] && mems[0].users) ? mems[0].users.full_name : '');
      } else if (conv.title) { title = conv.title; }
      else if (conv.department_id) { const d = (departments || []).find(x => x.id === conv.department_id); title = 'محادثة قسم: ' + (d ? d.name : ''); }
    }
    panel.classList.remove('hidden');
    document.getElementById('taskChatTitle').innerHTML = '<span data-lucide="message-circle" style="width:14px;height:14px;vertical-align:-2px;"></span> ' + esc(title);
    if (window.lucide) lucide.createIcons();
    panel.scrollIntoView({ behavior: 'smooth' });
    __activeConversationId = convId;
    await sb.from('conversation_members').upsert({ conversation_id: convId, user_id: CURRENT_USER.id }, { onConflict: 'conversation_id,user_id' });
    await loadChatMessages(convId);
    wireChatInputBar((text, msgType, replyToId, attachment, textColor, textAlign) => sendChatMessage(convId, text, msgType, replyToId, attachment, textColor, textAlign), convId);
  };

  if (query && query.open) {
    const cid = Number(query.open);
    if (cid) setTimeout(() => window.openConversationThread(cid), 150);
  }
}

      <div class="kpi-card clickable-stat-card" data-report-tab="tasks" aria-label="متوسط وقت الإنجاز"><div class="kpi-icon c-gold"><span data-lucide="clock" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${avgCompletionDays}</div><div class="kpi-label">متوسط وقت الإنجاز (يوم)</div></div>
      <div class="kpi-card clickable-stat-card" data-report-tab="emergency" aria-label="التنبيهات الطارئة المفتوحة"><div class="kpi-icon c-red"><span data-lucide="siren" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${openEmergencies}</div><div class="kpi-label">تنبيهات طارئة مفتوحة</div></div>
      <div class="kpi-card clickable-stat-card" data-report-tab="employees" aria-label="الموظفون النشطون"><div class="kpi-icon c-green"><span data-lucide="users" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${activeEmployees}</div><div class="kpi-label">الموظفون النشطون</div></div>
    </div>

    <div class="task-quick-tabs" id="reportsTabs">
      <button type="button" class="tqt-btn active" data-tab="overview"><span data-lucide="layout-dashboard" style="width:14px;height:14px;"></span> نظرة عامة</button>
      <button type="button" class="tqt-btn" data-tab="tasks"><span data-lucide="clipboard-list" style="width:14px;height:14px;"></span> المهام</button>
      <button type="button" class="tqt-btn" data-tab="meetings"><span data-lucide="calendar" style="width:14px;height:14px;"></span> الاجتماعات</button>
      <button type="button" class="tqt-btn" data-tab="decisions"><span data-lucide="gavel" style="width:14px;height:14px;"></span> القرارات</button>
      <button type="button" class="tqt-btn" data-tab="employees"><span data-lucide="users" style="width:14px;height:14px;"></span> الموظفون</button>
      <button type="button" class="tqt-btn" data-tab="departments"><span data-lucide="building-2" style="width:14px;height:14px;"></span> الأقسام</button>
      <button type="button" class="tqt-btn" data-tab="internal_comm"><span data-lucide="message-square" style="width:14px;height:14px;"></span> التواصل الداخلي</button>
      <button type="button" class="tqt-btn" data-tab="emergency"><span data-lucide="siren" style="width:14px;height:14px;"></span> التواصل الطارئ</button>
      <button type="button" class="tqt-btn" data-tab="custom"><span data-lucide="sliders-horizontal" style="width:14px;height:14px;"></span> تقارير مخصصة</button>
    </div>

    <div id="reportsTabContent">
      <div class="panel"><div class="panel-body"><p class="empty-state">جاري تجهيز محتوى التبويبات — هتكتمل في المرحلة القادمة. أساس البيانات والفلاتر جاهز بالكامل الآن.</p></div></div>
    </div>
  `;

  document.querySelectorAll('#reportsTabs .tqt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#reportsTabs .tqt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      ReportsState.activeTab = btn.dataset.tab;
      renderReportsTabContent();
    });
  });
  document.querySelectorAll('[data-report-tab]').forEach(card => {
    card.addEventListener('click', () => {
      const tab = card.dataset.reportTab;
      document.querySelectorAll('#reportsTabs .tqt-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      ReportsState.activeTab = tab;
      renderReportsTabContent();
      document.getElementById('reportsTabContent').scrollIntoView({ behavior: 'smooth' });
    });
  });

  document.getElementById('repPeriod').addEventListener('change', (e) => {
    document.getElementById('repFromWrap').classList.toggle('hidden', e.target.value !== 'custom');
    document.getElementById('repToWrap').classList.toggle('hidden', e.target.value !== 'custom');
  });
  document.getElementById('repApplyBtn').addEventListener('click', () => {
    ReportsState.period = document.getElementById('repPeriod').value;
    ReportsState.dateFrom = document.getElementById('repDateFrom').value;
    ReportsState.dateTo = document.getElementById('repDateTo').value;
    ReportsState.dept = document.getElementById('repDept').value;
    ReportsState.employee = document.getElementById('repEmployee').value;
    ReportsState.status = document.getElementById('repStatus').value;
    renderReportsTabContent();
    toast('تم تطبيق الفلتر', 'success');
  });
  document.getElementById('repResetBtn').addEventListener('click', () => {
    Object.assign(ReportsState, { period: 'this_month', dateFrom: '', dateTo: '', dept: '', employee: '', status: '' });
    renderApp();
  });

  document.getElementById('repExportExcelBtn').addEventListener('click', () => {
    const rows = (tasks||[]).map(t => ({ العنوان: t.title, الحالة: label('task_status', t.status), الأولوية: label('priority', t.priority), 'موعد التسليم': t.due_date || '', 'نسبة الإنجاز': (t.progress_percent||0) + '%', القسم: t.departments ? t.departments.name : '' }));
    exportToCsv(rows, 'تقرير_شامل');
  });
  document.getElementById('repExportPdfBtn').addEventListener('click', () => {
    toast('تصدير PDF: استخدم زر الطباعة واختر "حفظ كـ PDF" من نافذة الطباعة', 'success');
    window.print();
  });
  document.getElementById('repPrintBtn').addEventListener('click', () => window.print());

  renderReportsTabContent();
}

function renderReportsTabContent() {
  const host = document.getElementById('reportsTabContent');
  if (!host) return;
  const d = window.__reportsData;
  if (!d) return;
  const tasks = d.tasks, meetings = d.meetings, decisions = d.decisions;
  const today = new Date().toISOString().slice(0,10);

  function groupCount(list, mapper) {
    const map = {};
    (list||[]).forEach(item => { const k = mapper(item); map[k] = (map[k]||0)+1; });
    return map;
  }
  function barList(map, labelFn, colorFn) {
    const entries = Object.entries(map);
    const max = Math.max(1, ...entries.map(([,v])=>v));
    if (!entries.length) return '<p class="empty-state">لا توجد بيانات</p>';
    return entries.map(([k,v]) => `
      <div style="margin-bottom:10px;">
        <div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:4px;"><span>${labelFn?labelFn(k):k}</span><strong class="mono-num">${v}</strong></div>
        <div class="task-progress-bar" style="width:100%;"><div class="fill" style="width:${v/max*100}%; background:${colorFn?colorFn(k):'#0F3D2E'};"></div></div>
      </div>`).join('');
  }

  if (ReportsState.activeTab === 'overview') {
    const byStatus = groupCount(tasks, t=>t.status||'not_started');
    const byMType = groupCount(meetings, m=>m.meeting_type||'other');
    const byDStatus = groupCount(decisions, dd=>dd.status||'new');
    const perfByUser = {};
    tasks.forEach(t => { if(!t.assigned_to) return; perfByUser[t.assigned_to] = perfByUser[t.assigned_to] || {total:0, done:0, name: t.users?.full_name || '-'}; perfByUser[t.assigned_to].total++; if(t.status==='completed') perfByUser[t.assigned_to].done++; });
    const topEmployees = Object.values(perfByUser).map(p=>({...p, pct: p.total?Math.round(p.done/p.total*100):0})).sort((a,b)=>b.pct-a.pct).slice(0,5);
    const topDelayed = tasks.filter(t => t.due_date && t.due_date < today && t.status!=='completed').sort((a,b)=>a.due_date.localeCompare(b.due_date)).slice(0,5);
    const decisionsNeedFollowup = decisions.filter(dd => !['executed','cancelled'].includes(dd.status)).slice(0,5);
    const deptPressure = {};
    tasks.forEach(t => { const dn = t.departments?.name || 'غير محدد'; deptPressure[dn] = deptPressure[dn]||0; if(t.status!=='completed') deptPressure[dn]++; });
    const topDept = Object.entries(deptPressure).sort((a,b)=>b[1]-a[1])[0];

    host.innerHTML = `
      <div class="mform-layout">
        <div>
          <div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>المهام حسب الحالة</div>${barList(byStatus, k=>label('task_status',k))}</div>
          <div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>الاجتماعات حسب النوع</div>${barList(byMType, k=>label('meeting_type',k))}</div>
          <div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>القرارات حسب الحالة</div>${barList(byDStatus, k=>label('decision_status',k)||k)}</div>
        </div>
        <div>
          <div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span><span data-lucide="award" style="width:14px;height:14px;"></span>أفضل 5 موظفين إنجازًا</div>
            ${topEmployees.length ? topEmployees.map((p,i)=>`<div class="followup-row"><div class="avatar-gradient avatar-g${i%8}" style="width:28px;height:28px;font-size:11px;">${esc((p.name||'-').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join(''))}</div><div class="followup-row-info">${esc(p.name)}</div><strong class="mono-num" style="color:var(--success);">${p.pct}%</strong></div>`).join('') : '<p class="empty-state">لا توجد بيانات</p>'}
          </div>
          <div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span><span data-lucide="alert-triangle" style="width:14px;height:14px;color:var(--danger);"></span>أكثر 5 مهام تأخرًا</div>
            ${topDelayed.length ? topDelayed.map(t=>`<div class="followup-row"><div class="followup-row-info">${esc(t.title)}<div style="font-size:11px;color:var(--text-muted);">${t.due_date}</div></div>${badgeHtml('delayed','task_status')}</div>`).join('') : '<p class="empty-state">لا توجد مهام متأخرة 🎉</p>'}
          </div>
          <div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span><span data-lucide="gavel" style="width:14px;height:14px;"></span>قرارات تحتاج متابعة</div>
            ${decisionsNeedFollowup.length ? decisionsNeedFollowup.map(dd=>`<div class="followup-row"><div class="followup-row-info">${esc(dd.decision_text.slice(0,50))}</div>${decisionPill(dd.status)}</div>`).join('') : '<p class="empty-state">لا توجد قرارات مفتوحة</p>'}
          </div>
          ${topDept ? `<div class="emergency-warning-box" style="background:rgba(214,164,55,0.1); color:#9A6B12; border-color:rgba(214,164,55,0.3);"><span data-lucide="building-2" style="width:14px;height:14px;"></span> قسم "${esc(topDept[0])}" عليه أكبر ضغط مهام غير مكتملة (${topDept[1]})</div>` : ''}
        </div>
      </div>`;

  } else if (ReportsState.activeTab === 'tasks') {
    const byStatus = groupCount(tasks, t=>t.status||'not_started');
    const byPriority = groupCount(tasks, t=>t.priority||'medium');
    const byDept = groupCount(tasks, t=>t.departments?.name||'غير محدد');
    const delayed = tasks.filter(t => t.due_date && t.due_date < today && t.status!=='completed');
    const dueToday = tasks.filter(t => t.due_date === today);
    const closedWithDates = tasks.filter(t=>t.status==='completed'&&t.created_at&&t.updated_at);
    const avgDays = closedWithDates.length ? Math.round(closedWithDates.reduce((s,t)=>s+(new Date(t.updated_at)-new Date(t.created_at))/86400000,0)/closedWithDates.length) : 0;
    const empDelay = {}; tasks.forEach(t=>{ if(t.due_date && t.due_date<today && t.status!=='completed' && t.users) empDelay[t.users.full_name]=(empDelay[t.users.full_name]||0)+1; });
    const topDelayedEmp = Object.entries(empDelay).sort((a,b)=>b[1]-a[1])[0];

    host.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-icon c-red"><span data-lucide="alert-triangle" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${delayed.length}</div><div class="kpi-label">مهام متأخرة</div></div>
        <div class="kpi-card"><div class="kpi-icon c-gold"><span data-lucide="calendar-clock" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${dueToday.length}</div><div class="kpi-label">تنتهي اليوم</div></div>
        <div class="kpi-card"><div class="kpi-icon c-blue"><span data-lucide="clock" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${avgDays}</div><div class="kpi-label">متوسط الإنجاز (يوم)</div></div>
        <div class="kpi-card"><div class="kpi-icon c-red"><span data-lucide="user-x" style="width:19px;height:19px;"></span></div><div class="kpi-value" style="font-size:14px;">${topDelayedEmp?esc(topDelayedEmp[0]):'-'}</div><div class="kpi-label">أكثر موظف تأخرًا</div></div>
      </div>
      <div class="mform-layout">
        <div>
          <div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>حسب الحالة</div>${barList(byStatus,k=>label('task_status',k))}</div>
          <div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>حسب الأولوية</div>${barList(byPriority,k=>label('priority',k))}</div>
        </div>
        <div><div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>حسب القسم</div>${barList(byDept)}</div></div>
      </div>
      <div class="panel"><div class="panel-header"><h3>جدول المهام المتأخرة</h3></div><div class="panel-body" style="overflow-x:auto;">
        ${delayed.length ? `<table><thead><tr><th>المهمة</th><th>المسؤول</th><th>القسم</th><th>الحالة</th><th>الأولوية</th><th>الموعد</th><th>أيام التأخير</th></tr></thead><tbody>
          ${delayed.map(t=>`<tr><td>${esc(t.title)}</td><td>${t.users?esc(t.users.full_name):'-'}</td><td>${t.departments?esc(t.departments.name):'-'}</td><td>${badgeHtml('delayed','task_status')}</td><td>${badgeHtml(t.priority,'priority')}</td><td class="mono-num">${t.due_date}</td><td class="mono-num" style="color:var(--danger);">${Math.floor((new Date(today)-new Date(t.due_date))/86400000)}</td></tr>`).join('')}
        </tbody></table>` : '<p class="empty-state">لا توجد مهام متأخرة 🎉</p>'}
      </div></div>`;

  } else if (ReportsState.activeTab === 'meetings') {
    const byStatus = groupCount(meetings, m=>m.status||'scheduled');
    const byType = groupCount(meetings, m=>m.meeting_type||'other');
    const byDept = groupCount(meetings, m=>m.departments?.name||'غير محدد');
    const postponed = meetings.filter(m=>m.status==='postponed');

    host.innerHTML = `
      <div class="mform-layout">
        <div>
          <div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>حسب الحالة</div>${barList(byStatus,k=>label('meeting_status',k))}</div>
          <div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>حسب النوع</div>${barList(byType,k=>label('meeting_type',k))}</div>
        </div>
        <div><div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>حسب القسم</div>${barList(byDept)}</div></div>
      </div>
      <div class="panel"><div class="panel-header"><h3>جدول الاجتماعات</h3></div><div class="panel-body" style="overflow-x:auto;">
        <table><thead><tr><th>الاجتماع</th><th>النوع</th><th>القسم</th><th>التاريخ</th><th>الحالة</th></tr></thead><tbody>
          ${meetings.slice(0,30).map(m=>`<tr><td>${esc(m.title)}</td><td>${label('meeting_type',m.meeting_type)}</td><td>${m.departments?esc(m.departments.name):'-'}</td><td class="mono-num">${fmtDate(m.meeting_datetime)}</td><td>${badgeHtml(m.status,'meeting_status')}</td></tr>`).join('')}
        </tbody></table>
      </div></div>
      ${postponed.length ? `<div class="emergency-warning-box" style="background:rgba(107,117,111,0.1); color:#6B756F; border-color:rgba(107,117,111,0.3);"><span data-lucide="clock" style="width:14px;height:14px;"></span> ${postponed.length} اجتماع مؤجل يحتاج إعادة جدولة</div>` : ''}`;

  } else if (ReportsState.activeTab === 'decisions') {
    const byStatus = groupCount(decisions, dd=>dd.status||'new');
    const overdue = decisions.filter(dd => dd.due_date && dd.due_date < today && !['executed','cancelled'].includes(dd.status));
    const executed = decisions.filter(dd => dd.status === 'executed');
    const noTask = decisions.filter(dd => !dd.linked_task || !dd.linked_task.length);
    const byResp = {}; decisions.forEach(dd => { const n = dd.users?.full_name || 'غير محدد'; byResp[n] = (byResp[n]||0)+1; });
    const closedWithDates = decisions.filter(dd=>dd.status==='executed'&&dd.created_at&&dd.due_date);
    const avgExecDays = closedWithDates.length ? Math.round(closedWithDates.reduce((s,dd)=>s+(new Date(dd.due_date)-new Date(dd.created_at))/86400000,0)/closedWithDates.length) : 0;

    host.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-icon c-blue"><span data-lucide="gavel" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${decisions.length}</div><div class="kpi-label">إجمالي القرارات</div></div>
        <div class="kpi-card"><div class="kpi-icon c-green"><span data-lucide="check-circle-2" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${executed.length}</div><div class="kpi-label">منفذة</div></div>
        <div class="kpi-card"><div class="kpi-icon c-red"><span data-lucide="clock" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${overdue.length}</div><div class="kpi-label">متأخرة</div></div>
        <div class="kpi-card"><div class="kpi-icon c-gold"><span data-lucide="link-2-off" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${noTask.length}</div><div class="kpi-label">بدون مهمة مرتبطة</div></div>
      </div>
      <div class="mform-layout">
        <div><div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>حسب الحالة</div>${barList(byStatus, k=>DECISION_STATUS_META[k]?.label||k)}</div></div>
        <div><div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>حسب المسؤول</div>${barList(byResp)}</div>
        <div class="meeting-form-card" style="text-align:center;"><div class="meeting-section-title"><span class="mst-accent"></span>متوسط مدة التنفيذ</div><div style="font-size:28px; font-weight:800; color:#0F3D2E;">${avgExecDays} <span style="font-size:13px; font-weight:600; color:var(--text-muted);">يوم</span></div></div></div>
      </div>
      <div class="panel"><div class="panel-header"><h3>جدول متابعة القرارات</h3></div><div class="panel-body" style="overflow-x:auto;">
        <table><thead><tr><th>القرار</th><th>الاجتماع</th><th>المسؤول</th><th>تاريخ التنفيذ</th><th>الحالة</th><th>مهمة مرتبطة</th></tr></thead><tbody>
          ${decisions.slice(0,30).map(dd=>`<tr><td>${esc((dd.decision_text||'').slice(0,50))}</td><td>${dd.meetings?esc(dd.meetings.title):'-'}</td><td>${dd.users?esc(dd.users.full_name):'-'}</td><td class="mono-num">${dd.due_date||'-'}</td><td>${decisionPill(dd.status)}</td><td>${dd.linked_task&&dd.linked_task.length?'<span class="status-pill st-done"><span class="dot"></span>موجودة</span>':'<span class="status-pill st-cancelled"><span class="dot"></span>غير موجودة</span>'}</td></tr>`).join('')}
        </tbody></table>
      </div></div>`;

  } else if (ReportsState.activeTab === 'employees') {
    const perfByUser = {};
    (d.allUsers||[]).forEach(u => { perfByUser[u.id] = { name: u.full_name, dept: (d.departments||[]).find(dp=>dp.id===u.department_id)?.name||'-', total:0, done:0, delayed:0, inprog:0, lastActivity: null }; });
    tasks.forEach(t => {
      if (!t.assigned_to || !perfByUser[t.assigned_to]) return;
      const p = perfByUser[t.assigned_to];
      p.total++;
      if (t.status==='completed') p.done++;
      else if (t.due_date && t.due_date<today) p.delayed++;
      else if (t.status==='in_progress') p.inprog++;
      if (t.updated_at && (!p.lastActivity || t.updated_at > p.lastActivity)) p.lastActivity = t.updated_at;
    });
    const rows = Object.values(perfByUser).filter(p=>p.total>0).map(p => ({ ...p, pct: p.total?Math.round(p.done/p.total*100):0 })).sort((a,b)=>b.pct-a.pct);
    function ratingBadge(pct) {
      if (pct>=80) return '<span class="status-pill st-done"><span class="dot"></span>ممتاز</span>';
      if (pct>=50) return '<span class="status-pill st-progress"><span class="dot"></span>جيد</span>';
      return '<span class="status-pill st-delayed"><span class="dot"></span>يحتاج متابعة</span>';
    }
    host.innerHTML = `
      <div class="panel"><div class="panel-header"><h3>أداء الموظفين</h3></div><div class="panel-body" style="overflow-x:auto;">
        ${rows.length ? `<table><thead><tr><th>الموظف</th><th>القسم</th><th>إجمالي</th><th>مكتملة</th><th>متأخرة</th><th>قيد التنفيذ</th><th>نسبة الإنجاز</th><th>آخر نشاط</th><th>التقييم</th></tr></thead><tbody>

        </tbody></table>` : '<p class="empty-state">لا توجد بيانات</p>'}

  } else if (ReportsState.activeTab === 'internal_comm') {
    host.innerHTML = `<div class="panel"><div class="panel-body"><p class="empty-state">جاري تحميل بيانات التواصل...</p></div></div>`;
    (async () => {
      const { data: convs } = await sb.from('conversations').select('id, conversation_type, task_id');
      const { data: msgs } = await sb.from('messages').select('id, conversation_id, message_type, sender_id, users(department_id)');
      const { data: reads } = await sb.from('message_reads').select('message_id');
      const readIds = new Set((reads||[]).map(r=>r.message_id));
      const byType = groupCount(convs, c=>c.conversation_type||'direct');
      const urgentCount = (msgs||[]).filter(m=>m.message_type==='urgent').length;
      const unreadCount = (msgs||[]).filter(m=>!readIds.has(m.id)).length;
      const deptActivity = {};
      (msgs||[]).forEach(m => { const dn = (d.departments||[]).find(dp=>dp.id===m.users?.department_id)?.name; if(dn) deptActivity[dn]=(deptActivity[dn]||0)+1; });
      const topDept = Object.entries(deptActivity).sort((a,b)=>b[1]-a[1])[0];
      const delayedTaskIds = new Set(tasks.filter(t=>t.due_date&&t.due_date<today&&t.status!=='completed').map(t=>t.id));
      const convsLinkedToDelayed = (convs||[]).filter(c=>c.task_id && delayedTaskIds.has(c.task_id)).length;

      host.innerHTML = `
        <div class="kpi-grid">
          <div class="kpi-card"><div class="kpi-icon c-blue"><span data-lucide="message-square" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${(convs||[]).length}</div><div class="kpi-label">إجمالي المحادثات</div></div>
          <div class="kpi-card"><div class="kpi-icon c-gold"><span data-lucide="mail" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${unreadCount}</div><div class="kpi-label">رسائل غير مقروءة</div></div>
          <div class="kpi-card"><div class="kpi-icon c-red"><span data-lucide="alert-triangle" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${urgentCount}</div><div class="kpi-label">رسائل عاجلة</div></div>
          <div class="kpi-card"><div class="kpi-icon c-red"><span data-lucide="link" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${convsLinkedToDelayed}</div><div class="kpi-label">محادثات مرتبطة بمهام متأخرة</div></div>
        </div>
        <div class="mform-layout">
          <div><div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>المحادثات حسب النوع</div>${barList(byType, k=>({direct:'فردية',department:'قسم',meeting:'اجتماع',task:'مهمة',task_project:'مشروع'}[k]||k))}</div></div>
          <div>${topDept ? `<div class="meeting-form-card" style="text-align:center;"><div class="meeting-section-title"><span class="mst-accent"></span>أكثر قسم استخدامًا للتواصل</div><div style="font-size:20px; font-weight:800; color:#0F3D2E;">${esc(topDept[0])}</div><div style="font-size:12px; color:var(--text-muted); margin-top:4px;">${topDept[1]} رسالة</div></div>` : '<p class="empty-state">لا توجد بيانات كافية</p>'}</div>
        </div>`;
      if (window.lucide) lucide.createIcons();
    })();

  } else if (ReportsState.activeTab === 'emergency') {
    const alerts = d.emergencyAlerts || [];
    const bySeverity = groupCount(alerts, a=>a.severity||'medium');
    const unack = alerts.filter(a=>a.status==='open').length;
    const closed = alerts.filter(a=>a.processing_status==='closed').length;
    const escalated = alerts.filter(a=>a.escalation_enabled).length;
    const respondedAlerts = alerts.filter(a=>a.resolved_at && a.created_at);
    const avgResponseMin = respondedAlerts.length ? Math.round(respondedAlerts.reduce((s,a)=>s+(new Date(a.resolved_at)-new Date(a.created_at))/60000,0)/respondedAlerts.length) : 0;
    const byDept = {}; alerts.forEach(a => { const dn = (d.departments||[]).find(dp=>dp.id===a.department_id)?.name || 'الإدارة العليا'; byDept[dn]=(byDept[dn]||0)+1; });
    const topDept = Object.entries(byDept).sort((a,b)=>b[1]-a[1])[0];

    host.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-icon c-red"><span data-lucide="siren" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${alerts.length}</div><div class="kpi-label">إجمالي التنبيهات</div></div>
        <div class="kpi-card"><div class="kpi-icon c-gold"><span data-lucide="clock" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${unack}</div><div class="kpi-label">لم يتم الاستلام</div></div>
        <div class="kpi-card"><div class="kpi-icon c-blue"><span data-lucide="timer" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${avgResponseMin}</div><div class="kpi-label">متوسط الاستجابة (دقيقة)</div></div>
        <div class="kpi-card"><div class="kpi-icon c-green"><span data-lucide="check-circle-2" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${closed}</div><div class="kpi-label">مغلقة</div></div>
      </div>
      <div class="mform-layout">
        <div><div class="meeting-form-card"><div class="meeting-section-title"><span class="mst-accent"></span>حسب المستوى</div>${barList(bySeverity, k=>SEVERITY_META[k]?.label||k, k=>({low:'#2F80C9',medium:'#D6A437',high:'#F2994A',critical:'#D32F2F'}[k]))}</div></div>
        <div>
          ${topDept ? `<div class="meeting-form-card" style="text-align:center;"><div class="meeting-section-title"><span class="mst-accent"></span>أكثر قسم عليه تنبيهات</div><div style="font-size:20px; font-weight:800; color:#0F3D2E;">${esc(topDept[0])}</div><div style="font-size:12px; color:var(--text-muted); margin-top:4px;">${topDept[1]} تنبيه</div></div>` : ''}
          <div class="meeting-form-card" style="text-align:center;"><div class="meeting-section-title"><span class="mst-accent"></span>تم تصعيدها</div><div style="font-size:28px; font-weight:800; color:#D32F2F;">${escalated}</div></div>
        </div>
      </div>`;

  } else if (ReportsState.activeTab === 'custom') {
    const CR_TYPES = [
      { key:'tasks', icon:'clipboard-list', label:'المهام', color:'#2F80C9' },
      { key:'meetings', icon:'calendar', label:'الاجتماعات', color:'#D6A437' },
      { key:'decisions', icon:'gavel', label:'القرارات', color:'#7C3AED' },
      { key:'employees', icon:'users', label:'أداء الموظفين', color:'#1F7A3A' },
    ];
    const CR_PRESETS = [
      { icon:'alert-triangle', label:'تقرير المتأخرات الشامل', type:'tasks', status:'delayed' },
      { icon:'trending-up', label:'الأداء الشهري للموظفين', type:'employees', status:'' },
      { icon:'check-circle-2', label:'الاجتماعات المنفّذة', type:'meetings', status:'closed' },
      { icon:'link-2-off', label:'قرارات بدون مهام', type:'decisions', status:'' },
    ];
    host.innerHTML = `
      <div class="meeting-form-card" id="customReportsPanel">
        <div class="meeting-section-title"><span class="mst-accent"></span><span data-lucide="sparkles" style="width:15px;height:15px; color:#D6A437;"></span> قوالب جاهزة بضغطة واحدة</div>
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:10px; margin-bottom:6px;">
          ${CR_PRESETS.map(p => `
            <button type="button" class="cr-preset-btn" data-type="${p.type}" data-status="${p.status}" style="display:flex; align-items:center; gap:10px; padding:12px 14px; border:1.5px solid #E8E3D6; border-radius:14px; background:#FFFDF7; cursor:pointer; text-align:right;">
              <span data-lucide="${p.icon}" style="width:18px;height:18px; color:#D6A437; flex-shrink:0;"></span>
              <span style="font-size:12.5px; font-weight:700; color:#24352E;">${p.label}</span>
            </button>`).join('')}
        </div>
      </div>

      <div class="meeting-form-card">
        <div class="meeting-section-title"><span class="mst-accent"></span><span data-lucide="sliders-horizontal" style="width:15px;height:15px;"></span> بناء تقرير مخصص</div>
        <label style="font-size:12px; color:#6B756F; font-weight:600; display:block; margin-bottom:8px;">نوع التقرير</label>
        <div class="segmented-control" id="crTypeControl" style="margin-bottom:16px;">
          ${CR_TYPES.map((t,i) => `<button type="button" data-val="${t.key}" class="${i===0?'active':''}"><span data-lucide="${t.icon}" style="width:14px;height:14px;"></span> ${t.label}</button>`).join('')}
        </div>
        <div class="mform-grid">
          <div class="mform-field"><label>القسم</label><select class="meeting-select" id="crDept"><option value="">كل الأقسام</option>${(d.departments||[]).map(dp=>`<option value="${dp.id}">${esc(dp.name)}</option>`).join('')}</select></div>
          <div class="mform-field"><label>الحالة</label><select class="meeting-select" id="crStatus"><option value="">الكل</option><option value="completed">مكتمل</option><option value="delayed">متأخر</option><option value="in_progress">قيد التنفيذ</option><option value="closed">مغلق</option></select></div>
          <div class="mform-field"><label>صيغة التصدير</label><select class="meeting-select" id="crFormat"><option value="csv">Excel / CSV</option></select></div>
        </div>
        <div class="emergency-preview-box" style="margin-top:14px; text-align:center;">
          <span style="font-size:12.5px; color:#6B756F;">عدد النتائج المطابقة الآن</span>
          <div id="crLiveCount" style="font-size:26px; font-weight:800; color:#0F3D2E; margin-top:4px;">0</div>
        </div>
        <button class="meeting-action-btn mab-primary" id="crGenerateBtn" style="margin-top:14px; width:100%; justify-content:center;"><span data-lucide="file-plus" style="width:14px;height:14px;"></span> إنشاء التقرير وتصديره</button>
      </div>`;

    function currentCrFilters() {
      const type = document.querySelector('#crTypeControl button.active').dataset.val;
      const deptId = document.getElementById('crDept').value;
      const statusF = document.getElementById('crStatus').value;
      return { type, deptId, statusF };
    }
    function buildCrRows() {
      const { type, deptId, statusF } = currentCrFilters();
      if (type === 'tasks') {
        return tasks.filter(t => (!deptId || String(t.department_id)===deptId) && (!statusF || t.status===statusF || (statusF==='delayed' && t.due_date && t.due_date<today && t.status!=='completed')))
          .map(t => ({ العنوان: t.title, المسؤول: t.users?.full_name||'', القسم: t.departments?.name||'', الحالة: label('task_status',t.status), الأولوية: label('priority',t.priority), 'الموعد النهائي': t.due_date||'' }));
      } else if (type === 'meetings') {
        return meetings.filter(m => (!deptId || String(m.department_id)===deptId) && (!statusF || m.status===statusF))
          .map(m => ({ العنوان: m.title, النوع: label('meeting_type',m.meeting_type), الحالة: label('meeting_status',m.status), الموعد: fmtDate(m.meeting_datetime) }));
      } else if (type === 'decisions') {
        return decisions.filter(dd => (!deptId || String(dd.department_id)===deptId) && (!statusF || dd.status===statusF))
          .map(dd => ({ القرار: dd.decision_text, المسؤول: dd.users?.full_name||'', الحالة: DECISION_STATUS_META[dd.status]?.label||dd.status, 'تاريخ التنفيذ': dd.due_date||'' }));
      } else {
        const perfByUser = {};
        (d.allUsers||[]).forEach(u => { if(deptId && String(u.department_id)!==deptId) return; perfByUser[u.id]={name:u.full_name,total:0,done:0}; });
        tasks.forEach(t => { if(t.assigned_to && perfByUser[t.assigned_to]){ perfByUser[t.assigned_to].total++; if(t.status==='completed') perfByUser[t.assigned_to].done++; } });
        return Object.values(perfByUser).map(p=>({ الموظف: p.name, 'إجمالي المهام': p.total, المكتملة: p.done, 'نسبة الإنجاز': (p.total?Math.round(p.done/p.total*100):0)+'%' }));
      }
    }
    function updateLiveCount() { document.getElementById('crLiveCount').textContent = buildCrRows().length; }

    document.querySelectorAll('#crTypeControl button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#crTypeControl button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        updateLiveCount();
      });
    });
    document.getElementById('crDept').addEventListener('change', updateLiveCount);
    document.getElementById('crStatus').addEventListener('change', updateLiveCount);

    document.querySelectorAll('.cr-preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#crTypeControl button').forEach(b=>b.classList.toggle('active', b.dataset.val===btn.dataset.type));
        document.getElementById('crStatus').value = btn.dataset.status;
        updateLiveCount();
        const rows = buildCrRows();
        if (!rows.length) { toast('لا توجد بيانات مطابقة لهذا القالب حاليًا', 'error'); return; }
        exportToCsv(rows, btn.textContent.trim());
        toast('تم إنشاء وتصدير: ' + btn.textContent.trim(), 'success');
      });
    });
    document.getElementById('crGenerateBtn').addEventListener('click', () => {
      const rows = buildCrRows();
      if (!rows.length) { toast('لا توجد بيانات مطابقة للفلاتر المختارة', 'error'); return; }
      exportToCsv(rows, 'تقرير_مخصص_' + currentCrFilters().type);
    });
    updateLiveCount();

  } else {
    host.innerHTML = `<div class="panel"><div class="panel-body"><p class="empty-state">تبويب "${ReportsState.activeTab}" — قادم في المرحلة القادمة.</p></div></div>`;
  }
  if (window.lucide) lucide.createIcons();
}


// ============ المستخدمون ============
const UsersPageState = { activeTab: 'departments', selectedDept: null, search: '', roleFilter: '', statusFilter: '', nationalityFilter: '' };

async function pageUsers(body) {
  if (!can('users', 'view')) {
    body.innerHTML = '<p class="error-msg show">لا تملك صلاحية الوصول لهذه الصفحة</p>'; return;
  }
  const isAdmin = scope('users') === 'company_wide';
  let usersQuery = sb.from('users').select('*, departments(name), manager:direct_manager_id(full_name)').order('full_name');
  if (!isAdmin) usersQuery = usersQuery.eq('department_id', CURRENT_USER.department_id);
  const { data: users } = await usersQuery;
  const { data: departments } = await sb.from('departments').select('*').order('name');

  window.__usersPageData = { users: users||[], departments: departments||[], isAdmin };

  function avatarInitials(name) { return (name||'').trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join(''); }
  function deptColorIndex(deptId) {
    const idx = (departments||[]).findIndex(d => d.id === deptId);
    return idx >= 0 ? idx % 8 : 0;
  }
  window.__usersHelpers = { avatarInitials, deptColorIndex };

  const activeCount = (users||[]).filter(u => (u.status||(u.is_active?'active':'inactive')) === 'active').length;

  const managersCount = (users||[]).filter(u => u.role !== 'employee').length;
  const thisMonth = new Date().toISOString().slice(0,7);
  const newThisMonth = (users||[]).filter(u => (u.created_at||'').slice(0,7) === thisMonth).length;

    <div class="task-page-header">
      <div>
        <h2><span class="tph-accent"></span><span data-lucide="user-cog" style="width:22px;height:22px; color:#0F3D2E;"></span> المستخدمون والصلاحيات</h2>

      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="meeting-action-btn mab-primary" onclick="UsersPageState.activeTab='add'; renderUsersPageShell();"><span data-lucide="user-plus" style="width:14px;height:14px;"></span> إضافة مستخدم جديد</button>
        <button class="meeting-action-btn mab-secondary" id="usersImportBtn"><span data-lucide="upload" style="width:14px;height:14px;"></span> استيراد من Excel</button>
        <button class="meeting-action-btn mab-secondary" id="usersExportBtn"><span data-lucide="download" style="width:14px;height:14px;"></span> تصدير المستخدمين</button>
        <button class="meeting-action-btn mab-secondary" onclick="location.hash='#settings'"><span data-lucide="shield" style="width:14px;height:14px;"></span> إدارة الصلاحيات</button>
      </div>` : ''}
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit, minmax(150px,1fr));">
      <div class="kpi-card"><div class="kpi-icon c-blue"><span data-lucide="users" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${(users||[]).length}</div><div class="kpi-label">إجمالي المستخدمين</div></div>
      <div class="kpi-card"><div class="kpi-icon c-green"><span data-lucide="check-circle-2" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${activeCount}</div><div class="kpi-label">نشطون</div></div>
      <div class="kpi-card"><div class="kpi-icon c-red"><span data-lucide="user-x" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${inactiveCount}</div><div class="kpi-label">غير نشطين</div></div>
      <div class="kpi-card"><div class="kpi-icon c-gold"><span data-lucide="briefcase" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${managersCount}</div><div class="kpi-label">مديرون ومسؤولون</div></div>
      <div class="kpi-card"><div class="kpi-icon c-blue"><span data-lucide="user-plus" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${newThisMonth}</div><div class="kpi-label">جدد هذا الشهر</div></div>
      <div class="kpi-card"><div class="kpi-icon c-gold"><span data-lucide="building-2" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${(departments||[]).length}</div><div class="kpi-label">أقسام مفعّلة</div></div>
    </div>

    });
  });

    document.getElementById('usersExportBtn').addEventListener('click', () => {

function renderUsersPageShell() {
  document.querySelectorAll('#usersTabs .tqt-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === UsersPageState.activeTab));
  renderUsersTabContent();
}

function userStatusBadge(u) {
  const st = u.status || (u.is_active ? 'active' : 'inactive');
  if (st === 'active') return '<span class="status-pill st-done"><span class="dot"></span>نشط</span>';
  if (st === 'suspended') return '<span class="status-pill st-delayed"><span class="dot"></span>موقوف</span>';
  return '<span class="status-pill st-cancelled"><span class="dot"></span>غير نشط</span>';
}
function userRoleBadge(role) {
  const managerRoles = ['admin','company_manager','department_manager','projects_manager','development_manager'];
  const cls = managerRoles.includes(role) ? 'st-progress' : 'st-cancelled';
  return `<span class="status-pill ${cls}"><span class="dot"></span>${label('role', role)}</span>`;
}

window.toggleUserStatus = async function(userId) {
  const u = window.__usersPageData.users.find(x=>x.id===userId);
  if (!u) return;
  const newStatus = (u.status||(u.is_active?'active':'inactive')) === 'active' ? 'inactive' : 'active';
  const { error } = await sb.from('users').update({ status: newStatus, is_active: newStatus === 'active' }).eq('id', userId);
  if (error) { toast(error.message, 'error'); return; }
  await sb.from('user_activity_log').insert({ user_id: userId, action_text: newStatus==='active'?'تم تفعيل المستخدم':'تم تعطيل المستخدم', created_by: CURRENT_USER.id });
  toast('تم تحديث حالة المستخدم', 'success');
  renderApp();
};

async function pageMyProfile(body) {
  const uid = CURRENT_USER.id;
  body.innerHTML = `<p class="empty-state">جاري التحميل...</p>`;

  const [{ data: myTasks }, { data: myDeptTasksAssigned }, { data: myDecisions }, { data: myMeetings }] = await Promise.all([
    sb.from('action_items').select('*').eq('assigned_to', uid),
    sb.from('department_tasks').select('*').eq('assigned_to', uid),
    sb.from('decisions').select('*').eq('responsible_user_id', uid),
    sb.from('meeting_attendees').select('*, meetings(title, meeting_datetime, status)').eq('user_id', uid)
  ]);

  const allTasks = [...(myTasks||[]), ...(myDeptTasksAssigned||[])];
  const completedTasks = allTasks.filter(t => t.status === 'completed').length;
  const inProgressTasks = allTasks.filter(t => t.status === 'in_progress').length;
  const completedDecisions = (myDecisions||[]).filter(d => d.status === 'executed').length;
  const completionRate = allTasks.length ? Math.round(completedTasks / allTasks.length * 100) : 0;

  const initials = (CURRENT_USER.full_name||'').trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('');

  body.innerHTML = `
    <div class="panel" style="background:linear-gradient(135deg, var(--primary-dark), var(--primary)); color:#fff;">
      <div class="panel-body" style="display:flex; align-items:center; gap:16px;">
        <div class="user-avatar" style="width:64px; height:64px; font-size:22px;">${esc(initials)}</div>
        <div>
          <h2 style="font-size:18px;">${esc(CURRENT_USER.full_name)}</h2>
          <p style="opacity:0.9; font-size:13px;">${esc(CURRENT_USER.department_name || '')} · ${label('role', CURRENT_USER.role)}</p>
        </div>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-icon c-blue"><span data-lucide="clipboard-list" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${allTasks.length}</div><div class="kpi-label">إجمالي مهامي</div></div>
      <div class="kpi-card"><div class="kpi-icon c-green"><span data-lucide="check-circle-2" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${completedTasks}</div><div class="kpi-label">مهام مكتملة</div></div>
      <div class="kpi-card"><div class="kpi-icon c-gold"><span data-lucide="loader" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${inProgressTasks}</div><div class="kpi-label">قيد التنفيذ</div></div>
      <div class="kpi-card"><div class="kpi-icon c-blue"><span data-lucide="gavel" style="width:19px;height:19px;"></span></div><div class="kpi-value mono-num">${(myDecisions||[]).length}</div><div class="kpi-label">قرارات مسؤول عنها</div></div>
    </div>

    <div class="panel">
      <div class="panel-header"><h3>نسبة إنجاز المهام</h3></div>
      <div class="panel-body">
        <div class="goal-progress-bar" style="width:100%; height:12px;"><div class="fill" style="width:${completionRate}%; background:${completionRate>=70?'var(--success)':completionRate>=40?'var(--warning)':'var(--danger)'};"></div></div>
        <p style="margin-top:8px; font-size:13px; color:var(--text-muted);">${completionRate}% من مهامك مكتملة (${completedTasks} من ${allTasks.length})</p>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><h3>مهامي الحالية</h3><a href="#tasks" class="btn btn-outline btn-sm">عرض الكل</a></div>
      <div class="panel-body">
        ${allTasks.filter(t=>t.status!=='completed').slice(0,6).length ? `<table><thead><tr><th>المهمة</th><th>الموعد</th><th>الحالة</th></tr></thead><tbody>
          ${allTasks.filter(t=>t.status!=='completed').slice(0,6).map(t => `<tr><td>${esc(t.title)}</td><td class="mono-num">${t.due_date || (t.due_datetime ? fmtDate(t.due_datetime) : '-')}</td><td>${badgeHtml(t.status, 'task_status')}</td></tr>`).join('')}
        </tbody></table>` : '<p class="empty-state">لا توجد مهام مفتوحة حاليًا 🎉</p>'}
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><h3>اجتماعاتي</h3></div>
      <div class="panel-body">
        ${(myMeetings||[]).length ? `<table><thead><tr><th>الاجتماع</th><th>الموعد</th><th>الحالة</th></tr></thead><tbody>
          ${myMeetings.slice(0,6).map(a => `<tr><td>${a.meetings ? esc(a.meetings.title) : '-'}</td><td class="mono-num">${a.meetings ? fmtDate(a.meetings.meeting_datetime) : '-'}</td><td>${a.meetings ? badgeHtml(a.meetings.status, 'meeting_status') : '-'}</td></tr>`).join('')}
        </tbody></table>` : '<p class="empty-state">لم تُدعَ لأي اجتماعات بعد</p>'}
      </div>
    </div>
  `;
  if (window.lucide) lucide.createIcons();
  wireSearchIcons();
  initPremiumDateFields();
}
